  title: Handle request failures
  symptoms:
  - The valuation flow failed because an external OpenAI text request was treated
    as infallible and the runtime error was not recovered from.
  - Watch for runtime errors from external requests and missing retries or fallback
    logs in the pricing path.
  explanation: This reflects a mental model that upstream service calls will always
    succeed, but network/API requests can fail transiently or permanently. Pricing
    pipelines need explicit error handling and fallback behavior instead of assuming
    a single attempt is enough.
  fix: Add robust retry, timeout, and fallback handling around external requests so
    the valuation can continue or fail gracefully.

- category: monte_carlo
  title: Wrong constructor argument name for GBM spot price
  symptoms:
  - The GBM process was instantiated with 'spot' as a keyword argument, but the class
    expects a different parameter name (e.g., 'S0' or 's0').
  - Run a minimal instantiation smoke test of the GBM class and inspect its __init__
    signature with inspect.signature() before integrating it into the pricer.
  explanation: The developer assumed the GBM class API matched a generic mental model
    of spot-price processes without checking the actual constructor signature, leading
    to a keyword mismatch.
  fix: Replace 'spot=' with the correct parameter name used in the GBM class constructor,
    confirmed by reading its signature or documentation.
