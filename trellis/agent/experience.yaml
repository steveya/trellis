- category: calibration
  title: Payer Swaption Sign Convention Causes Negative Value
  symptoms:
  - The payer swaption payoff sign was inverted, treating a payer as a receiver or
    negating the annuity factor incorrectly.
  - Check that the Black/Bachelier formula uses (forward_swap_rate - strike) for payer
    and (strike - forward_swap_rate) for receiver before multiplying by the annuity.
  explanation: A payer swaption pays max(S-K,0) times the annuity; confusing payer
    vs receiver or flipping the strike difference yields a negative or zero analytical
    price instead of a positive one.
  fix: Ensure the payoff direction flag is set to +1 for payer and -1 for receiver
    and is applied consistently to both the delta-term and the discounted strike term
    in the closed-form formula.

- category: monte_carlo
  title: Avoid scalar checks on arrays
  symptoms:
  - The code used a boolean test on a NumPy array when evaluating market-state inputs
    in the Monte Carlo CDS pricer.
  - Run smoke tests with batched array inputs and look for the error 'truth value
    of an array with more than one element is ambiguous'.
  explanation: In Monte Carlo workflows, inputs are often vectorized, so expressions
    like `if x:` become ambiguous when `x` contains multiple elements. The mental
    model failure is treating an array like a single scalar value instead of checking
    its shape or reducing it explicitly.
  fix: Replace implicit truthiness checks with explicit tests such as `x is None`,
    `x.size == 0`, `np.any(x)`, or `np.all(x)` depending on the intended logic.

- category: market_data
  title: Indentation after guard
  symptoms:
  - A runtime syntax error was caused by a missing indentation inside an if-block
    in the analytical CDS method.
  - Run a syntax check or lint the module before validation, especially after adding
    guard clauses or editing near line boundaries.
  explanation: The mental model failure is treating a quick validation check as if
    it were already structurally complete, so the control-flow block was left without
    a properly indented body. Small syntax issues like this can hide in otherwise
    correct pricing logic and block the entire module from loading.
  fix: Ensure every if/else block has an indented body, then rerun syntax validation
    before testing pricing outputs.

- category: monte_carlo
  title: Array Truth Check Bug
  symptoms:
  - The Monte Carlo code used a raw NumPy array in a boolean condition, causing an
    ambiguous truth-value failure.
  - Run smoke tests with vector inputs and watch for "truth value of an array is ambiguous"
    errors in conditional branches.
  explanation: NumPy arrays do not have a single truth value when they contain multiple
    elements, so Python cannot infer whether the condition is true or false. This
    usually happens when scalar-style branching is applied to vectorized state or
    path data.
  fix: Replace scalar boolean checks with explicit reductions like any()/all() or
    rewrite the logic to operate elementwise with masks.

