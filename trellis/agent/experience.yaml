- category: market_data
  title: Comparing float to date object in market state
  symptoms:
  - A numeric comparison (>=) was attempted between a float and a datetime.date object,
    likely when validating or processing a market state field such as expiry or settlement
    date.
  - Run the smoke test and look for TypeError mentioning '>=' not supported between
    float and datetime.date, or add an assertion that all date fields are datetime.date
    instances and all numeric fields are float/int before any comparison.
  explanation: Market state containers mix numeric fields (spot, rate, vol) with date
    fields (expiry, value_date), and generic validation loops or comparisons treat
    all fields uniformly without type-checking, causing silent type mismatches when
    Python tries to compare them.
  fix: Separate date fields from numeric fields in validation logic and ensure expiry/settlement
    inputs are parsed into datetime.date (or converted to a time-to-expiry float)
    before any numerical comparison is performed.

