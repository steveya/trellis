# Experience Index — lightweight metadata for filtering.
# Full lessons are in entries/*.yaml, loaded on demand.
# Principles are distilled rules in principles.yaml.
#
# severity: critical (causes 10x+ error), high (>100bp), medium (10-100bp), low (<10bp)
# max_prompt_entries: only inject the top N entries by severity for a given task

settings:
  max_prompt_entries: 5  # don't overwhelm the LLM with lessons

entries:
  - id: vol_001
    title: "Black vol ≠ Hull-White rate vol"
    severity: critical
    applies_when: {method: [rate_tree], instrument: [callable_bond, puttable_bond, bond_option]}

  - id: vol_002
    title: "Heston v0 vs sigma confusion"
    severity: critical
    applies_when: {method: [monte_carlo, fft_pricing], has_feature: [heston_model]}

  - id: cal_001
    title: "Uncalibrated rate tree"
    severity: critical
    applies_when: {method: [rate_tree]}

  - id: cal_002
    title: "Newton iteration accumulates errors in tree calibration"
    severity: high
    applies_when: {method: [rate_tree], has_feature: [long_dated]}

  - id: cal_003
    title: "Probability-rate circular dependency"
    severity: medium
    applies_when: {method: [rate_tree], has_feature: [mean_reversion]}

  - id: bi_001
    title: "Missing intermediate cashflows in tree"
    severity: critical
    applies_when: {method: [rate_tree], has_feature: [coupons]}

  - id: bi_002
    title: "Wrong exercise function for callable bonds"
    severity: critical
    applies_when: {method: [rate_tree, pde_solver], instrument: [callable_bond]}

  - id: bi_003
    title: "Uniform coupon accrual biases callable bond pricing"
    severity: high
    applies_when: {method: [rate_tree], has_feature: [coupons, early_exercise]}

  - id: bi_004
    title: "Exercise value must include accrued coupon at call dates"
    severity: high
    applies_when: {method: [rate_tree], has_feature: [coupons, early_exercise]}

  - id: fd_001
    title: "Tree gamma requires wider bumps than delta"
    severity: medium
    applies_when: {method: [rate_tree], has_feature: [greeks]}

  - id: fd_002
    title: "Old Crank-Nicolson implementation has coefficient bug"
    severity: high
    applies_when: {method: [pde_solver]}

  - id: mc_001
    title: "LSM high-vol bias with polynomial basis"
    severity: high
    applies_when: {method: [monte_carlo], has_feature: [early_exercise, high_vol]}

  - id: mc_002
    title: "Characteristic function convention: log(S_T) vs log(S_T/S0)"
    severity: critical
    applies_when: {method: [fft_pricing]}

  - id: md_001
    title: "Day count convention ACT/ACT ISDA fencepost error"
    severity: medium
    applies_when: {has_feature: [act_act_isda]}

  - id: md_002
    title: "COS method overflow with wide truncation"
    severity: high
    applies_when: {method: [fft_pricing], has_feature: [long_dated]}

  - id: cal_004
    title: "OAS must use fixed vol model during spread search"
    severity: high
    applies_when: {method: [rate_tree], has_feature: [oas]}

principles:
  - id: P1
    rule: "Always calibrate rate trees to the discount curve before pricing"
    derived_from: [cal_001, cal_002, cal_003]

  - id: P2
    rule: "Callable bonds need exercise_fn=min, discrete coupons, and exercise=par+coupon"
    derived_from: [bi_002, bi_003, bi_004]

  - id: P3
    rule: "Convert vol units at the boundary between market data and model"
    derived_from: [vol_001, vol_002, mc_002]
