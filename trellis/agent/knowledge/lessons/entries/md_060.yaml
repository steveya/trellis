symptom: The validation failed because the swaption referenced a non-existent Trellis
  module path.
root_cause: This happens when the instrument configuration points to a typo, stale
  package name, or unsupported model identifier instead of a valid module. The mental
  model failure is assuming the analytical method will resolve any string, when it
  only accepts registered modules.
fix: Replace the invalid module reference with a supported Trellis model module and
  re-run validation.
