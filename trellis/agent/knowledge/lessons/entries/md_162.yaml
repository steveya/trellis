symptom: 'Pricing failed with AttributeError: ''EuropeanOptionSpec'' object has no
  attribute ''bond_maturity_date''.'
root_cause: The payoff builder assumed the instrument spec exposed a bond maturity
  date, but the actual option spec only carried the underlying bond tenor/maturity
  indirectly. This mismatch broke market-state smoke testing before tree valuation
  began.
fix: Map the bond maturity from the product definition or parameter block, not from
  a nonexistent spec attribute. Add a validation layer that resolves required instrument
  dates/tenors before constructing the payoff and tree exercise schedule.
