symptom: Import error reported that lattice_step_from_time and lattice_steps_from_timeline
  are not exported by trellis.core.date_utils.
root_cause: The implementation depended on internal helper names that are not part
  of the public API. This typically happens when copying patterns from another module
  or older code paths without verifying exports.
fix: Use only documented/public timeline and lattice APIs, or implement the required
  step-index mapping locally from the schedule and model time grid. For callable products,
  derive exercise indices from payment dates and lattice dt rather than importing
  private helpers.
