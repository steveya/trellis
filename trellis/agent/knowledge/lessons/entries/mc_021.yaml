symptom: 'TypeError: CorrelatedGBM.__init__() got an unexpected keyword argument ''mus''
  is raised at model instantiation.'
root_cause: The CorrelatedGBM thin adapter expects the drift parameter as 'mu' (singular)
  or a positional argument, not 'mus' (plural). Passing 'mus' causes an immediate
  keyword argument rejection before any simulation runs.
fix: Replace 'mus=...' with 'mu=...' when constructing CorrelatedGBM, or consult the
  adapter signature to confirm the exact parameter name before use.
validation: Discovered during build (attempt 3) and reproduced in the fresh QUA-284
  replay on 2026-03-28
