root_cause: The payoff path did not actually depend on the volatility surface, so
  the rate tree produced a deterministic value with zero implied-vol sensitivity.
  For swaption calibration, the tree must ingest the black vol surface or calibrated
  HW parameters in the pricing flow.
fix: Wire the swaption pricer to the vol surface and calibration component so the
  tree construction or exercise valuation changes under volatility bumps. Verify with
  a bump test that price changes materially with volatility and that the instrument
  shows non-zero vega.
