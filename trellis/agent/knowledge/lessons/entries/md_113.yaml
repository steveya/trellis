symptom: The pricing run failed because the OpenAI text request errored out and the
  validation path did not recover from the failed external call.
root_cause: This is a mental model failure around assuming the upstream service will
  always respond successfully. Analytical pricing still depends on reliable access
  to supporting external requests, so a single transient API failure can stop the
  whole validation.
fix: Add retry, timeout, and fallback handling for text requests so transient upstream
  failures do not abort validation.
