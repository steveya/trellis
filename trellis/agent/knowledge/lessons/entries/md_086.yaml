symptom: The pricing attempt failed because the OpenAI text request error was not
  retried or recovered from.
root_cause: The mental model failure is assuming a single external request will succeed
  reliably during validation. In practice, transient API or network failures are common
  and must be handled as part of the workflow, not treated as model errors.
fix: Add robust retry, timeout, and fallback handling for external requests so transient
  service errors do not stop validation.
