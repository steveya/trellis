root_cause: The DSL request did not specify the product shape, schedule, and payoff
  assumptions needed to construct a vanilla option payoff. Without those contract
  fields, the analytical branch cannot generate a valid pricing kernel or payoff template.
fix: Require the product shape and schedule inputs up front, including call/put direction,
  strike, maturity, and settlement conventions. Then route the analytical branch through
  the established date utilities and payoff cookbook template before extending transforms
  or Greeks.
