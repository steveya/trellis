symptom: Build stops with decision=clarification and missing contract field semantic_product_shape
  before any payoff code is generated.
root_cause: The pricing request did not specify the exact product shape, schedule,
  or payoff assumptions required to map a cap/floor into the DSL. Without those contract
  fields, the analytical pricer cannot determine whether it is pricing caplets, a
  caplet stack, or a cash-settled cap/floor variant.
fix: Require the instrument-specific product shape, accrual/payment schedule, and
  payoff conventions up front before extending the DSL. For cap/floor analytics, explicitly
  provide caplet schedule, day count, floating coupon definition, and whether Black76
  is applied to each caplet or to an aggregate cap.
