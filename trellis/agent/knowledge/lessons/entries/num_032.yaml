symptom: 'Runtime error: local variable ''intrinsic'' referenced before assignment
  during payoff construction or smoke test.'
root_cause: The payoff builder conditionally assigned the intrinsic value but did
  not guarantee initialization on every control path. FFT pricing still needs a well-defined
  terminal payoff transform input, so any missing assignment breaks the evaluation
  chain.
fix: Initialize `intrinsic` at the top of the payoff routine for all option types,
  then compute call/put-specific payoffs explicitly before any return. Add a smoke
  test that instantiates the payoff for a European call and verifies the value path
  reaches the transform kernel without NameError.
