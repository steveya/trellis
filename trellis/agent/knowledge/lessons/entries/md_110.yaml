symptom: A numeric comparison (>=) was attempted between a float and a datetime.date
  object, likely when validating or processing a market state field such as expiry
  or settlement date.
root_cause: Market state containers mix numeric fields (spot, rate, vol) with date
  fields (expiry, value_date), and generic validation loops or comparisons treat all
  fields uniformly without type-checking, causing silent type mismatches when Python
  tries to compare them.
fix: Separate date fields from numeric fields in validation logic and ensure expiry/settlement
  inputs are parsed into datetime.date (or converted to a time-to-expiry float) before
  any numerical comparison is performed.
