symptom: Build logs show SyntaxError at lines inside try blocks and repeated fallback
  failures when the pricer is invoked.
root_cause: The generated module had malformed try/except indentation, so Python could
  not parse the file. In addition, the fallback logic assumed a COS pricer symbol/module
  existed, but that route was not actually available in the build environment.
fix: Use strict code generation with syntax validation before submission, especially
  around try/except blocks. Add guarded imports and a single clearly ordered fallback
  path that only calls symbols confirmed to exist in the current runtime.
