symptom: The pricer was routed to a tree method without ensuring the required discount
  curve and Black vol surface were accessible from market_state.
root_cause: I assumed the pricing path could infer all inputs from the model choice,
  but tree-based option pricing still depends on explicit market data plumbing for
  discounting and volatility. When those accessors are absent, the implementation
  can compile logically yet fail validation because the route has no way to retrieve
  its mandatory inputs.
fix: Expose and wire the discount curve and Black vol surface in market_state, or
  switch to a route whose inputs match the available market data.
