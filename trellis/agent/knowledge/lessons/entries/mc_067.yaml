symptom: The Monte Carlo CDS pricer was implemented with custom logic instead of using
  the required interval_default_probability primitive.
root_cause: This happens when the modeler treats the payoff as a standalone simulation
  task and forgets the assembly contract that defines which domain primitives must
  drive the computation. The mental model failure is optimizing for correctness in
  isolation rather than compatibility with the selected route.
fix: Rebuild the payoff as a thin adapter around the required primitives so the Monte
  Carlo method uses interval_default_probability directly.
