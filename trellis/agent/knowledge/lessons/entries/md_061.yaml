symptom: The pricing workflow failed because the OpenAI text request errored out and
  was not retried or handled robustly.
root_cause: The mental model assumed the external request would succeed on the first
  try, but API calls can fail transiently due to network, rate limits, or service
  issues. For analytical pricing flows, any upstream dependency should be treated
  as unreliable unless explicitly hardened.
fix: Add retries with backoff and a safe fallback path so transient request failures
  do not break the pricing run.
