symptom: An except clause was indented under an if statement, causing a syntax error
  instead of valid validation logic.
root_cause: 'This happens when control-flow blocks are mixed up mentally: exception
  handling must wrap code in a try/except structure, not follow a standalone conditional.
  The parser fails before any runtime validation can occur.'
fix: Move the except clause into a proper try/except around the validation code and
  keep conditionals separate from exception handling.
