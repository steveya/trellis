symptom: The build fails with `price_nth_to_default_basket() got an unexpected keyword
  argument 'market_state'` during the market-state smoke test.
root_cause: The copula payoff/pricer path was wired to a function signature that does
  not accept a `market_state` object, indicating the product shape contract between
  the tranche payoff adapter and the pricing kernel was not aligned. The implementation
  also confused an NTD-style primitive with a CDO tranche payoff, so the required
  inputs and adapter boundary were incorrect.
fix: Define an explicit CDO tranche payoff adapter with the exact pricing kernel signature
  expected by the copula route, and pass only supported primitives such as credit
  curve, discount curve, attachment/detachment, correlation, maturity, and recovery.
  Remove unsupported `market_state` plumbing or add a proper wrapper that translates
  `market_state` into kernel inputs before calling the pricer.
