root_cause: The function `build_exercise_timeline_from_dates` does not exist in `trellis.models.trees.control`;
  the correct API for mapping exercise dates to lattice steps is `lattice_step_from_time`
  combined with manual schedule iteration, or an equivalent helper with a different
  name.
