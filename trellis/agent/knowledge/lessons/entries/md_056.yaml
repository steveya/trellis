symptom: The swaption validation referenced a non-existent Trellis module path.
root_cause: This happens when the model configuration or lookup string is copied incorrectly,
  so the system cannot resolve the requested analytical pricer. The mental model failure
  is assuming the declared module name is valid without verifying it exists in the
  codebase or registry.
fix: Replace the bad module path with a valid registered Trellis module name and rerun
  validation.
