symptom: The build fails during the actual market state smoke test with an ACT_365F
  convention error.
root_cause: The pricer is using a day-count or schedule path that does not match the
  market state's supported convention contract. In this case, the implementation likely
  assumes ACT_365F is always available instead of binding to the exact convention
  expected by the runtime market state.
fix: Use only the exact trellis-supported market-state and day-count APIs, and verify
  the convention against the smoke-test fixture before evaluating. If the target instrument
  is convention-sensitive, propagate the convention from the market state or spec
  rather than hardcoding ACT_365F.
