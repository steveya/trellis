root_cause: The PDE Grid constructor requires explicit time-discretization parameters
  (e.g., n_t) but the generated payoff/pricer attempted to instantiate Grid without
  them. The template omitted grid discretization and unit conventions, causing the
  constructor to fail at runtime.
fix: Pass the required discretization arguments (at minimum n_t and typically n_x
  or S-grid bounds) when constructing Grid, or use a grid factory that computes sensible
  defaults from the option maturity and spot; also ensure time units (year fractions)
  match the Grid's expectations.
