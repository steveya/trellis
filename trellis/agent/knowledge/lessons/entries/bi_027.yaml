symptom: The code referenced `intrinsic` before it was assigned in one execution path
  of the analytical pricing logic.
root_cause: This happens when the mental model assumes a variable is always set by
  prior conditional branches, but a smoke-test market state can skip those branches.
  In pricing routines, every path must define the payoff or intrinsic value before
  it is used in discounting or comparison.
fix: Initialize `intrinsic` unconditionally at the start of the calculation, or compute
  it directly where needed before any use.
