symptom: Engine error lite.monte_carlo_discount_access_missing (no market_state.discount
  access) and module compile SyntaxError reported.
root_cause: The generated Monte Carlo payoff did not call the required market_state.discount
  API (so the MC harness could not detect discount-curve usage) and the agent-produced
  module contained a Python indentation/syntax error preventing compilation. Additionally,
  the payoff shape requirement (1D per-path PV) was not respected in prior attempts.
fix: Implement the MC payoff to explicitly call market_state.discount.discount(time)
  for all discounting and return a 1D numpy array of per-path present values. Run
  a quick syntax/lint pass on generated code to eliminate indentation/SyntaxError
  issues before submission.
validation: Discovered during build (attempt 3)
