symptom: The valuation workflow depended on a single OpenAI text request, so a transient
  request failure caused the swaption validation to fail immediately.
root_cause: This is a mental model failure of treating an external service as guaranteed
  rather than unreliable. Analytical pricing can still be blocked if supporting data
  or orchestration requests have no retry, fallback, or cached alternative.
fix: Add retries with backoff and a local fallback path so temporary request failures
  do not stop the valuation.
validation: Resolved during build of European payer swaption
