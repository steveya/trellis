symptom: Nested try/except fallback code was left with missing indentation, causing
  syntax errors and preventing the pricer module from loading.
root_cause: When adding compatibility fallbacks for multiple pricing signatures, it
  is easy to break control-flow structure if blocks are not consistently indented.
  The mental model failure is treating fallback code as a patch instead of ensuring
  each branch is a complete, syntactically valid block.
fix: Keep each try/except branch fully indented and validate the file with a parser
  or unit import test before running pricing tests.
