symptom: Build fails with empty code output or JSON parse error when attempting log-space
  PDE for rate instruments
root_cause: The LLM failed to generate valid code for log-space PDE transformation
  of rate instruments, likely because the log-transformation for interest rates (to
  avoid negative rates) requires non-standard grid construction and boundary conditions
  that differ from equity PDEs.
fix: Use x = log(r) as the state variable, transform the PDE drift and diffusion terms
  accordingly, and set absorbing or Neumann boundary conditions at the log-rate boundaries.
  Ensure the grid maps back to positive rates via r = exp(x).
validation: Discovered during build (attempt 0)
