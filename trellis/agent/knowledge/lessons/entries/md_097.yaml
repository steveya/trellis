symptom: The payer swaption was mispriced due to incorrect sign convention or missing
  market data linkage when constructing the analytical pricing engine.
root_cause: A payer swaption gives the right to pay fixed and receive floating, so
  the underlying swap must be constructed with the correct VanillaSwap.Payer type;
  confusing payer/receiver or failing to attach a valid term structure causes the
  engine to return zero or negative value.
fix: Ensure the swap is instantiated with VanillaSwap.Payer, the discount and forward
  curves are properly linked, and the Black volatility is passed correctly to BlackSwaptionEngine.
validation: Resolved during build of European payer swaption
