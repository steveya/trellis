symptom: The MonteCarloEngine constructor was called with a 'dt' keyword argument
  that it does not accept.
root_cause: The developer assumed the engine exposes low-level time-step parameters
  directly in __init__, conflating the engine's public API with internal simulation
  details that are computed internally from other parameters (e.g., T and n_steps).
fix: Remove 'dt' from the constructor call and instead pass the parameters the engine
  actually accepts (e.g., 'n_steps' and 'T'), letting the engine derive 'dt' internally.
