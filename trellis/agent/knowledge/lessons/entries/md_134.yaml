symptom: Actual market state smoke test failed with "'list' object has no attribute
  'astype'" while building the payoff.
root_cause: The payoff builder assumed a NumPy-like market state container and called
  array methods on a plain Python list. This usually happens when market state access
  is deferred until inside branching logic, so the first normalization step never
  runs.
fix: Initialize and normalize intrinsic/state arrays before any branching or vectorized
  operations. Coerce list inputs to NumPy arrays at the market-state boundary and
  validate required fields before payoff construction.
validation: Discovered during build (attempt 3)
