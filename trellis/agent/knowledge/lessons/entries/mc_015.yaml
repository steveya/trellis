symptom: 'Instantiating CorrelatedGBM raises TypeError: unexpected keyword argument
  ''spots'' during smoke test.'
root_cause: The CorrelatedGBM constructor expects the keyword argument 'spot_prices'
  (or positional array) for initial spot levels, not 'spots'. Passing the wrong keyword
  name causes an immediate TypeError before any simulation runs.
fix: Replace 'spots=...' with 'spot_prices=...' when constructing CorrelatedGBM, or
  inspect the class signature with help(CorrelatedGBM) before use.
