symptom: 'AttributeError: ''ForwardCurve'' object has no attribute ''forward'' raised
  during smoke test of market state access.'
root_cause: The analytical pricing path called `.forward()` on a ForwardCurve object,
  but the ForwardCurve primitive exposes a different method name (e.g., `.forward_rate()`
  or index-based access), causing an AttributeError at runtime.
fix: Replace `.forward(t)` calls with the correct ForwardCurve API (e.g., `.forward_rate(t)`
  or `.spot_rate(t)`); inspect the ForwardCurve class interface before use and add
  a thin adapter if needed.
