symptom: The rate-tree implementation ignored the required discount-curve source and
  failed to calibrate or discount from market_state.discount.
root_cause: I assumed the tree could be built and valued from rates alone, but a pricer
  must anchor the lattice to the market discount curve for calibration and cashflow
  present value. Without that access, the tree can match dynamics superficially yet
  produce ungrounded prices.
fix: Wire the rate_tree route to consume market_state.discount for calibration and
  present-value discounting before running the lattice.
