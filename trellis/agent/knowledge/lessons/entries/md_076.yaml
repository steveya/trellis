symptom: The pricing run failed because it depended on a single OpenAI text request
  that errored out with no retry or fallback path.
root_cause: The mental model mistake is treating an external service call as guaranteed
  instead of recognizing it as an unreliable dependency. When that dependency fails,
  the analytical pricing workflow cannot proceed unless the code handles the failure
  explicitly.
fix: Add robust retry, timeout, and fallback handling for the external request so
  the valuation can continue or fail gracefully with a clear diagnostic.
