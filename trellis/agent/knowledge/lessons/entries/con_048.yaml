symptom: 'Pricing fails with AttributeError: ''EuropeanOptionSpec'' object has no
  attribute ''bond_maturity_date''.'
root_cause: The payoff builder expected a required schedule/date primitive on the
  product spec, but the generated spec only contained a partial instrument definition.
  This is usually caused by missing convention wiring between the instrument schema
  and the pricing kernel.
fix: Populate the spec with the required bond maturity date and option exercise date
  using the agreed date-schedule primitive before calling payoff construction. Also
  align the instrument model with the pricer's expected field names and validate the
  spec schema at build time.
