symptom: Custom helper keywords were invented instead of passing a spec-like object
  with the fields the lattice engine actually expects.
root_cause: Developers assume a pricing helper accepts ad-hoc keyword arguments matching
  their mental model, forgetting the engine has a fixed contract requiring a structured
  spec object with specific named attributes like spot, strike, expiry_date, and exercise
  fields.
fix: Pass a spec-like object carrying spot, strike, expiry_date, and optional exercise
  fields directly to price_vanilla_equity_option_tree instead of inventing helper-specific
  keywords.
