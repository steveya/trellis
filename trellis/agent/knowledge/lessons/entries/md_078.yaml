symptom: The valuation failed because the external text request errored out on the
  first attempt.
root_cause: 'This is a reliability rather than pricing issue: the model assumed the
  supporting request would succeed once, but transient API/network failures can interrupt
  the workflow before any analytical calculation runs. The mental model failure is
  treating upstream service calls as guaranteed instead of fallible dependencies.'
fix: Add retry handling with backoff and fallback behavior so transient request failures
  do not abort the swaption valuation.
