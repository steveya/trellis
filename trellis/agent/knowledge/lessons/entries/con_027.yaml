root_cause: Default dataclass fields referenced symbols that were never imported or
  defined (e.g., black_scholes, analytical). The code mixes symbol references and
  literal/config names without a clear convention, causing NameErrors at import/instantiation
  time.
fix: Use literal strings or typed enums for model/method names or import and reference
  the actual callable objects; avoid referring to runtime symbols as dataclass defaults.
  Add unit tests that import the module to catch NameError/ImportError early.
