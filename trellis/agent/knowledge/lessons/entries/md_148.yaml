symptom: The tree pricer used a fixed sigma value instead of pulling the Black vol
  from the current market_state.
root_cause: This happens when code generation or refactoring replaces data lookup
  with a constant, so the model is priced off a stale assumption rather than the live
  calibration inputs. It breaks consistency with the curve/vol snapshot and can make
  cross-method validation appear wrong even if the math is otherwise correct.
fix: Always source volatility from market_state (or calibrated surfaces) at pricing
  time and add tests that change the vol snapshot to ensure outputs move accordingly.
