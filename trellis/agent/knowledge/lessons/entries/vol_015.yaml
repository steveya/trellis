symptom: The rate tree priced the callable bond almost the same under 5% and 40% volatility,
  so the embedded call option had effectively zero vega.
root_cause: This usually means volatility was not actually feeding into the tree transition
  probabilities or node spacing, or the exercise decision was computed from a deterministic
  path. The model then collapses to a near single-rate discounting engine instead
  of a stochastic short-rate lattice.
fix: Ensure sigma enters the Hull-White tree construction and backward induction at
  every step, including state evolution and call exercise values.
