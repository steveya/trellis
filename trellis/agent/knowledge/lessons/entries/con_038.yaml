symptom: Build fails with clarification_decision for concept=nth_to_default and missing
  semantic_product_shape fields before payoff generation.
root_cause: The copula pricer was extended without a contract that defines the exact
  nth-to-default product shape, schedule, and payoff assumptions. As a result, the
  DSL cannot determine whether to build a tranche, basket, or NTD-style payoff.
fix: Add a product-shape contract for CDO tranche vs nth-to-default semantics, including
  schedule, attachment/detachment, default settlement, and discounting conventions
  before implementing the payoff. Gate payoff construction on these required fields
  so the copula engine can choose the correct route and integration logic.
