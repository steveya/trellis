symptom: The validation failure was caused by an API communication error rather than
  a logic error in the swaption pricing code itself.
root_cause: Transient network or service failures can surface as RuntimeErrors that
  mimic code bugs, causing engineers to hunt for logic mistakes when the real issue
  is infrastructure. This conflates environment failures with model failures.
fix: Implement retry logic with exponential backoff for API calls and isolate external
  service failures from model validation errors using separate exception handling.
