root_cause: Inputs used inconsistent conventions (e.g., passing a rate where a discount
  factor or a mis-scaled volatility was expected) and the payoff adapter mapping was
  missing/incorrect; additionally a syntax/indentation error prevented a valid module
  build. These lead to huge, implausible PVs and a failed build.
fix: Enforce explicit unit and convention conversions (vol in per-sqrt-year decimals,
  know whether the pricing primitive expects forward or spot, use discount factors
  vs zero rates) and register a correct payoff adapter that validates inputs. Also
  fix code syntax/indentation and add upfront sanity checks (e.g., PV within a multiple
  of notional) to catch unit mistakes early.
