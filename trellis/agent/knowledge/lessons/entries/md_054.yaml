symptom: The rate tree compared a float to a datetime.date during market-state validation.
root_cause: The implementation mixed model inputs with raw date objects, so a numeric
  comparison was attempted before dates were converted into consistent time units.
  This reflects a failure to normalize market data types at the API boundary.
fix: Convert dates to year fractions or numeric times before validation and ensure
  all tree-state comparisons operate on the same scalar type.
