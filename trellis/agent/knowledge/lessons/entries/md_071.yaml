symptom: 'Build fails with ''unsupported operand type(s) for -: str and datetime.date''
  during smoke test when computing year fractions or date differences.'
root_cause: A date-typed field (e.g. put_dates, start_date, end_date) was passed or
  stored as a raw string rather than a datetime.date object, so arithmetic operations
  between it and a date fail at runtime.
fix: Parse all date inputs to datetime.date (e.g. via datetime.strptime or date.fromisoformat)
  before storing them in the spec dataclass or passing them to schedule/year-fraction
  utilities.
