symptom: The Monte Carlo pricer passed a spot keyword that the GBM model constructor
  did not accept.
root_cause: This usually comes from assuming a generic market-state API instead of
  checking the exact model signature. The mental model failure is treating all stochastic-process
  classes as interchangeable when their parameter names differ.
fix: Align the pricer to the GBM constructor's exact parameter names or add a thin
  adapter that maps spot to the expected input.
