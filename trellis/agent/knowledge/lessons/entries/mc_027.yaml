symptom: Build fails with 'unapproved Trellis module trellis.models.processes.correlated_gbm'
  error on every attempt.
root_cause: The agent repeatedly imports CorrelatedGBM from `trellis.models.processes.correlated_gbm`,
  which is not on the approved module list, despite lessons stating a thin adapter
  must be used instead.
fix: Replace all imports of `trellis.models.processes.correlated_gbm` with the approved
  thin-adapter path (e.g., `trellis.models.monte_carlo.correlated_gbm` or whichever
  path appears in the generation plan's approved module list) and verify the approved
  path before writing any import statement.
validation: Discovered during build (attempt 3)
