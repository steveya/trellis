symptom: The build produced a zero option value and failed the volatility bump check,
  indicating the payoff was not propagated through the tree.
root_cause: The payoff was computed as a terminal closed-form expression instead of
  being valued by lattice backward induction. For embedded or bond options, the tree
  must carry discounted continuation values back through exercise dates so the price
  responds to the rate process and volatility.
fix: Implement the option price by calling the lattice backward_induction primitives
  on the rate tree, with terminal bond payoff at option expiry and discounted continuation
  values at earlier nodes. Ensure the underlying bond value at option expiry is derived
  from the tree state so the result has non-zero vega.
