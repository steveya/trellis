symptom: The Monte Carlo CDS payoff was implemented with custom probability logic
  instead of wrapping the required interval_default_probability primitive.
root_cause: This usually happens when the modeler optimizes for convenience and accidentally
  bypasses the approved assembly route. The mental model failure is treating the primitive
  as optional rather than the authoritative building block for the payoff.
fix: Rebuild the payoff as a thin adapter that delegates interval default probability
  calculations to trellis.models.credit_default_swap.interval_default_probability.
