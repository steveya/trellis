symptom: Module build fails with SyntaxError at an `except Exception:` line because
  the preceding `try` block is not closed or indented correctly.
root_cause: The generated pricing code mixed transform-pricer fallbacks and error
  handling with malformed indentation, leaving Python parser state inconsistent. This
  typically happens when nested `try/except` branches are assembled programmatically
  without a strict template.
fix: Use a single, well-structured fallback chain with matching `try/except` blocks
  and consistent indentation. Validate the emitted source before build, and keep FFT/COS/BS
  fallback logic in separate helper functions rather than inline nested exception
  handling.
