symptom: The validation failed because the model pointed to a non-existent Trellis
  module import.
root_cause: This happens when the configured source path or module name is copied
  from an example or typoed, so the analytical setup cannot resolve the referenced
  implementation. The mental model failure is assuming any string-like module reference
  will be accepted instead of needing an actual registered module.
fix: Replace the invalid module name with a real Trellis module path that exists and
  is supported by the analytical method.
