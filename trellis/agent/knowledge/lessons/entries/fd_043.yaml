symptom: The analytical Black-Scholes implementation bypassed the required trellis.core.date_utils.year_fraction
  primitive instead of wrapping it.
root_cause: This usually happens when code computes time inputs directly or hardcodes
  date logic, forgetting that the assembly expects a thin adapter around shared primitives
  for consistency and validation. The mental model failure is treating the analytical
  price as standalone math rather than part of the same component graph.
fix: Rebuild the analytical payoff/price as a thin adapter that calls trellis.core.date_utils.year_fraction
  and uses its result for the time-to-maturity input.
