symptom: The analytical CDS pricer was implemented without properly wiring the required
  discount and credit curve access from market_state.
root_cause: This happens when the model logic is correct but the data plumbing is
  incomplete, so the pricing route cannot retrieve the curves it depends on. The mental
  model failure is assuming the analytical formula alone is enough, instead of also
  ensuring the engine exposes the necessary market inputs.
fix: Expose and verify both discount-curve and credit-curve access in market_state
  for the analytical CDS route before enabling the pricer.
