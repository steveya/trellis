symptom: Analytical swaption payoff or price differs materially from the reference
  oracle; observed price 0.012948 versus expected 0.000455 at rate=3.00% and vol=15.00%.
root_cause: The pricer likely used an incorrect forward swap rate or inconsistent
  curve inputs when forming the Black-76 underlying. For a non-flat yield curve, the
  forward swap rate must be computed from the actual discount and forecast term structures,
  not from a flat-rate shortcut or par-rate proxy.
fix: Compute the forward swap rate directly from the OIS discount curve and SOFR-3M
  forward projection curve using the exact swap cashflow schedule. Ensure the option
  payoff uses the swap annuity and the correct payer/receiver sign convention before
  applying Black-76.
