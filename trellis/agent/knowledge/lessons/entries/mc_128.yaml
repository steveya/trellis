symptom: The analytical Black-Scholes route did not read discounting and volatility
  from the provided market_state sources.
root_cause: This happens when the implementation assumes hardcoded or separate market
  data instead of using the framework's canonical inputs. The mental model failure
  is treating pricing formulas as standalone math rather than as functions of the
  current market state.
fix: Wire the Black-Scholes calculation to pull the discount factor from market_state.discount
  and sigma from market_state.vol_surface.
