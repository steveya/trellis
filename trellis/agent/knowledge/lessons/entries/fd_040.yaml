symptom: Build fails with assembly.required_primitive_missing because generated code
  imports black76_put instead of price_vanilla_equity_option_pde.
root_cause: The agent reimplemented the PDE logic from scratch (or used unrelated
  Black-76 primitives) instead of wrapping the designated assembly primitive trellis.models.equity_option_pde.price_vanilla_equity_option_pde.
  The assembly harness validates that the required primitive symbol is actually called
  in the generated code.
fix: Always import and delegate to price_vanilla_equity_option_pde from trellis.models.equity_option_pde
  as the pricing kernel; the evaluate() method must be a thin adapter that maps spec
  fields and MarketState onto that function's signature and returns its result directly.
validation: Discovered during build (attempt 3)
