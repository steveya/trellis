symptom: Build fails with "GaussianCopula.__init__() got an unexpected keyword argument
  'n_names'" during the market state smoke test.
root_cause: The pricing path assumed a Gaussian copula API that accepts portfolio
  size as a constructor argument, but the actual implementation uses a different object
  contract. This is a method/interface mismatch rather than a model issue.
fix: Inspect the copula class signature before wiring the payoff builder and pass
  only supported arguments. Add an adapter layer that maps tranche/portfolio inputs
  into the library's expected copula and basket-pricer contract.
