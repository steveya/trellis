symptom: A market-state input was treated as a numeric rate/strike, causing a comparison
  between a float and a datetime.date object.
root_cause: The mental model failed by assuming all inputs were already normalized
  scalars, but analytical pricers often receive mixed contract and market fields that
  must be type-checked before comparison. In Python, date objects are not order-compatible
  with floats, so any implicit validation can blow up early.
fix: Normalize and validate input types up front, separating schedule dates from numerical
  market variables before any comparisons.
