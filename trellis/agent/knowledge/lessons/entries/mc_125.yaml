symptom: Generated code imports monte_carlo pricing but does not call any symbol from
  trellis.models.monte_carlo.event_aware.price_event_aware_monte_carlo.
root_cause: The payoff was assembled as a standalone implementation instead of a thin
  adapter around the required event-aware Monte Carlo route primitive. The compiler
  checks route compliance and rejects code that bypasses the mandated primitive path.
fix: Wrap the payoff in a minimal adapter that delegates pricing to price_event_aware_monte_carlo
  and only supplies instrument-specific state, payoff, and simulation parameters.
  Keep the adapter thin so the generated module visibly uses the required primitive
  and no alternate pricing loop is introduced.
