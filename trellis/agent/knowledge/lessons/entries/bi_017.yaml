symptom: Build fails with 'float object cannot be interpreted as an integer' during
  payoff construction or backward induction on rate tree.
root_cause: When computing the lattice step index from a time value (e.g. via `lattice_step_from_time`),
  the result is returned as a float and passed directly to an array indexing operation
  that requires an integer. This typically happens when `num_steps * t / T` is not
  explicitly cast to int.
fix: 'Wrap any lattice step index computation with `int(round(...))` before using
  it as an array index. Ensure `lattice_step_from_time` return value is explicitly
  cast: `step = int(round(lattice_step_from_time(...)))`.'
validation: Discovered during build (attempt 3)
id: bi_017
