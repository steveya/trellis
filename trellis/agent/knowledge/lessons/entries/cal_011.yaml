symptom: The analytical payer swaption pricing failed due to missing or misconfigured
  volatility term structure and pricing engine attachment.
root_cause: Analysts assume QuantLib objects self-configure, but swaption instruments
  require an explicit Black or Bachelier engine with a calibrated vol handle attached
  before pricing calls are made.
fix: Instantiate a BlackSwaptionEngine or BachelierSwaptionEngine with a valid SwaptionVolatilityStructure
  handle and attach it to the swaption before pricing.
validation: Resolved during build of European payer swaption
