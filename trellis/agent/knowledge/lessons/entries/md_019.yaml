symptom: 'Smoke test fails with AttributeError: ''ResolvedQuantoInputs'' object has
  no attribute ''strike'' during payoff construction.'
root_cause: The payoff builder assumed resolved market inputs would carry product
  terms like strike, but strike is a contract/spec field, not a market-data field.
  The resolved quanto inputs only contain market and model parameters.
fix: Read strike from the instrument spec and keep the resolved quanto object for
  market quantities only. Validate the payoff object against the spec before accessing
  product attributes, and use the resolved inputs solely for pricing inputs such as
  spot, vol, rates, and quanto adjustment terms.
validation: Discovered during build (attempt 3)
