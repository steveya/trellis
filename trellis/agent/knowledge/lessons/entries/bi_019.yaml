symptom: Extra helper keywords like `spot`, `strike`, or `expiry` were passed directly
  to `price_vanilla_equity_option_tree` instead of bundling them into a spec-like
  object.
root_cause: The function signature expects a structured spec-like object carrying
  all option details; passing flat keyword arguments bypasses the expected interface
  and causes unexpected parameter errors.
fix: Construct a spec-like object (e.g., a dataclass or namedtuple) with `spot`, `strike`,
  `expiry_date`, and optional exercise fields, then pass it as the second positional
  argument.
