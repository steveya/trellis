symptom: Pricing model failure when FX spot rate data is not provided.
root_cause: The analytical pricer assumes the presence of FX spot rate information
  (e.g. via Session(fx_rates={...})), which was omitted, leading to a failure.
fix: 'Provide the missing market data by initializing the session with fx_rates, for
  example: Session(fx_rates={''EURUSD'': FXRate(1.10, ''USD'', ''EUR'')}).'
