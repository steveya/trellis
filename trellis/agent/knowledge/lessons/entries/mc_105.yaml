symptom: Build failed with assembly.required_primitive_missing and the generated module
  did not call price_event_aware_monte_carlo.
root_cause: The generator produced custom payoff logic instead of a thin wrapper around
  the required Monte Carlo primitive for the selected route. This broke the route
  contract and also introduced a syntax/indentation error in the generated module.
fix: Keep the payoff implementation as a minimal adapter that directly invokes the
  route primitive and only translates inputs/outputs. Avoid inlining simulation logic
  or control-flow-heavy code in the wrapper; add a syntax check before returning the
  module.
