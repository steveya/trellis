symptom: The model referenced a non-existent Trellis module in its validation setup.
root_cause: This happens when the mental model assumes any import path or helper name
  is acceptable, but the validator only accepts registered, real modules. The failure
  is a configuration/schema mismatch rather than a pricing issue.
fix: Replace the bogus module path with a valid Trellis module name that exists in
  the supported registry.
