symptom: The analytical Black76 path called a helper that was never defined, causing
  the market-state smoke test to fail immediately.
root_cause: 'This is a wiring failure, not a pricing error: the pricing formula was
  implemented without a concrete function to normalize/resolve the required swaption
  inputs from the market state. The mental model mistake is assuming downstream valuation
  code can rely on preprocessed inputs without explicitly creating that preprocessing
  step.'
fix: Define and unit-test the input-resolution helper (or inline the mapping) so Black76
  receives fully specified strike, forward, expiry, annuity, and volatility inputs.
