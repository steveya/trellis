symptom: Runtime error reports "local variable 'intrinsic' referenced before assignment"
  during the payoff smoke test.
root_cause: The payoff branch uses the variable before it is assigned in all control-flow
  paths, typically due to a missing default initialization or an incomplete call/put
  branch. This is especially easy to trigger in transform-based pricers where payoff
  construction is separated from pricing logic.
fix: Initialize `intrinsic` before any conditional logic, or compute it directly inside
  each call/put branch with a guaranteed assignment. Add a unit test that exercises
  both call and put payoff paths for representative strikes and maturities.
validation: Discovered during build (attempt 3)
