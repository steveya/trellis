symptom: 'Build fails with: RankedObservationBasketSpec.__init__() got an unexpected keyword argument ''basket_assets'' or ''underlyings'' or ''is_call''.'
root_cause: The generated adapter was still using legacy basket-spec field names from older Himalaya scaffolding. The shared RankedObservationBasketSpec contract expects a normalized constituents string plus option_type, not basket_assets/underlyings/is_call aliases.
fix: Pass constituent names via the constituents field, observation dates as a normalized string or the accepted observation_dates field, and use option_type="call"/"put". Do not send basket_assets, underlyings, or is_call into RankedObservationBasketSpec.
validation: Discovered during build replay on the Himalaya proving run after removing older conflicting basket lessons.
