symptom: A None market/state value was passed into float() inside the Monte Carlo
  CDS pricer, causing a TypeError.
root_cause: The code assumed all required numeric market/state values (hazard rates,
  survival probs, discounts) were populated and did not validate inputs, so a missing
  value propagated as None into a numeric conversion.
fix: Validate and fail fast or compute defaults for missing market/state values so
  that only real numbers are passed to float(), and raise a clear error if required
  data is absent.
