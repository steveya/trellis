symptom: Module build failed with SyntaxError in an else block and later raised 'local
  variable intrinsic referenced before assignment' during the market state smoke test.
root_cause: The generated pricer had malformed control flow (broken try/except and
  stray else indentation) and used payoff variables before guaranteeing initialization.
  This is typical when assembling analytical pricing logic from partially templated
  code without a validated callable skeleton.
fix: Use a single, fully indented pricing template with explicit initialization of
  all intermediates before branching. Validate the module with a syntax check and
  a minimal smoke test that exercises payoff construction and discounting before retrying
  the build.
