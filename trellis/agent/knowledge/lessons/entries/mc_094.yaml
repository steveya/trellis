symptom: Generated module fails to parse with SyntaxError/IndentationError around
  the swaption payoff function and exception block.
root_cause: The Monte Carlo payoff builder emitted incomplete blocks and stray statements
  after control flow, causing invalid Python syntax. The generator also mixed payoff
  logic with recovery code paths without ensuring proper indentation and return flow.
fix: Generate the payoff function as a complete, indentation-safe template with explicit
  return paths and no dangling pass/except blocks. Add a syntax-validation step before
  retrying, and keep the swap PV computation in a separate helper with clear inputs
  and outputs.
