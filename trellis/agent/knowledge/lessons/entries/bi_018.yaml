symptom: The puttable bond used min() instead of max() for the exercise function,
  causing the holder's right to sell at par to be ignored when bond value falls below
  par.
root_cause: A puttable bond gives the holder the right to sell back at par, so the
  holder maximizes value by choosing max(continuation, put_price); confusing put exercise
  logic with callable bond (issuer calls, so min) inverts the optimization direction.
fix: Apply exercise_fn=max(continuation_value, put_strike) at each node during backward
  induction so the bondholder exercises the put whenever continuation value falls
  below the put price.
