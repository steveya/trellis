symptom: Smoke test raises 'initial state shape does not match the simulated terminal
  shape' when evaluate() is called with actual MarketState.
root_cause: The generated basket adapter or its knowledge guidance treated the raw
  MarketState like a path tensor instead of resolving the basket semantics first and
  using the resolved constituent spot vector as the engine's initial state.
fix: Resolve basket semantics first, construct CorrelatedGBM from the resolved process
  parameters, and pass resolved.constituent_spots to MonteCarloEngine.price as the
  initial multi-asset state. Never reshape or index raw MarketState as a path tensor.
validation: Discovered during build (attempt 3)
