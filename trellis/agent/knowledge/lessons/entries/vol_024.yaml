symptom: Repricing the instrument with vol bumped from 5% to 40% produced no price
  change, with both outputs reported as 0.0000.
root_cause: The tree payoff/pricing path was not wired to the market volatility input,
  so the lattice was effectively deterministic or disconnected from the volatility
  surface. For an option, this removes vega and can collapse all sensitivity checks.
fix: Read volatility from market state and feed it into the rate-tree construction
  on every repricing. Ensure the payoff is evaluated through lattice backward induction
  so tree nodes depend on sigma and mean reversion, and validate by bumping vol to
  confirm non-zero vega.
