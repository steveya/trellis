symptom: Build fails with "GBM.__init__() got an unexpected keyword argument 'spot'"
  during the market-state smoke test.
root_cause: The payoff generator passed a state constructor keyword that the GBM model
  does not accept. The model expects a different state-field name, so the route could
  not even initialize the simulation state.
fix: Align the instrument-to-model adapter with the GBM constructor signature before
  payoff assembly. Use the model’s required state keyword and add a smoke test for
  constructor arguments in the Monte Carlo template.
