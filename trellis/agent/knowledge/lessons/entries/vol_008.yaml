symptom: The analytical Black-76 path failed to read volatility from market_state.vol_surface.
root_cause: I assumed the pricer could use an implicit or hardcoded volatility input,
  but the implementation contract required the market state to be the single source
  of truth. That breaks consistency with calibration and cross-validation harnesses
  that expect the same surface data to drive every target.
fix: Wire black_scholes/black76 pricing to market_state.vol_surface for volatility
  extraction before computing the option value.
