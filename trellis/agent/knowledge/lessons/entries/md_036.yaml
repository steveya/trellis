symptom: Pricer produced an implausible PV (very large magnitude or negative) and
  ultimately failed with syntax/validation errors.
root_cause: The analytical CDS implementation assumed well-formed CDS spec and required
  market inputs (credit/discount curves) that were not provided or had unit/scale
  mismatches; additionally, the generated code referenced undefined symbols leading
  to syntax errors.
fix: Validate and coerce all instrument fields and market curves before pricing (check
  notional, spread units, daycount, recovery). Require explicit discount_curve and
  credit_curve inputs and add PV magnitude sanity checks; fix undefined names and
  add unit tests for typical notional scaling.
