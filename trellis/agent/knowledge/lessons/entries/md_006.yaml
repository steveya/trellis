symptom: Errors indicate that 'forecast_rate', 'fx', and 'state_space' market data
  are missing.
root_cause: The pricing model failed because the required market data was not provided
  in the Session; specifically, forecast curves, FX rates, and state-space definitions
  were absent, leading to unit or convention mismatches.
fix: 'Ensure that the Session object includes the forecast_curves (e.g., {''USD-SOFR-3M'':
  sofr_curve}), state_space (e.g., StateSpace with defined states), and fx_rates (e.g.,
  {''EURUSD'': FXRate(1.10, ''USD'', ''EUR'')}) before pricing.'
