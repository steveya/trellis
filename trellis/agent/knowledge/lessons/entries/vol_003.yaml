symptom: 'Price sanity check failed: |PV| = 9995.24, which exceeds 10.0× typical notional
  (100).'
root_cause: The runtime used inconsistent market conventions (wall‑clock valuation
  date and/or wrong volatility/forward convention) causing a unit/scale mismatch (e.g.,
  treating Black vol as a rate vol or computing forward incorrectly). This produced
  an implausible PV far outside notional bounds.
fix: Derive valuation date from market_state (never use date.today), explicitly compute
  forward consistent with the vol surface convention (e.g., forward = spot/df when
  appropriate), call vol_surface.black_vol(T, strike) with the correct T and strike,
  and add unit-sanity checks (df>0, vol>0) and PV clamping/comparison to notional
  to catch implausible outputs early.
validation: Discovered during build (attempt 3)
