symptom: The valuation failed because a required OpenAI text request could not be
  completed on the first attempt.
root_cause: The mental model failure is treating an external API call as a guaranteed
  input instead of a fallible dependency. Analytical pricing logic can be correct,
  but if upstream data or service access fails, the swaption validation still cannot
  complete.
fix: Add retries, fallback handling, and clear error reporting for external data or
  service calls before running the valuation.
