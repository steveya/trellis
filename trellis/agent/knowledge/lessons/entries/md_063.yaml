symptom: The swaption failed because the fixed and floating leg parameters were misconfigured
  or market data handles were not properly linked.
root_cause: A payer swaption gives the right to pay fixed and receive floating, so
  the engine requires a correctly oriented swap with consistent day count, calendar,
  and rate term structure handles; mismatches cause the analytical engine to throw
  a runtime error during pricing.
fix: Ensure the swap is constructed as pay-fixed with matching conventions and that
  both the discount curve and the forward curve are linked to the pricing engine before
  calling NPV.
validation: Resolved during build of European payer swaption
