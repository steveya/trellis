root_cause: The Monte Carlo pricer was routed through a control-style/state-tag combination
  that the MC engine does not admit. The selected route expected a non-recombining
  path simulation kernel, but the plan carried incompatible annotations from a different
  pricing family.
fix: Strip unsupported control/state tags before route selection and bind European
  option pricing to the standard Monte Carlo simulation kernel only. Add an admissibility
  guard that maps European calls to a plain path-simulation route with discounting
  and vol-surface dependence, avoiding holder_max/recombining-safe metadata.
