symptom: Passed CDS running spread in basis points (e.g., 100) directly into accrual/rate
  formulas instead of as a decimal, producing an absurd PV.
root_cause: I misread the market quote units—models expect decimal rates (e.g., 0.01
  for 100 bp) but I supplied raw bps, so premium leg cashflows were scaled by orders
  of magnitude and flipped sign.
fix: Convert spreads from basis points to decimal before use (spread_decimal = spread_bps
  / 10000) and add input-unit validation/assertions.
