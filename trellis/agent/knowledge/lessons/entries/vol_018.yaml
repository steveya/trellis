symptom: Generated code sets `sigma = 0.01` in the analytical Black76 route instead
  of extracting a vol from `market_state` or a volatility surface.
root_cause: The implementation hardcoded the model volatility parameter as if it were
  the market swaption volatility, conflating Hull-White sigma with Black76 implied
  vol. This breaks market-consistent valuation and triggers the hardcoded-vol detector.
fix: Separate Black76 swaption volatility from Hull-White sigma in the pricing pipeline.
  Read the Black swaption vol from `market_state.black_vol_surface` (or the configured
  market vol source) and pass it explicitly into the analytical pricer; reserve `sigma=0.01`
  only for the Hull-White methods.
