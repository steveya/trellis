symptom: Build failed with `GBM.__init__() got an unexpected keyword argument 'spot'`
  during the market-state smoke test.
root_cause: The generated Monte Carlo wiring passed a non-existent constructor argument
  (`spot`) to the GBM process. This indicates the route implementation relied on an
  incorrect primitive signature instead of the actual engine contract.
fix: Use the exact primitive API expected by the Monte Carlo engine, including the
  correct state keyword names such as `spot_prices` where required. Add a smoke test
  for process construction before payoff assembly so signature mismatches fail early.
