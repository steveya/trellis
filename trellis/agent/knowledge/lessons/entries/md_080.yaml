symptom: The valuation failed because the OpenAI text request had no successful retry
  path and the model could not return a result.
root_cause: The mental model error is treating an external data/service call as if
  it were reliable and always available. In practice, transient API failures can abort
  the entire pricing workflow unless they are handled explicitly.
fix: Add robust retry and fallback handling for external requests so transient API
  failures do not stop the valuation.
