symptom: 'TypeError: Grid.__init__() missing 4 required positional arguments: ''x_max'',
  ''n_x'', ''T'', and ''n_t''.'
root_cause: The PDE workflow called the Grid constructor without supplying the required
  discretization parameters (spatial and temporal extents/resolution). This typically
  happens when the evaluate() routine assumes implicit defaults or when instrument/market
  inputs needed to build the grid (e.g. maturity) are underspecified or not validated.
fix: Explicitly compute and pass Grid(x_max, n_x, T, n_t) using the instrument expiry
  and chosen discretization settings, and validate that market_state contains discount
  and vol_surface before building the grid. Provide sensible defaults or configuration
  hooks for x_max, n_x, and n_t, and surface/curve lookup adapters.
validation: Discovered during build (attempt 3)
