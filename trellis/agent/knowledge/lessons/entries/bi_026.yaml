symptom: Build fails with a SyntaxError inside the rate-tree constructor path, often
  at an unexpected `else`, `break`, or `except` line.
root_cause: The generated pricing module contained malformed control-flow blocks in
  the lattice construction and fallback logic, so the interpreter could not parse
  the implementation before any pricing logic executed. This prevented the required
  backward-induction payoff from being built at all.
fix: Use a minimal, syntactically valid tree-construction path with explicit `try/except`
  structure and no dangling `else/break` fragments. Ensure the option payoff is implemented
  through lattice backward induction primitives only, with a single well-formed constructor
  fallback chain.
