symptom: 'Runtime NameError: name ''physical'' is not defined when selecting the pricing
  measure.'
root_cause: A measure identifier (e.g., 'physical' vs 'risk_neutral') was referenced
  but never defined or passed into the FFT pricer; additionally there is often confusion
  about which measure the characteristic function should be built under.
fix: Ensure a single, explicit measure flag is defined and propagated (use e.g. 'risk_neutral'
  / 'Q' for pricing). Build the characteristic function under the risk-neutral measure
  and make the variable name consistent or validate inputs before use.
