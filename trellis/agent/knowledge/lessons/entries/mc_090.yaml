symptom: The implementation referenced the risk-free rate r before it was assigned
  in the Monte Carlo pricing path.
root_cause: This usually happens when a method assumes shared state or an earlier
  branch initialized a parameter, but the actual execution path skips that setup.
  The mental model failure is treating market inputs as already bound instead of explicitly
  passing or defining them where used.
fix: Initialize and pass all market parameters explicitly at the start of the Monte
  Carlo method, especially r, before any discounting or drift calculations.
