root_cause: The FFT/COS pricer path cannot derive the payoff transform without an
  explicit product shape and payoff assumptions. The DSL request lacked the minimum
  contract needed to distinguish call/put and schedule details, so the generator correctly
  refused to continue.
fix: Add the missing product shape, payoff convention, strike/maturity schedule, and
  discounting assumptions to the request or DSL contract before invoking fft_pricing.
  Provide a cookbook entry for vanilla GBM calls/puts so the transform payoff can
  be instantiated without clarification.
