symptom: Computed PV has an unreasonable magnitude or sign (e.g., |PV| >> notional
  or large negative PV).
root_cause: The payoff used inconsistent units for the running spread (treated as
  whole-number bps like 100 instead of decimal 0.01), and omitted or misapplied discounting
  / survival computations; additionally, a code-generation indentation/syntax error
  broke the module. These caused accrual and protection legs to be scaled incorrectly
  and the code to fail to compile.
fix: Convert spreads from basis points to decimal before accrual (e.g., spread_bps
  / 10000.0), always use market_state.discount(t) for discounting and market_state
  credit primitives (hazard or survival) for default probabilities, add PV sanity
  checks against notional, and fix the indentation/syntax errors in generated code.
validation: Discovered during build (attempt 3)
