symptom: 'Pricing run fails with RuntimeError/ValueError: Missing market data: [''credit_curve'']'
root_cause: The analytical CDS pricer assumes a populated credit_curve (survival probabilities
  or hazard rates) in the MarketState/Session but the harness did not supply it; inputs
  and API contract for required market data were not validated or documented.
fix: Validate presence of required market data at pricer entry and provide clear errors;
  supply a CreditCurve (e.g. CreditCurve.flat(hazard)) in the MarketState/Session
  before calling the analytical pricer and ensure unit conventions (hazard vs survival)
  are explicit.
validation: Discovered during build (attempt 3)
