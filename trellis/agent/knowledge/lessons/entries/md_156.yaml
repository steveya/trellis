symptom: The implementation priced the tranche directly instead of wrapping the required
  nth-to-default basket primitive from the chosen assembly route.
root_cause: This usually happens when the modeler jumps to a custom payoff formula
  and forgets that validation expects the code path to be built as a thin adapter
  over the approved instrument primitive. The mental model failure is treating the
  primitive as optional rather than the mandatory pricing backbone.
fix: Rebuild the tranche payoff as a thin adapter around trellis.instruments.nth_to_default.price_nth_to_default_basket
  and route all valuation through it.
