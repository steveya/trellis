symptom: The GBM class was instantiated with keyword argument 'S0' but the constructor
  expects a different parameter name (e.g., 'spot' or 's0').
root_cause: Assuming parameter names match common financial notation (S0, K, r, sigma)
  without checking the actual class signature leads to KeyError-style failures at
  instantiation.
fix: Check the GBM class constructor signature and use the exact parameter names it
  defines, or add an alias in the constructor to accept both 'S0' and the canonical
  name.
