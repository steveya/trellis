symptom: The validation failed because the pricing run depended on an external OpenAI
  text request that errored before any model results were produced.
root_cause: This is a mental model failure about assuming the full workflow is deterministic
  and self-contained when it actually includes a fragile external dependency. If that
  upstream service is unavailable or times out, the analytical pricing logic never
  gets a chance to execute.
fix: Add resilient retry and fallback handling for external requests, or remove the
  dependency from the validation path so the analytical swaption pricer can run independently.
