root_cause: Discretization parameters (e.g. number of time/space steps) or grid constructor
  arguments were computed or passed as floats (or omitted and derived as floats) to
  APIs that require integer counts; missing explicit grid ctor parameters and input
  validation allowed the bad type to propagate.
fix: Validate and explicitly pass integer discretization counts to the PDE Grid constructor
  (cast with int() after a well-defined rounding rule) and add input assertions/smoke
  tests; ensure market-state-derived quantities (time-to-expiry, daycount fractions)
  are converted to integers before use in range/array-size APIs.
