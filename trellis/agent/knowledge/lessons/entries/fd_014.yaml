root_cause: Literal bare identifiers were used as default values in the dataclass
  (e.g. absorbing, rubinstein, analytical) but those names are not defined or imported
  in the module namespace. This causes immediate NameError at import time before any
  logic runs.
fix: Use string literals or defined constants/Enums for dataclass defaults (e.g. boundary_condition='absorbing',
  method='rubinstein') or import/declare the identifiers; add unit-test or static
  check to catch undefined names at import time.
