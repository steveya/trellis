symptom: 'Runtime error: GBM.__init__() got an unexpected keyword argument ''spot''.'
root_cause: The generated Monte Carlo setup passed a non-existent constructor argument
  to the GBM process state. This usually happens when the pricing template assumes
  a different process API than the installed engine actually exposes.
fix: Inspect the process class signature and pass the exact expected keyword names,
  such as spot_prices instead of spot or spots. Add a smoke test that instantiates
  the process with the market state before running the full path simulation.
