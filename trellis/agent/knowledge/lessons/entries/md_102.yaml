symptom: The validation failed because the pricing flow depended on an external text/data
  request that could fail outright on the first attempt.
root_cause: The mental model error is assuming supporting data services are always
  available during pricing, when in reality network/API failures can interrupt an
  otherwise valid analytical valuation. A robust pricer must treat data acquisition
  as a separate failure-prone step and not assume success on the first call.
fix: Add retries, fallback data paths, and clear pre-checks so the valuation only
  proceeds once required inputs are successfully loaded.
