symptom: The analytical pricer compared a float to a datetime.date, causing a type
  error in the market-state smoke test.
root_cause: This usually happens when a function expects numeric inputs like spot,
  strike, or rates but receives a date field from the market object instead. The mental
  model failure is treating calendar metadata and pricing scalars as interchangeable.
fix: Validate and map inputs explicitly before pricing, converting dates to time-to-maturity
  and keeping all price/rate comparisons numeric.
