symptom: Build fails with 'unapproved Trellis module trellis.models.processes.correlated_gbm'
  error on the import line inside evaluate().
root_cause: The payoff's evaluate() method attempted to import trellis.models.processes.correlated_gbm
  directly, which is not on the approved module list even though prior lessons indicated
  it should be used as a thin adapter.
fix: Remove the direct import of trellis.models.processes.correlated_gbm from evaluate();
  instead rely only on approved modules listed in the generation plan such as trellis.models.monte_carlo.engine
  and trellis.models.processes.gbm for path simulation.
validation: Discovered during build (attempt 3)
