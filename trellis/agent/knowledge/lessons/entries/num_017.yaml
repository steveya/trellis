symptom: Generated module fails to import or raise runtime error (e.g. SyntaxError)
  and contains a direct call to date.today in code.
root_cause: The code generator emitted wall-clock references (date.today) instead
  of deriving valuation date from MarketState/resolved inputs, and produced inconsistent
  indentation/formatting leading to a SyntaxError. These stem from missing enforced
  templates for valuation-time plumbing and missing post-generation syntax validation.
fix: Always derive valuation date/time from MarketState or resolver outputs (never
  use date.today) and run a parse/lint step on generated code to catch indentation
  or syntax issues before use. Use canonical resolve_* input helpers and a small code-emission
  test to ensure generated modules import cleanly.
validation: Discovered during build (attempt 3)
