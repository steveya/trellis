symptom: Code generation fails with assembly.required_primitive_missing and reports
  that the generated module did not use trellis.models.processes.gbm.GBM or trellis.models.processes.hull_white.HullWhite.
root_cause: The payoff/pricer was built as a custom implementation instead of a thin
  adapter around the required process primitives for the selected assembly route.
  That bypassed the compiler's required primitive usage check.
fix: Rebuild the payoff as a minimal adapter that directly instantiates and delegates
  to the required GBM primitive for path generation, then layer only the option payoff
  and discounting on top. Keep the generated module free of bespoke process logic
  so the required primitive is present in the emitted code.
