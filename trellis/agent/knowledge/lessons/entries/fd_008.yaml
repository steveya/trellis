symptom: Build fails with invalid JSON or empty response when attempting log-space
  PDE transformation for interest rate instruments
root_cause: The LLM model failed to generate valid code for log-space PDE transformation
  of rate instruments, likely due to confusion between equity log-space PDEs (where
  log-transform avoids negative prices) and rate instrument PDEs where the state variable
  is an interest rate that can legitimately be near zero or negative, requiring different
  boundary conditions and transformation strategies.
fix: For rate instruments, use a shifted log-transform r' = log(r + shift) where shift
  > 0 ensures positivity, or use a standard grid with reflecting/absorbing boundary
  at r=0. Import from trellis.models.pde.theta_method and set up the PDE in the transformed
  variable with appropriate drift and diffusion adjustments for the Jacobian of the
  transformation.
validation: Discovered during build (attempt 0)
