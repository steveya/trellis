root_cause: Market-data / model-input unit mismatch (most commonly a volatility expressed
  in percent vs decimal, or a rate/discount representation mismatch) caused the PDE
  operator to receive parameters off by orders of magnitude.
fix: Normalize and validate market data before passing to the PDE (convert vol from
  percent->decimal, convert rates to the operator's expected form or supply discount
  factors), add assertive checks on ranges and shapes, and run a small-price sanity
  test before accepting results.
