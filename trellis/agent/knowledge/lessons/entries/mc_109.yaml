symptom: The simulator was instantiated with the wrong keyword argument name, passing
  spot instead of the GBM model’s expected parameter.
root_cause: This is a mental-model mismatch between the pricing interface and the
  actual class API; even correct pricing logic fails if object construction uses the
  wrong field names. In Monte Carlo setups, these schema mismatches often show up
  only at runtime during smoke tests.
fix: Inspect the GBM constructor signature and map inputs to its required argument
  names exactly, then add an interface adapter if needed.
