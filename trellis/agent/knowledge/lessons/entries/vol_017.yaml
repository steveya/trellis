symptom: The Monte Carlo pricer hardcoded sigma=0.01 instead of pulling the Black
  vol from market_state.
root_cause: This reflects a mental model error where model parameters are treated
  as constant implementation defaults rather than market-calibrated inputs that may
  vary by scenario or route. It breaks consistency between pricing methods and the
  observed market surface.
fix: Read the volatility from market_state or a calibrated surface in every pricing
  route, and reserve literals only for documented test fixtures.
