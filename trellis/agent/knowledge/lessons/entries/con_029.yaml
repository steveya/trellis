root_cause: The generated payoff implementation did not follow the assembly contract
  requiring a thin adapter that invokes specified primitives (generate_schedule, year_fraction),
  so the assembly validator rejected it. The generator produced a standalone payoff
  rather than wiring to the required primitives and signatures.
fix: Rebuild the payoff as a thin adapter that directly calls trellis.core.date_utils.generate_schedule
  (and year_fraction) to produce monitoring dates/times and then delegates valuation
  to the analytical pricer; ensure imports and function signatures match the assembly
  primitive names exactly.
