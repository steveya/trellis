symptom: The pricer called generate_schedule without defining or importing it, so
  the market-state smoke test failed immediately.
root_cause: 'This is a dependency/assembly error: the pricing logic assumed date-schedule
  construction existed elsewhere, but the implementation did not actually wire in
  that helper. In model code, even correct math will fail if basic cashflow infrastructure
  is missing.'
fix: Define or import generate_schedule in the pricing module and verify all schedule/date
  utilities are explicitly passed or bundled with the pricer.
