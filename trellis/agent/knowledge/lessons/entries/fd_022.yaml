symptom: 'Automated PV sanity check failed: |PV| exceeds 10× typical notional (e.g.
  |PV| = 9995.24 > 1000).'
root_cause: 'A unit or scale mismatch between market inputs and the PDE solver (common
  examples: passing vol as % vs decimal, passing a rate where a discount factor is
  expected, or incorrect asset-price scaling on the grid). The solver then returns
  an unreasonably large PV.'
fix: Enforce and document explicit unit conventions (vols as decimals, consistent
  zero-rate vs discount-factor usage), scale the PDE spatial variable (log-spot vs
  spot) consistently, and add defensive sanity checks (spot/strike/vol ranges and
  PV magnitude) before returning a price.
