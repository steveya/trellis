symptom: The tree pricer used a fixed sigma value instead of pulling the Black volatility
  surface from market_state.
root_cause: This happens when generated pricing logic treats model inputs as constants
  rather than dynamic market data, so calibration and scenario changes are silently
  ignored. The result is a model that may run but no longer prices the instrument
  off the actual market surface.
fix: Thread the volatility surface through market_state into the backward-induction
  route and use it explicitly in calibration and pricing.
