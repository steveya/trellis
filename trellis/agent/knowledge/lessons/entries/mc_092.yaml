symptom: A path payoff variable was referenced before it was assigned in the antithetic
  Monte Carlo branch.
root_cause: 'The implementation likely computed `intrinsic` only inside a conditional
  path, then used it unconditionally later. This is a control-flow bug: every variable
  that contributes to the payoff must be defined for all execution paths.'
fix: Initialize the payoff-related variable before branching, or assign it in every
  branch before it is used.
