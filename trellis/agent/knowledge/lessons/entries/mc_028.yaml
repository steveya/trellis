symptom: Build fails with 'unapproved Trellis module trellis.models.processes.correlated_gbm'
  error on every attempt.
root_cause: The agent repeatedly imported `trellis.models.processes.correlated_gbm`
  which is not on the approved module list, despite a lesson explicitly stating to
  use the CorrelatedGBM thin adapter directly via an inspected path.
fix: Import CorrelatedGBM only from the approved module path (e.g. `trellis.models.processes.gbm`
  or the inspected adapter listed in the generation plan), never from `trellis.models.processes.correlated_gbm`.
