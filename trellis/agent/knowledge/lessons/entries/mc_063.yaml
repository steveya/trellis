symptom: The code used a boolean test on a NumPy array when evaluating market-state
  inputs in the Monte Carlo CDS pricer.
root_cause: In Monte Carlo workflows, inputs are often vectorized, so expressions
  like `if x:` become ambiguous when `x` contains multiple elements. The mental model
  failure is treating an array like a single scalar value instead of checking its
  shape or reducing it explicitly.
fix: Replace implicit truthiness checks with explicit tests such as `x is None`, `x.size
  == 0`, `np.any(x)`, or `np.all(x)` depending on the intended logic.
