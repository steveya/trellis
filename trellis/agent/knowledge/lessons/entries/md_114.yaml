symptom: The constructor was called with 'domestic_df' but the dataclass field was
  named differently (e.g., 'discount_factor' or 'df_domestic').
root_cause: When mapping market state quantities to a resolved inputs dataclass, it
  is easy to guess field names rather than checking the actual dataclass definition,
  leading to a silent naming mismatch that only surfaces at runtime.
fix: Always derive constructor calls directly from the dataclass field names using
  dataclasses.fields() or by reading the class definition, never from assumptions
  about naming conventions.
