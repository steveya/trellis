symptom: 'The smoke test raises AttributeError: ''EuropeanLocalVolOptionSpec'' object
  has no attribute ''spot''.'
root_cause: The pricing build assumed the instrument spec exposed spot, but the actual
  spec only carried strike/expiry and related fields. This mismatch prevents the payoff
  and PDE state initialization from accessing the current underlying level.
fix: Add an explicit spot field to the market-facing spec or route spot through MarketState
  instead of the option spec. Then validate the constructor against the actual market-state
  schema before assembling the PDE payoff.
