symptom: The analytical CDS pricer ignored the mandated year-fraction primitive and
  implemented its own date logic instead.
root_cause: This usually happens when the model is written as a self-contained calculation
  rather than a thin adapter over the selected assembly route. The mental model failure
  is treating required framework primitives as optional helpers, which breaks consistency
  with the validation harness.
fix: Rebuild the pricer as a thin wrapper around trellis.core.date_utils.year_fraction
  and other required primitives, keeping all date accrual logic inside the framework
  path.
