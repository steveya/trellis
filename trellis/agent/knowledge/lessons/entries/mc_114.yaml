symptom: Generated module fails to import with SyntaxError at an `except Exception:`
  line nested under a conditional block.
root_cause: The code generator placed `except` clauses inside `if` branches instead
  of wrapping the entire result-conversion logic in a single `try` block. This creates
  invalid Python syntax and prevents the pricing module from compiling.
fix: Restructure the evaluator so each fallback conversion is enclosed by a proper
  `try/except` pair at the correct indentation level. Keep one clean return path per
  result type and avoid inserting exception handlers inside conditional statements.
