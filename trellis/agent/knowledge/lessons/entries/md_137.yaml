symptom: The rate_tree implementation referenced model_name before it was assigned,
  causing the smoke test to fail immediately.
root_cause: This usually happens when code assumes a configuration variable was set
  earlier in the flow, but a branch, refactor, or early return skips that assignment.
  The mental model failure is treating metadata like model_name as always available
  instead of validating it before use.
fix: Initialize model_name explicitly before any branch that uses it, or derive it
  from a single validated configuration source at the top of the method.
