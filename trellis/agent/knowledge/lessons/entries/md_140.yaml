symptom: The implementation called helper functions that were not actually exported
  by the date utility module.
root_cause: This happens when the mental model assumes a package’s internal helpers
  are part of its public API, but the runtime only exposes a smaller supported surface.
  Even if the names look correct, an unexported symbol will fail at import time or
  during execution.
fix: Use only documented exported utilities, or replace the missing helpers with locally
  implemented timeline-step logic.
