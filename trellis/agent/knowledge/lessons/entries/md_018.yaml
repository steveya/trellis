symptom: Trace contains "'ResolvedQuantoInputs' object has no attribute 'valuation_date'"
  or generated pricing code contains a literal hardcoded 'discount_rate = 0.0'.
root_cause: The generated payoff code assumed a resolver return type and attribute
  layout that don't match the actual resolver API, and it hardcoded a discount rate
  instead of reading the discount curve from MarketState. This mismatch leads to AttributeError
  at runtime and incorrect discounting.
fix: Use the correct resolver call or read valuation_date and curve objects directly
  from MarketState; validate the resolved object for required attributes and extract
  discount factors from the market state's discount curve rather than hardcoding rates.
validation: Discovered during build (attempt 3)
