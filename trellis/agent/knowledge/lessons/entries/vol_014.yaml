symptom: The rate tree produced the same callable bond price at low and high volatility,
  indicating the model was not actually using sigma in the lattice dynamics or node
  branching.
root_cause: This usually happens when the tree is built from drift-only rates, when
  volatility is hardcoded or dropped during calibration, or when option exercise is
  evaluated off a non-vol-sensitive path. For embedded options, the callable feature
  should make price vary meaningfully with volatility because higher rate uncertainty
  changes call probability.
fix: Wire sigma into the tree transition probabilities/node spacing and ensure backward
  induction uses the full stochastic rate states when valuing the call decision.
