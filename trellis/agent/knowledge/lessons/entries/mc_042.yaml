symptom: 'Runtime NameError: name ''laguerre'' is not defined when constructing the
  pricer dataclass or default values.'
root_cause: The dataclass default used an undefined symbol (laguerre) rather than
  a string, callable, or a safe default; the code generator emitted a bare identifier
  that was never imported or defined. Dataclass defaults are evaluated at class definition
  time, so any missing symbol immediately raises NameError.
fix: Use an explicit import or a callable/string reference for the basis (e.g., from
  numpy.polynomial.laguerre import Laguerre or set basis_functions='laguerre'), or
  set the default to None and resolve/validate the basis in __post_init__. Ensure
  all symbols used as defaults are defined or replaced with safe defaults.
