symptom: Runtime error 'ResolvedBasketSemantics' object has no attribute 'rates' during
  MC smoke test when building ranked-observation basket payoff.
root_cause: The code (or an imported helper such as price_ranked_observation_basket_monte_carlo
  / RankedObservationBasketMonteCarloPayoff) attempts to access a 'rates' attribute
  on a ResolvedBasketSemantics object, but that object only exposes discount-curve
  data via the MarketState, not directly as a field on the semantics struct.
fix: Do not access discount/rate data through the ResolvedBasketSemantics object;
  instead retrieve the discount curve directly from the MarketState (e.g. market_state.discount_curve
  or market_state.rate(tenor)) and pass it explicitly into the payoff function. If
  using a high-level helper that internally touches semantics.rates, inline the MC
  payoff logic and source rates from MarketState directly.
validation: Discovered during build (attempt 2)
