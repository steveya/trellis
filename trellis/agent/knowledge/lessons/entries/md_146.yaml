symptom: The rate tree implementation called year_fraction without defining or importing
  it, causing the market-state smoke test to fail.
root_cause: 'This is a dependency/utility assumption error: the model logic relied
  on a date-to-time conversion helper that was not present in the execution scope.
  In pricing code, even small missing calendar utilities break curve and tree construction
  before any valuation can run.'
fix: Define or import the year_fraction convention helper in the pricing module and
  verify all date-to-time conversions are available before calibration.
