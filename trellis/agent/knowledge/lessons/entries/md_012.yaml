symptom: The pricing model build failed because essential payoff parameters were missing.
root_cause: The payoff constructor expected 'model_parameters' and 'risk_free_curve',
  but only 'discount' was provided, leading to a failure in model instantiation.
fix: Provide the missing capabilities ('model_parameters' and 'risk_free_curve') when
  building the pricer to ensure all required inputs are available.
