symptom: The tree pricer used a fixed sigma value instead of reading the Black volatility
  from market_state.
root_cause: This comes from treating a calibration input as a model constant, which
  breaks consistency with the supplied market snapshot and makes the tree ignore actual
  market vol dynamics. In a swaption pricer, volatility must flow from the market
  data source used by the other methods, not be embedded in generated code.
fix: Pass the Black vol surface from market_state into the rate_tree backward induction
  and calibrate the HW tree to that market-implied volatility.
