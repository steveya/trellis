symptom: 'Build fails with assembly.required_primitive_missing: generated code did
  not use trellis.models.processes.gbm.GBM and trellis.models.monte_carlo.engine.MonteCarloEngine.'
root_cause: The agent generated a standalone payoff class importing Black76 and date
  utilities instead of wrapping the required trellis Monte Carlo primitives. The assembly
  route explicitly requires GBM for path simulation and MonteCarloEngine to orchestrate
  path generation and discounting, but the generated code ignored both.
fix: 'Implement the payoff as a thin adapter: instantiate trellis.models.processes.gbm.GBM
  for each asset (or a multi-asset variant), pass paths through trellis.models.monte_carlo.engine.MonteCarloEngine,
  and implement the Himalaya selection logic inside the payoff_fn callback that receives
  the simulated path matrix.'
validation: Discovered during build (attempt 2)
