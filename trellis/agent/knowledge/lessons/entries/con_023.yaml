root_cause: Input units or conventions were inconsistent (vols in percent vs decimal,
  rates vs discount factors, or wrong model like Black76 vs Black‑Scholes), and the
  payoff adapter did not normalize/validate those inputs before calling the analytical
  routine.
fix: 'Normalize and validate all model inputs before pricing: ensure volatility is
  annualized decimal, convert discount factors to rates (or supply forward) matching
  the chosen closed‑form formula, and implement a payoff adapter that maps instrument
  spec -> (S, K, T, df/forward, sigma). Add PV scale sanity checks and unit tests.'
