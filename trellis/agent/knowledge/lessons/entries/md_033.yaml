symptom: Pricing run failed with missing 'credit_curve' input and/or returned an invalid
  (negative) price.
root_cause: The pricer assumed availability and shape of credit_curve (hazard or survival)
  and a fully specified CDS contract but these were not provided or validated; additionally
  the agent-generated code contained a syntax error that prevented a correct module
  from being produced.
fix: Require and validate credit_curve and discount_curve inputs and full CDS contract
  fields (payment schedule, coupon, notional, recovery, start/end dates) before pricing;
  fix the syntax error and implement survival<->hazard conversion consistently and
  unit-test both protection and premium leg calculations to prevent negative prices.
