symptom: The valuation failed because the OpenAI text request was treated as a hard
  dependency and no retry or fallback path was available.
root_cause: The mental model assumed the external text service would always respond,
  but analytical pricing still depends on reliable upstream data and infrastructure.
  When that single call failed, the whole validation run aborted instead of degrading
  gracefully.
fix: Add retries, timeout handling, and a local fallback or cached data path so a
  transient request failure does not stop validation.
validation: Resolved during build of European payer swaption
