symptom: The rate-tree pricer used a fixed sigma=0.01 instead of pulling the Black
  volatility from market_state.
root_cause: The implementation assumed an internal default parameter was acceptable,
  but calibration and cross-validation require the tree to reflect the live market
  inputs for each scenario. This breaks the link between market data and pricing,
  so the uncalibrated benchmark is no longer genuinely uncalibrated to the snapshot.
fix: Read the volatility from market_state (or pass it explicitly) for every pricing
  route, and reserve hardcoded values only for intentional test fixtures.
