symptom: 'Market-state smoke test failed: year fraction computed with DayCountConvention.ACT_365F
  produced an unexpected value (e.g. <= 0 or different from test expectation).'
root_cause: The payoff implementation hard-coded or used an external day-count routine
  inconsistent with the MarketState contract (and/or test harness) leading to wrong
  time-to-expiry and incorrect payoff branching. The code also did not declare or
  require the market-state fields it relied on, so missing or mismatched MarketState
  fields were not detected earlier.
fix: Use the MarketState's official API for day-counts / year-fractions (or read the
  market_state.day_count convention) instead of a hard-coded DayCountConvention; validate
  t>=0 and declare explicit requirements (discount factors, spot/forward, vol surface)
  so smoke tests catch missing/mismatched inputs early.
validation: Discovered during build (attempt 3)
