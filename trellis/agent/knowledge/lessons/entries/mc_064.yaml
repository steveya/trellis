symptom: The Monte Carlo code used a raw NumPy array in a boolean condition, causing
  an ambiguous truth-value failure.
root_cause: NumPy arrays do not have a single truth value when they contain multiple
  elements, so Python cannot infer whether the condition is true or false. This usually
  happens when scalar-style branching is applied to vectorized state or path data.
fix: Replace scalar boolean checks with explicit reductions like any()/all() or rewrite
  the logic to operate elementwise with masks.
