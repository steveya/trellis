symptom: The pricing workflow failed because the OpenAI text request could not be
  completed, so no valuation result was produced.
root_cause: The mental model failure is assuming the analytical pricing path is self-contained,
  when it actually depends on an external service call that can fail independently
  of the model logic. If that dependency is unavailable or not retried robustly, validation
  fails before any swaption math is evaluated.
fix: Add resilient request handling with retries, fallback behavior, and clear error
  propagation so the pricing engine can still complete or fail gracefully.
