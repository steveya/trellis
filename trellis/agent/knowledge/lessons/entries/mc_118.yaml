symptom: 'Generated MC code fails with NameError: name ''terminal'' is not defined
  during payoff evaluation.'
root_cause: The payoff generator referenced a terminal asset variable that was never
  created or passed through the simulation state. This is a common assembly bug when
  the path simulator and payoff kernel are built independently.
fix: Compute and name the terminal stock value explicitly from the simulated GBM path
  before applying the option payoff. Ensure the payoff function receives the final
  state variable from the path engine, and add a smoke test that asserts the terminal
  variable exists for both plain and variance-reduced paths.
