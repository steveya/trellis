  logic may be correct, but if the function signature does not mirror the expected
  market data contract, integration fails before pricing can even run. It often happens
  when refactoring internal methods without updating the external wrapper or tests.'
fix: Align the analytical pricer signature with the expected market interface, or
  add a thin adapter that maps 'spread' to the internal parameter name.
