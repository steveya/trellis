symptom: Generated payoff 0.012948 deviates from helper reference 0.000455 at rate=3.00%,
  vol=15.00%.
root_cause: The implementation likely mixed swaption payoff conventions or used inconsistent
  rate/annuity units when mapping Black76 inputs to the helper reference. This produces
  a correctly shaped payoff formula with the wrong scale, especially when fixed/float
  accrual conventions and notional normalization are not aligned.
fix: Use a single swaption convention contract for forward swap rate, annuity, strike,
  vol, and notional scaling, and validate all quantities in the same units before
  pricing. Add a helper-consistency test that checks the analytical payoff against
  the reference across rates/vols and rejects any curve or accrual mismatch early.
