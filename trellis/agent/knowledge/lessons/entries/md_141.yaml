symptom: The tree pricer hardcoded the volatility input as sigma = 0.01 instead of
  pulling the black vol surface from market_state.
root_cause: This happens when generated pricing logic substitutes a convenient model
  parameter for the actual market-driven input, breaking consistency with the calibrated
  surface. The result is a model that may run but is no longer pricing the intended
  instrument under current market data.
fix: Read the volatility from market_state for each relevant expiry/tenor point and
  pass it through the tree calibration and pricing steps.
