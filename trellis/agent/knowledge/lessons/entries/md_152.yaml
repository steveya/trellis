symptom: A conditional branch and its exception fallback were inserted with broken
  indentation and misplaced elif/except structure, causing syntax errors.
root_cause: The mental model failure was treating code generation as if logic alone
  mattered, while Python requires branch blocks to be structurally valid and properly
  nested. When refactoring pricing formulas or fallbacks, a single misplaced indent
  can invalidate the entire module before any financial logic runs.
fix: Write each branch with explicit block structure, then validate the file with
  a parser/linter before testing pricing accuracy.
