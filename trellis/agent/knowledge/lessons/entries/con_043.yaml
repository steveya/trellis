symptom: Build gate blocks analytical CDS pricing with unsupported_state_tag errors
  and missing required credit_curve input.
root_cause: The analytical route was assembled without a validated CDS credit curve
  contract, including term-structured hazard rates, spread units, and coupon/day-count
  conventions. This caused the route admissibility check to reject the product before
  pricing could run.
fix: Add an explicit CDS contract/curve adapter that validates and passes the credit_curve,
  discount_curve, spread units, recovery, and quarterly Act/360 schedule into the
  analytical pricer. Ensure the analytics consume term-dependent hazard rates rather
  than a flat hazard assumption.
