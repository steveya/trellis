symptom: Build failed with lite.monte_carlo_paths_black_vol_surface_access_missing
  because the Monte Carlo route did not access market_state.vol_surface.
root_cause: The selected MC payoff path assumed stochastic volatility inputs were
  already embedded in the route, but the compiler requires explicit volatility sourcing
  from the market state. Without a vol-surface read, the payoff cannot be validated
  for the Heston smile workflow.
fix: Make the Monte Carlo route explicitly read volatility from market_state.vol_surface
  and pass it into the path simulation or payoff setup. Add a precondition check that
  rejects MC assembly unless vol-surface access is present.
