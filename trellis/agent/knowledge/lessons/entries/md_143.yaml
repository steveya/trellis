symptom: The Black-Scholes implementation referenced `intrinsic` in a code path where
  it was never assigned for the actual market-state smoke test.
root_cause: This happens when a variable is created only inside one conditional branch
  but later used unconditionally; the mental model error is assuming every execution
  path initializes the same local state. In pricing code, edge cases like maturity/volatility
  limits make these branch gaps easy to miss.
fix: Initialize `intrinsic` before branching or return immediately in the edge-case
  branch so every path either defines it or avoids using it.
