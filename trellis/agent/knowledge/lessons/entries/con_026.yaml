symptom: Build fails with assembly.required_primitive_missing referencing trellis.models.black.black76_call
  and the generated payoff does not call the required primitive.
root_cause: The generated payoff implemented standalone logic instead of a thin adapter
  that invokes the required primitive(s) (e.g. trellis.models.black.black76_call/black76_put)
  with the exact expected signature and units. This mismatch also commonly co-occurs
  with unit/discounting conventions not aligned with the primitive.
fix: Reimplement the payoff as a thin adapter that calls the specified primitive(s)
  with the exact parameter names, units and discounting conventions expected by the
  assembly; add unit tests that assert assembly-level primitive usage and that unit
  conversions/discount factors match the primitive's contract.
