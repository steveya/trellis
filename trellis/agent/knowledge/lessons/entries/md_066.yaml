symptom: The valuation failed because the OpenAI text request could not be completed,
  so the swaption calculation never produced a result.
root_cause: The mental model error is treating the pricing engine as always available;
  in practice, external service calls can fail due to transient outages, timeouts,
  or connectivity issues. A pricing workflow must assume missing upstream data or
  responses and handle them explicitly.
fix: Add retry, timeout, and fallback handling for external requests so the pricing
  path can recover or fail gracefully with a clear error.
validation: Resolved during build of European payer swaption
