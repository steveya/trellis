symptom: Build logs fail at line 129 with "unknown Trellis module `trellis.models.transforms`"
  during payoff/pricer assembly.
root_cause: The payoff builder referenced a module path that does not exist in the
  available Trellis runtime, so the FFT pricing route could not resolve its kernel
  implementation. This is a route-discovery/registry mismatch rather than a math error
  in Heston pricing.
fix: Use only registered pricing modules and verify the exact import path before assembly.
  Add a preflight check that resolves the FFT/COS pricer symbol from the route registry
  and fails fast with a clear fallback if the transform module is unavailable.
