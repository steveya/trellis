symptom: The HW rate tree produced the same callable bond price even when volatility
  changed dramatically, indicating the embedded call option was not properly affecting
  the backward induction.
root_cause: This happens when the tree is built or evaluated as if only the base bond
  cash flows matter, or when the call decision is applied incorrectly so the continuation
  value never reflects rate uncertainty. The mental-model failure is treating a callable
  bond like a plain bond instead of an option-sensitive instrument whose value must
  move with volatility.
fix: Ensure the tree recombines rates correctly, discounts node-by-node, and enforces
  the call constraint at each call date using the continuation value so option value
  responds to volatility.
