root_cause: 'This is a process failure, not a pricing-model issue: the system assumed
  the external text service would respond on the first try. When a single dependency
  is treated as infallible, transient network or service errors become hard failures
  instead of recoverable ones.'
fix: Add robust retry, timeout, and fallback handling for external requests so transient
  failures do not abort validation.
