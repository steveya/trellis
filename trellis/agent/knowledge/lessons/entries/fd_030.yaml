symptom: 'TypeError: BlackScholesOperator.__init__() got an unexpected keyword argument
  ''r''.'
root_cause: The generated code treated the PDE operator as if it accepted scalar 'r'
  and 'sigma' keywords, but trellis.models.pde.operator.BlackScholesOperator actually
  expects callables '(sigma_fn, r_fn)'. The mismatch caused constructor failure during
  module build.
fix: 'Import BlackScholesOperator from trellis.models.pde.operator and pass callables,
  for example BlackScholesOperator(lambda s, t: sigma, lambda t: r). Add a signature
  smoke test or cookbook template to lock the constructor shape and keep the solver
  path aligned with the real API.

  '
