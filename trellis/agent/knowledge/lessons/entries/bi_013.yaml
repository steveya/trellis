symptom: 'Build fails with TypeError: resolve_lattice_exercise_policy() got an unexpected
  keyword argument ''exercise_fn'''
root_cause: The internal trellis API `resolve_lattice_exercise_policy` does not expose
  an `exercise_fn` keyword argument; the puttable/callable exercise logic must be
  expressed through the `exercise_type` and `exercise_style` parameters (e.g. bermudan)
  with the comparison direction encoded via a separate `holder_maximises` or `put_call`
  flag, not a raw callable.
fix: Remove `exercise_fn=max` from the call to `resolve_lattice_exercise_policy` and
  instead pass `exercise_type='bermudan'` with `put_call='put'` (or equivalent holder-direction
  flag) so the library applies the correct max/min comparison internally.
validation: Discovered during build (attempt 3)
