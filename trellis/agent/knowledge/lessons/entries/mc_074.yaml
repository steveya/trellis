root_cause: The MC pricer generator tried to build a payoff without an instrument-specific
  semantic shape and schedule definition. The request was too vague for the DSL, so
  the generator could not determine coupon structure, accrual handling, or caplet
  stack layout.
fix: Ask for the missing product shape, payment schedule, and payoff assumptions before
  extending the DSL. For cap/floor MC routes, require explicit fields for caplet schedule,
  floating coupon basis, fixing/payment dates, and whether the stack is priced as
  individual caplets or an aggregate cap.
