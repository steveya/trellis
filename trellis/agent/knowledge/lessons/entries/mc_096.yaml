symptom: 'Build gate fails with `Route admissibility failed for monte_carlo_paths:
  unsupported_state_tag:recombining_safe` before any paths are generated.'
root_cause: The route selector assumed a path-simulation engine could be used without
  checking the state-tag compatibility constraints. The product requires a non-recombining
  state for simulation, but the build pipeline marked the route as recombining-safe
  and blocked it.
fix: Add an admissibility precheck that maps swaption MC to a non-recombining path
  process and rejects recombining-safe tags only when incompatible. If the model must
  remain tree-compatible, route to the HW tree instead of MC.
