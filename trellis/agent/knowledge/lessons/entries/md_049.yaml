symptom: The Hull-White rate tree was implemented without sourcing calibration or
  discounting from market_state.discount.
root_cause: The mental model assumed the tree could be built from rates alone, but
  a rate-tree pricer still needs the market discount curve to anchor calibration and
  price cash flows consistently. Without that access, the tree cannot match observed
  term structure.
fix: Wire the rate-tree route to read discount factors from market_state.discount
  and use them as the calibration/discount basis.
