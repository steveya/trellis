symptom: Smoke test fails with "'float' object has no attribute 'split'" when evaluating
  market state or instrument fields.
root_cause: A numeric field was treated like a delimited string during payoff/state
  parsing. The implementation likely passed a float into a helper that expects text
  tokens for multi-asset basket construction or default-time inputs.
fix: Keep market-state and instrument fields strongly typed and do not parse numeric
  values with string helpers. Add explicit adapters for basket inputs so route code
  consumes lists/arrays for assets and floats only where numeric parameters are required.
