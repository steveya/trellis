symptom: The pricer passed a spot keyword to GBM even though the model initializer
  did not accept that argument.
root_cause: 'This is an interface mismatch: the pricing logic assumed a different
  object API than the simulator actually exposes. In Monte Carlo code, even a small
  naming inconsistency can break path generation before any variance reduction logic
  is exercised.'
fix: Align the pricer to the GBM API by using the accepted parameter names or updating
  the model constructor to support spot as an alias.
