symptom: The analytical Black-Scholes path bypassed the required market_state.discount
  and market_state.vol_surface inputs.
root_cause: The implementation mixed in direct formula assumptions instead of reading
  pricing inputs from the market state abstraction. That breaks the model API contract
  and can make validation fail even when the math is correct.
fix: Refactor the analytical route to derive present value from market_state.discount
  and volatility from market_state.vol_surface, keeping all pricing inputs source-consistent.
