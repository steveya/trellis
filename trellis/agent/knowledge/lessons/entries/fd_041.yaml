symptom: The PDE solver produced a wildly inflated option value because the grid/operator
  inputs were likely mis-scaled or mismatched, causing the spot/volatility/time units
  to be applied incorrectly.
root_cause: In finite-difference pricing, a small unit or coefficient mistake in the
  Black-Scholes operator, time step, or boundary conditions can amplify across the
  whole grid and yield prices far outside plausible bounds. This usually reflects
  a mental model failure where numerical stability is assumed to guarantee correctness,
  even though the discretized PDE can still be built with the wrong economic units.
fix: Verify all inputs are in consistent units and that the PDE coefficients, boundary
  conditions, and time-step scaling match the Black-Scholes equation exactly before
  comparing convergence.
