symptom: The payer swaption payoff or rate direction was incorrectly specified, causing
  the analytical formula to return zero or negative value.
root_cause: A payer swaption gives the right to pay fixed and receive floating, so
  the intrinsic payoff is max(swap_rate - strike, 0); confusing this with a receiver
  swaption flips the sign and produces nonsensical results.
fix: Ensure the payoff is defined as annuity * max(forward_swap_rate - strike, 0)
  and that the Black/Bachelier formula uses omega=+1 for payer and omega=-1 for receiver.
validation: Resolved during build of European payer swaption
