symptom: The code passed a Frequency object into int() when building the BDT rate
  tree, assuming the market-state field was already numeric.
root_cause: This happens when the implementation mixes domain-specific types with
  primitive numeric APIs, so the mental model incorrectly treats enums/objects as
  raw scalars. Tree construction then fails at the first place that expects a period
  count or month step as an integer.
fix: Convert Frequency inputs to explicit integer periods or map them through a dedicated
  adapter before calibration and tree setup.
