symptom: Callable bond pricing fails smoke tests when the PDE engine uses a fixed
  sigma instead of reading the configured market_state inputs.
root_cause: The implementation hardcoded volatility/model inputs instead of pulling
  them from the provided market snapshot and product configuration. This breaks consistency
  between calibration, pricing, and validation paths, especially for callable instruments
  that are sensitive to rate volatility.
fix: Wire all model parameters through explicit market-state accessors and pass them
  into the PDE/tree constructors. Validate that the pricing kernel consumes the same
  curve and Hull-White parameters used by the harness before solving.
