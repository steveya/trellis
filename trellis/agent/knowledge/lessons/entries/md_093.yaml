symptom: The swaption validation referenced a non-existent Trellis module path, causing
  the analytical method setup to fail.
root_cause: This usually happens when the model configuration is copied or edited
  with an invalid import/reference, so the engine cannot resolve the requested pricing
  component. The mental model failure is assuming a module name is valid without checking
  it exists in the library.
fix: Replace the invalid module reference with a valid Trellis module name and revalidate
  the setup.
