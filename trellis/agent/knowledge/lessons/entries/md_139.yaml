symptom: Build fails with `lite.rate_tree_backward_induction_black_vol_surface_access_missing`
  and generated code hardcodes `sigma = 0.01` instead of reading market data.
root_cause: The rate-tree route was assembled without wiring the volatility input
  from `market_state.vol_surface`, so the pricer ignored the required market-data
  dependency. This also led to a brittle implementation that used a literal sigma
  rather than the calibrated surface or model parameter source.
fix: Use the approved rate-tree backward-induction path and fetch volatility from
  `market_state.vol_surface` (or the tree calibration input) before pricing. Remove
  hardcoded sigma values and pass the extracted vol surface into the tree constructor/calibration
  step.
