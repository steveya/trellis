symptom: The MonteCarloEngine was instantiated with a 'dt' keyword argument that its
  __init__ method does not accept.
root_cause: The developer assumed the engine exposes time-step granularity as a constructor
  parameter, but the engine derives 'dt' internally from 'T' and 'n_steps', making
  'dt' a redundant/unsupported argument.
fix: Remove 'dt' from the constructor call and let the engine compute it internally,
  or pass the underlying parameters (T, n_steps) that the engine actually accepts.
