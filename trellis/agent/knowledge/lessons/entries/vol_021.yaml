symptom: Pricing the swaption at 5% and 40% volatility produced identical values,
  with observed vega change equal to 0.0000%.
root_cause: The Hull-White tree payoff path ignored the volatility input or failed
  to propagate it through calibration/backward induction, so the constructed tree
  price was insensitive to the vol parameter. For an option-like instrument, this
  indicates the lattice was effectively pricing a deterministic swap value rather
  than the embedded optionality.
fix: Ensure the tree calibration and payoff evaluation consume the volatility term
  in the state transition probabilities or short-rate node construction, and reprice
  after each vol bump using the same calibrated curve inputs. Verify the backward
  induction includes the option exercise value so price changes monotonically with
  vol.
