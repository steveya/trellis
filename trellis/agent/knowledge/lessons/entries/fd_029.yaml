symptom: Computed PV magnitude exceeds 10× typical notional (e.g., |PV| > 10*notional).
root_cause: Volatility/discount units or scale were interpreted incorrectly (e.g.,
  percent vs decimal, annualized vs per-step) or the PDE grid/discretization parameters
  were missing/incorrect, producing an unstable or mis-scaled finite-difference solution.
fix: Ensure consistent units (convert vol to decimal annualized sqrt(year), pass rates
  vs discount factors correctly), provide explicit PDE grid discretization parameters
  (Nx, Nt, x-range, dt, dx) and stability-appropriate timestep (CFL) for theta-method,
  and add an automated price sanity-check to catch unit errors early.
