root_cause: The transform pricer API expects the risk-free rate to be supplied explicitly,
  but the harness or payoff builder invoked it without the required market-rate argument.
  This indicates a contract mismatch between the pricing route and the assembled market
  state.
fix: Thread the risk-free rate through the pricing call chain and ensure the FFT/COS
  wrappers accept and forward the full market state. Add an argument validation step
  so missing discounting inputs fail early with a clear error.
