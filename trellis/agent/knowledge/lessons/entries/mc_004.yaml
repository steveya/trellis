symptom: MonteCarloEngine ignores 'lsm' method or raises error
root_cause: MonteCarloEngine supports method='exact', 'euler', 'milstein', 'log_euler'
  for path simulation schemes. LSM (Longstaff-Schwartz) is a separate pricing algorithm,
  not a simulation scheme. For American options, simulate paths with MonteCarloEngine
  then apply LSM regression separately.
fix: 'For European: engine = MonteCarloEngine(process, n_paths=50000, method=''exact'');
  result = engine.price(S0, T, payoff_fn, r). For American: simulate paths, then use
  trellis.models.monte_carlo.lsm for optimal stopping via Longstaff-Schwartz regression.'
validation: MonteCarloEngine accepts only simulation scheme methods
