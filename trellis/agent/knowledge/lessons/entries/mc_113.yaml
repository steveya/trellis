symptom: The analytical pricer bypassed the required date utility primitive instead
  of building the payoff as a thin adapter around it.
root_cause: This happens when implementation focuses on the closed-form formula and
  ignores the assembly route constraints, so the code no longer exercises the expected
  core helpers. The mental model failure is treating analytical pricing as isolated
  math rather than a component that must still respect framework primitives.
fix: Wrap the Black-Scholes payoff in a thin adapter that uses trellis.core.date_utils.year_fraction
  before computing the analytical price.
