symptom: The Jamshidian implementation imported an unapproved Trellis module instead
  of an approved inspected module.
root_cause: This happens when code is built against a generated plan without checking
  the allowed module boundary, so the model confuses a valid algorithm with a valid
  import path. The mental model failure is assuming functionality availability implies
  import approval.
fix: Replace the unapproved import with the approved inspected analytical module and
  keep the decomposition logic inside the validated component.
