symptom: A variable used in pricing logic was only defined on one branch, and an exception
  fallback block was left syntactically incomplete, causing runtime and parse failures.
root_cause: The mental model assumed the primary path would always set needed locals
  and that a fallback could be added later without revalidating indentation and control
  flow. In practice, every branch must leave the function in a fully defined state,
  and exception handlers still need a complete executable body.
fix: Initialize shared variables before branching and ensure every except block contains
  a valid, fully indented fallback implementation.
