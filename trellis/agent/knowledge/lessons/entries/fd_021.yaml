symptom: 'Automated sanity check: |PV| > 10× typical_notional (e.g., |PV| = 9995.24
  for notional 100).'
root_cause: One or more market inputs were in the wrong units or scale (e.g., vol
  given in percent instead of decimal, discount curve provided as rates vs discount
  factors, or notional applied twice). The PDE routine consumed the mis-scaled inputs
  without conversion, producing an enormous PV.
fix: 'Enforce and convert canonical units before solving: convert vol from % to decimal,
  convert zero/rates to discount factors (or vice versa) as expected by the PDE operator,
  and ensure notional is applied exactly once. Add input validation asserts and a
  price-sanity check early to fail fast.'
