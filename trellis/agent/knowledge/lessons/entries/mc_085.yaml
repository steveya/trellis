symptom: Build stops with decision=clarification and reports missing contract field
  semantic_product_shape before payoff generation.
root_cause: The Monte Carlo generator was asked to extend variance-reduction logic
  without an explicit product shape and payoff contract. As a result, the DSL could
  not determine the payoff structure, exercise assumptions, or schedule needed to
  emit valid code.
fix: Require semantic_product_shape, schedule, and payoff assumptions as explicit
  inputs before generating the MC pricer. Add a preflight contract check that fails
  fast when payoff shape or exercise-style metadata is missing, instead of attempting
  code synthesis.
