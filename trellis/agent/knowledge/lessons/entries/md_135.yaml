symptom: The CDS quote was used as-is, so basis-point inputs like 100 were treated
  differently from decimal inputs like 0.01.
root_cause: The mental model assumed all market spreads were already in the same units,
  but CDS feeds often quote spreads in basis points while valuation formulas expect
  decimal rates. This unit mismatch can create wildly wrong accrual, premium-leg,
  and PV results even when the quote values are semantically equivalent.
fix: Convert CDS spreads to a single internal convention, typically decimal rate units,
  before pricing and accrual calculations.
