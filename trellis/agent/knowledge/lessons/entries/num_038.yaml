symptom: 'Runtime error: local variable ''intrinsic'' referenced before assignment
  during payoff construction or smoke test.'
root_cause: The payoff builder assumed a branch would always assign the intrinsic
  value before it was read, but one execution path skipped that assignment. This typically
  happens when strike/payoff-type conditionals or try/except blocks are incomplete
  or misindented.
fix: Assign intrinsic immediately after computing the underlying payoff input and
  before any conditional return paths. Add a unit test for both call and put branches
  across valid/invalid branches to ensure the variable is always defined.
