symptom: Changing the input volatility from 5% to 40% left the swaption price unchanged
  at 2.4618, indicating zero vega.
root_cause: The analytical pricer was wired without actually passing or using the
  swaption volatility, so the result became insensitive to the vol input. For an embedded-option
  instrument like a swaption, omitting the volatility surface or using a fallback
  with no vol dependency produces a flat price across vol bumps.
fix: Thread the swaption volatility explicitly into the Black76 pricing call and validate
  that price changes under vol bumps before accepting the build. Add a unit test that
  compares prices at two distinct vols and rejects any implementation with near-zero
  sensitivity.
validation: Discovered during build (attempt 3)
