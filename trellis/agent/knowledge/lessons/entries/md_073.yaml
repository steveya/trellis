symptom: The code accessed `.sigma` directly on `ResolvedQuantoInputs` but the resolved
  object stores volatility under a different attribute name.
root_cause: When building a resolver that bundles multiple vol surfaces (domestic,
  foreign, FX), the developer assumes a flat `.sigma` field exists but the resolved
  dataclass uses more specific names like `.sigma_d`, `.sigma_f`, or `.vol` to disambiguate
  sources.
fix: Inspect the `ResolvedQuantoInputs` dataclass definition and replace `.sigma`
  with the correct field name (e.g., `.sigma_d` for domestic vol) wherever the analytical
  pricer reads volatility.
