root_cause: The pricer attempted to call an FFT/characteristic-function routine without
  ensuring the symbol or module was defined or imported (no guard/fallback for missing
  optional implementation).
fix: Explicitly import or define the FFT/CF routine (e.g. numpy.fft or scipy.fftpack),
  and add guarded dispatch so the analytical pricer falls back to a different method
