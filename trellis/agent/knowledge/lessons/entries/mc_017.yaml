symptom: Ranked-basket source is incomplete when it skips market resolution, uses an
  independent process per name, or copies ranked-selection state logic into the adapter.
root_cause: The route requires one correlated state process and one observation-state
  contract aligned to the engine grid; imports without construction do not satisfy that
  semantic obligation.
fix: Resolve basket semantics, convert the domestic discount factor with implied_zero_rate,
  construct CorrelatedGBM and MonteCarloEngine, pass the same n_steps to the ranked
  state-payoff primitive, and apply discount/notional settlement explicitly.
validation: Original failure evidence retained; construction guidance reconciled with
  the QUA-1231 route, lowering, generated-source, and regression tests.
