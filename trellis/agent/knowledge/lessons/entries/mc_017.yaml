symptom: Build fails with assembly.required_primitive_missing because generated code
  does not call trellis.models.resolution.basket_semantics.resolve_basket_semantics
  and trellis.models.monte_carlo.semantic_basket.price_ranked_observation_basket_monte_carlo.
root_cause: The agent generated a hand-rolled payoff class instead of acting as a
  thin adapter around the two required primitives mandated by the assembly route.
  The code-generation loop needs the exact adapter signature, not an inferred approximation,
  so the shared helper calls must be visible in the payoff module.
fix: The payoff module must import and call resolve_basket_semantics to build basket
  config, then pass it directly to price_ranked_observation_basket_monte_carlo; no
  hand-rolled simulation loop, no direct `trellis.models.processes.correlated_gbm`
  import, and no bespoke payoff class body is permitted.
validation: Discovered during build (attempt 3); promoted after adding exact adapter
  guidance
