symptom: Build fails with assembly.required_primitive_missing because the generated
  payoff class does not call price_ranked_observation_basket_monte_carlo from trellis.models.monte_carlo.semantic_basket.
root_cause: The agent generated a custom payoff class with manual simulation logic
  instead of acting as a thin adapter around the required semantic primitive. The
  assembly route explicitly requires price_ranked_observation_basket_monte_carlo to
  be invoked, and any code that reimplements the logic independently will fail the
  primitive-usage check.
fix: 'Structure the evaluate() method as a thin adapter: import price_ranked_observation_basket_monte_carlo
  and call it with the resolved underlyings, observation dates, market state, and
  correlation, returning its result directly without reimplementing ranked-selection
  or path simulation.'
validation: Discovered during build (attempt 1)
