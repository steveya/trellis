symptom: The swaption setup referenced a non-existent Trellis module, causing validation
  to fail before the analytical pricing logic could run.
root_cause: This happens when the input configuration points to an incorrect or outdated
  module path, so the model loader cannot resolve the required component. The failure
  is not in the pricing method itself but in the plumbing that wires the model to
  its dependencies.
fix: Replace the bad module path with a valid Trellis module import and re-run validation.
validation: Resolved during build of European payer swaption
