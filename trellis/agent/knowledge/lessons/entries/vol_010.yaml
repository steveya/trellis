symptom: The tree pricing stayed at zero across low and high volatilities, so the
  option value did not respond to volatility changes.
root_cause: This usually means the volatility input is not being used in the branch
  dynamics or discounting logic, so the model behaves like a degenerate deterministic
  tree. The mental model failure is treating vol as an optional parameter instead
  of a core driver of state evolution and option convexity.
fix: Thread volatility into the tree step probabilities/step sizes and validate the
  output against known vega-sensitive benchmarks.
