symptom: Build fails with 'Expecting value at line 1 column 1' before any pricing
  code is executed, indicating empty or non-JSON LLM response.
root_cause: The LLM provider returned an empty or malformed response instead of valid
  JSON, exhausting all retries and preventing any code generation. This may be triggered
  by prompt complexity, token limits, or transient provider issues.
fix: Add fallback prompt simplification and retry with reduced context when JSON parse
  fails at column 1; ensure the code generation prompt is within token limits and
  does not include excessive retrieved lessons.
