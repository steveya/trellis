symptom: A non-existent Trellis module `trellis.models.not_a_real_module` was referenced,
  breaking the analytical pricing pipeline.
root_cause: Developers sometimes copy or auto-complete module paths without verifying
  they exist in the installed package, assuming the import will resolve at runtime.
  This creates a silent misconfiguration that only surfaces when the module is actually
  invoked.
fix: Replace `trellis.models.not_a_real_module` with the correct, documented Trellis
  module path for the intended analytical swaption model.
validation: Resolved during build of European payer swaption
