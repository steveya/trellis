symptom: The pricing run failed because the OpenAI text request errored out and there
  was no retry or fallback handling.
root_cause: The mental model assumed the external request would always succeed, but
  analytical valuation still depends on reliable upstream data and service calls.
  Transient network or API issues can interrupt an otherwise correct model if they
  are not treated as recoverable failures.
fix: Add retries with backoff and a graceful fallback or cached input path for external
  request failures.
validation: Resolved during build of European payer swaption
