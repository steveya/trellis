symptom: The valuation flow depended on a text request that failed immediately, so
  the swaption validation could not complete.
root_cause: The mental model failure is assuming external data or service calls will
  always succeed during pricing or validation. In practice, transient API issues can
  interrupt even otherwise correct analytical calculations.
fix: Add retry, fallback, and clear error handling for external requests before starting
  the valuation.
validation: Resolved during build of European payer swaption
