symptom: Smoke test raises 'Basket pricing requires at least one constituent name'
  despite spec containing underlyings.
root_cause: The underlyings field was stored as a raw comma-separated string (or left
  unparsed) and never converted to a concrete Python list before being passed into
  the basket construction path, which requires an explicit non-empty sequence of ticker
  strings.
fix: Parse the underlyings field into a Python list of strings (for example `['AAPL',
  'MSFT', 'NVDA']`) before constructing the payoff, then pass that list to `resolve_basket_semantics(...)`
  or the correlated-process builder so the resolver receives at least one name.
validation: Discovered during build (attempt 3); promoted after adding the parse step
  recipe
