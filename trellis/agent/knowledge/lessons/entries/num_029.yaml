root_cause: A Python identifier (analytical) was used as a default value in the dataclass
  instead of a string, enum, or an imported constant; the symbol was never defined
  or imported. This is a simple namespace/typing bug that surfaces at import/instantiation
  time.
fix: 'Use a quoted string literal, a defined enum/constant, or import the symbol before
  using it as a default (e.g. pricing_method: str = ''analytical'' or pricing_method:
  PricingMethod.ANALYTICAL). Add static linting and unit tests that import and instantiate
  specs to catch these errors early.'
