symptom: The swaption validation referenced a nonexistent Trellis module path, causing
  the analytical setup to fail.
root_cause: This happens when the model configuration points to a typo, stale import,
  or module name that does not exist in the installed Trellis package. The mental
  model failure is treating configuration strings like code comments instead of strict,
  resolvable identifiers.
fix: Replace the invalid Trellis module reference with a real, importable module path
  and rerun validation.
