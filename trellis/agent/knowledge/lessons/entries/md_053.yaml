symptom: The PDE pricer was wired to a route that needed discount-curve and volatility-surface
  data, but those market_state accessors were not implemented or exposed.
root_cause: Theta-method PDE pricing depends on carrying the right market inputs through
  the solver setup; if the route assumes a discount curve and local/Black vol surface
  but the market-state interface does not provide them, the model can’t initialize
  consistently. This is a data-plumbing failure, not a numerical one.
fix: Expose the required discount curve and black vol surface access methods in market_state,
  then rebind the theta_pde route to those inputs.
