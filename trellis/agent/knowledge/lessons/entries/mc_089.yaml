symptom: The Monte Carlo GBM test called the model with spot=, but the implementation
  did not accept that parameter name.
root_cause: 'This is a contract mismatch: the harness expects a specific API signature,
  and even a correct numerical method will fail if the object interface uses different
  field names. The mental model error is treating semantic equivalence (spot vs S0)
  as interchangeable at the code boundary.'
fix: Align the class initializer to accept the expected keyword names or add a thin
  alias layer that maps spot to the internal spot variable.
