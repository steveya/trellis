symptom: The rate-tree call used an unsupported keyword argument and the fallback
  error handling was syntactically broken.
root_cause: This happens when the implementation assumes a builder interface that
  does not match the actual market-state API, so even correct pricing logic fails
  before valuation starts. Small signature mismatches and malformed try/except blocks
  can hide the real integration problem behind parser or runtime errors.
fix: Align the tree-construction call with the real API, remove unsupported keywords,
  and keep exception handling syntactically valid and minimal.
