symptom: Build fails with assembly.required_primitive_missing because generated evaluate()
  does not call black76_call, black76_put, or generate_schedule.
root_cause: The agent selected the analytical route (canonical_decomposition) which
  mandates use of black76_call, black76_put, and generate_schedule as required primitives,
  but the generated code diverged into other imports and never invoked those three
  functions, triggering the assembly validator.
fix: 'Structure the Himalaya evaluate() as a thin adapter: always call generate_schedule
  to produce observation dates, then call black76_call or black76_put for each observation
  period''s contribution, and aggregate results; do not import or call any substitute
  pricing functions.'
