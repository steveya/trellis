symptom: Generated code selected an 'analytical' engine family while the product IR
  only permits ['copula','credit_default_swap','monte_carlo'].
root_cause: The generated payoff/pricing code instantiated or assumed an analytical
  engine instead of the required Gaussian-copula-based Monte Carlo kernel and violated
  MC payoff conventions (shape/inputs). This arose from missing enforcement of engine-family
  compatibility and Monte Carlo payoff API rules in the generator.
fix: Switch to a GaussianCopula Monte Carlo route (use the copula path-simulation
  engine), ensure the MC payoff_fn consumes MarketState and returns an array shaped
  (n_paths,), and use market_state.discount and all required primitives. Add an engine-family
  compatibility check in codegen.
