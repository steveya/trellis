symptom: Build fails with assembly.required_primitive_missing because generated code
  does not call trellis.models.monte_carlo.event_aware.price_event_aware_monte_carlo.
root_cause: The payoff was generated as a direct implementation instead of a thin
  adapter around the route’s required Monte Carlo primitive. The assembly checker
  requires the selected engine primitive to appear in the generated code path, not
  just equivalent custom logic.
fix: Wrap the product payoff in a minimal adapter that delegates simulation and pricing
  to price_event_aware_monte_carlo, passing the required market state and payoff parameters
  through unchanged. Keep any variance-reduction logic as configuration on the primitive
  route, not as a replacement implementation.
