symptom: The PDE solver returned None and the code attempted numeric comparisons/abs
  on it.
root_cause: The implementation assumed the solver always yields numeric prices and
  did not handle convergence failures or None returns, leading to type errors when
  tests compared or took abs of the result.
fix: 'Validate and handle solver results explicitly: on convergence failure raise
  a clear error or return a defined numeric fallback (e.g., NaN) and prevent numeric
  ops on None.'
