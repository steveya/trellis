symptom: The analytical pricer assumed the market state exposed black_vol, but the
  object only provided the inputs needed for Black-Scholes through other attributes.
root_cause: 'This is a schema mismatch: the pricing formula was wired to a field name
  that doesn’t exist in the actual data model, so the implementation can’t even initialize
  correctly. The mental model error is assuming the market object is richer or differently
  named than it really is.'
fix: Map the Black-Scholes pricer to the market state's actual volatility field or
  pass volatility explicitly instead of reading black_vol.
