symptom: The theta=1.0 PDE solver referenced `intrinsic` in a path where it had not
  been assigned.
root_cause: This usually means the code assumes a variable exists after a conditional
  or loop branch, but the control flow can skip the assignment. In pricing routines,
  every state used for payoff or boundary handling must be defined on all execution
  paths.
fix: Assign `intrinsic` unconditionally before any branch that may use it, or compute
  it locally in each branch that needs it.
