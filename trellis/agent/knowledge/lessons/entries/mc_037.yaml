root_cause: The code generator placed a bare identifier (polynomial) as a default
  value for the regression basis instead of a string literal or an imported/defined
  symbol; dataclass defaults are evaluated at import time so the missing name causes
  an immediate failure.
fix: Replace the bare identifier with a safe default (e.g. the string 'polynomial'),
  or set the default to None and validate/resolve it in __post_init__; alternatively
  ensure the symbol is defined or imported before use. Add a unit test that imports
  the module to catch NameError at build time.
