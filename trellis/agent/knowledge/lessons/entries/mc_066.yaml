symptom: The Monte Carlo CDS pricer bypassed the required interval_default_probability
  primitive instead of building a thin payoff adapter around it.
root_cause: This usually happens when the implementation is written from first principles
  and accidentally re-derives logic already enforced by the assembly route. The mental
  model failure is treating the pricer as free-form rather than as a constrained composition
  of specified primitives.
fix: Refactor the payoff layer into a minimal adapter that invokes trellis.models.credit_default_swap.interval_default_probability
  for each interval and uses only its output in the Monte Carlo pricing path.
