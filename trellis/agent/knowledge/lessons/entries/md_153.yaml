symptom: The analytical pricing path referenced a local variable before it was assigned
  in some branch of the option payoff logic.
root_cause: This happens when the mental model assumes every code path computes shared
  intermediates, but one branch returns or bypasses initialization first. In pricing
  routines, call/put and maturity edge cases can easily skip the line that sets common
  variables.
fix: Initialize shared variables before branching, or compute payoff/intrinsic values
  in a single common path used by all option types.
