symptom: The generated Monte Carlo CDS implementation computed default probabilities
  and pricing logic from scratch instead of delegating to the mandated primitives
  interval_default_probability and price_cds_monte_carlo.
root_cause: When an assembly route specifies required primitives, the implementation
  must act as a thin adapter around them; writing independent logic bypasses the validated
  primitive layer and violates the assembly contract.
fix: Rebuild the payoff function as a thin adapter that calls trellis.models.credit_default_swap.interval_default_probability
  and price_cds_monte_carlo directly, adding only the minimal glue code needed to
  pass inputs and collect outputs.
