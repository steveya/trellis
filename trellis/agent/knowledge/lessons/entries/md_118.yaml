symptom: The analytical_cds implementation computed CDS price independently instead
  of delegating to the required primitive trellis.models.credit_default_swap.price_cds_analytical.
root_cause: The developer treated the primitive as optional documentation rather than
  a mandatory thin-wrapper contract, reimplementing equivalent logic from scratch
  and bypassing the assembly route entirely.
fix: Rebuild the implementation as a thin adapter that calls trellis.models.credit_default_swap.price_cds_analytical
  directly, only adding argument mapping and output formatting around it.
