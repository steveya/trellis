symptom: Build fails with `lattice.exercise_objective_mismatch` stating expected `exercise_fn=max`
  for `holder_put` products.
root_cause: A puttable bond gives the holder the right to sell back (put) the bond
  at par, so at each exercise node the holder chooses the maximum of the put price
  and continuation value (exercise_fn=max). Using exercise_fn=min (the callable issuer
  logic) inverts the exercise decision and violates the product semantics.
fix: Set exercise_fn=max for puttable bonds so that at each put date the bond value
  is max(put_price, continuation_value). When implementing callable_tree_symmetry,
  derive puttable price via put-call symmetry rather than re-using the callable exercise
  objective directly.
validation: Discovered during build (attempt 3)
