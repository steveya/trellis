symptom: Build fails with 'unapproved Trellis module' or 'unknown Trellis module'
  errors referencing trellis.models.monte_carlo, trellis.models.multi_asset, trellis.models.ranked_observation,
  or trellis.models.payoff_aggregation.
root_cause: The agent hallucinated non-existent Trellis module paths (trellis.models.monte_carlo,
  trellis.models.multi_asset, trellis.models.ranked_observation, trellis.models.payoff_aggregation)
  instead of using only the approved thin adapters such as trellis.models.processes.correlated_gbm
  and the core primitives.
fix: 'Import only approved modules: use the CorrelatedGBM thin adapter directly from
  trellis.models.processes.correlated_gbm for path simulation, implement ranked observation
  and removal logic inline in evaluate(), and never import trellis.models.monte_carlo,
  trellis.models.multi_asset, trellis.models.ranked_observation, or trellis.models.payoff_aggregation.'
validation: Discovered during build (attempt 3)
