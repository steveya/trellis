symptom: Importing `Grid` from `trellis.models.pde` raises an import error at build
  time.
root_cause: The implementation guessed a package-level export that does not exist.
  The PDE grid type lives behind a different exact trellis import path, so the payoff
  assembly fails before numerical evaluation starts.
fix: Use only verified trellis import paths for PDE components and import the grid
  from its actual defining module. Add a small import smoke test before wiring the
  payoff so missing exports are caught immediately.
