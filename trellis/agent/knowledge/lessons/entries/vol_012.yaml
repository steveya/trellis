symptom: price(5%) == price(40%) with 0.0000% change for an embedded-call bond
root_cause: The pricer used a payoff/path construction that ignored volatility or
  bypassed the model dynamics, so the callable feature never saw any rate dispersion.
  For callable instruments, option value must vary with sigma; otherwise the call
  constraint is not being exercised in the pricing engine.
fix: Wire volatility into the HW PDE/tree state evolution and verify the embedded
  option changes price under a large sigma bump. Add a regression check that callable-bond
  price and OAS move materially when sigma changes, and fail fast if vega is effectively
  zero.
