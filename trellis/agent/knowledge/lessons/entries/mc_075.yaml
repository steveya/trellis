symptom: The GBM process was instantiated with 'spot' as a keyword argument, but the
  constructor expects a different parameter name (e.g., 'S0' or 's0').
root_cause: The caller assumed a parameter name without checking the actual constructor
  signature, a common mismatch when switching between libraries or custom classes
  that use different naming conventions for the initial asset price.
fix: Replace 'spot=...' with the correct parameter name used by the GBM constructor,
  such as 'S0=...' or 's0=...'.
