symptom: 'Runtime NameError for bare identifiers (e.g. ''discrete'') and static analyzer
  error: monte_carlo route did not access market_state.vol_surface.'
root_cause: Dataclass defaults used undefined bare names instead of literals/enums,
  and the Monte Carlo evaluate() omitted using market_state.vol_surface for implied
  vol lookup. Additionally the MC payoff shape and engine/process API expectations
  were not respected.
fix: Use quoted strings or well-defined enums/constants for dataclass defaults (e.g.
  'discrete'), and fetch volatility via market_state.vol_surface (e.g. market_state.vol_surface.get_implied_vol(...)).
  Ensure payoff_fn returns a 1-D array of shape (n_paths,) and follow the MonteCarloEngine
  / GBM API signatures.
validation: Discovered during build (attempt 3)
