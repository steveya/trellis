symptom: Generated module fails to import with a SyntaxError near a misindented try/except
  block, and validation reports missing required primitive GBM usage.
root_cause: The payoff template was assembled with malformed Python control flow and
  did not remain a thin adapter around the required Monte Carlo process primitive.
  As a result, the route compiler rejected the payoff and the module could not be
  parsed.
fix: Rebuild the Monte Carlo payoff as a thin, indentation-safe adapter around the
  approved simulation primitive only. Ensure the evaluate() path uses the required
  process primitive directly, with no fallback branch that breaks syntax or bypasses
  the selected assembly route.
