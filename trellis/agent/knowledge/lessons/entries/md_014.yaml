symptom: The pricing model failed when the required underlying 'spot' data was absent.
root_cause: The multi_method implementation assumed that market data would provide
  a 'spot' value, but the data contract was incomplete, resulting in a missing capability
  during payoff computation.
fix: Update the market data contract to include a 'spot' value and adjust the pricer
  to validate its presence before computing payoffs.
