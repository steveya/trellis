symptom: A fallback block after an except statement was left unindented, causing the
  module to fail syntax validation.
root_cause: The mental model mistake is treating recovery code as if it can sit at
  the same indentation level as the except clause; Python requires the entire handler
  body to be nested under except. This often happens when adding a deterministic fallback
  after a failed numerical routine.
fix: Indent all fallback logic under the except clause and re-run validation before
  comparing pricing methods.
