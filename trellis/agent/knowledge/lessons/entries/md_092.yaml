symptom: The valuation failed because the required text request to an external service
  did not succeed on the first attempt.
root_cause: The mental model error is assuming downstream dependencies are always
  available and that a single request is sufficient. In practice, transient network
  or service failures can break validation even when the pricing logic is correct.
fix: Add retry logic with backoff and a deterministic fallback so the pricing workflow
  can complete without a single external call failure.
