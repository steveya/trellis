symptom: The tree pricer hardcoded the Black vol as sigma = 0.01 instead of sourcing
  it from market_state.
root_cause: This happens when generated pricing logic treats model parameters as constants
  rather than live market inputs. The mental model failure is assuming calibration
  values or defaults are interchangeable with the actual surface used by the pricer.
fix: Thread the volatility surface through market_state into rate_tree_backward_induction
  and use that value everywhere instead of literals.
