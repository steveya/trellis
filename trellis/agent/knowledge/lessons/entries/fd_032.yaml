symptom: 'Python raises NameError: name ''pde_barrier'' is not defined during module
  import or pricer construction.'
root_cause: Dataclass fields and defaults used bare identifiers (e.g. pde_barrier,
  pde_solver, european) that are not defined or imported; these expressions are evaluated
  at import time producing a NameError. Additionally, missing/incorrect PDE grid ctor
  parameters and API mismatches amplify the failure.
fix: Replace bare identifiers with quoted string literals or import the named constants/enums;
  verify dataclass defaults do not reference undefined names and supply required PDE
  grid discretization params. Add a small import-time unit test that instantiates
  the spec to catch NameError.
validation: Discovered during build (attempt 2)
