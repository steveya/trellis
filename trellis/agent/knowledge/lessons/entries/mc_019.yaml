symptom: Build fails with assembly.required_primitive_missing because generated code
  imports CorrelatedGBM but never instantiates or calls it inside the payoff function.
root_cause: The agent generates boilerplate class structure and imports CorrelatedGBM
  but then writes path simulation logic from scratch instead of delegating to CorrelatedGBM,
  so the primitive check fails even though the import is present.
fix: The payoff_fn must instantiate CorrelatedGBM with spots, vols, and correlation
  matrix, call its simulate() method to get (n_paths, n_steps, n_assets) paths, then
  index those paths at each observation date to implement the ranked-removal logic
  and return a (n_paths,) payoff array.
validation: Discovered during build (attempt 3)
