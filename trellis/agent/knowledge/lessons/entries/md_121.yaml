symptom: Build fails because the analytical CDS pricer cannot be constructed without
  a credit_curve and discount_curve, and the generated code imports an unavailable
  Trellis module.
root_cause: The implementation tried to assemble a CDS payoff before a valid credit-curve-driven
  pricing route and primitive adapter were available. It also lacked an explicit CDS
  contract specification and relied on an unresolved module path.
fix: Define a CDS-specific contract spec plus validated credit and discount curve
  inputs, then route analytical pricing through the supported CDS pricing kernel.
  Add a primitive adapter layer that maps the product spec to the actual Trellis CDS
  schedule and pricing functions.
