symptom: Build fails with SyntaxError messages like 'expected except or finally block'
  at lines containing an `if` nested under `try` without proper indentation.
root_cause: The generated pricing module produced malformed Python control flow, typically
  by emitting `if` statements at the same indentation level as `try` or by inserting
  statements before the `except` clause. This happens when template assembly is not
  validated before execution.
fix: Generate the pricing function with strict syntax-aware templates and run a parse/compile
  check before returning the module. Keep all conditional logic fully inside the `try`
  block or fully outside it, and prefer minimal guarded sections around curve access
  and model parameter extraction.
