symptom: The Black-76 analytical route used a hard-coded or external volatility instead
  of sourcing implied vols from market_state.vol_surface.
root_cause: The implementer assumed volatility would be supplied directly as a scalar
  or via a different object rather than using the standardized market_state.vol_surface
  API; this misses required interpolation across strikes/expiries and breaks data-flow
  conventions.
fix: Modify analytical_black76 to fetch implied volatility by querying market_state.vol_surface
  at the option's strike and maturity (with interpolation) and use that value in the
  Black-76 formula.
