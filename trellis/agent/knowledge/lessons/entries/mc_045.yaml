symptom: 'Assembly runtime error: generated payoff function did not call trellis.core.differentiable.get_numpy.'
root_cause: The generated Monte‑Carlo payoff was implemented as ordinary numpy/opaque
  operations and did not adapt to the selected assembly's required semantic primitive
  (trellis.core.differentiable.get_numpy). The payoff also risked returning the wrong
  shape (e.g. (n_paths, n_steps+1)).
fix: Rebuild the payoff as a thin adapter that calls trellis.core.differentiable.get_numpy
  to obtain numpy arrays, perform all pathwise computations in numpy, and ensure the
  payoff returns a 1D array of shape (n_paths,). Follow other assembly constraints
  (no banned imports, correct output shape).
