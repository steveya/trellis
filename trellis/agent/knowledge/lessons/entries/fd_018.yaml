symptom: Build logs contain assembly.required_primitive_missing and/or engine.family_incompatible_with_ir
  errors.
root_cause: Generated payoff code did not call the exact PDE solver primitives required
  by the selected assembly route (theta_method_1d) and instead referenced/used analytical
  routines, causing an engine-family mismatch. The adapter layer between product IR
  and solver primitives was underspecified or incorrect.
fix: Rebuild the payoff as a thin adapter that imports and calls the exact primitives
  from trellis.models.pde.theta_method.theta_method_1d (grid construction, assembler,
  theta-stepper, boundary-condition helpers) and avoid using analytical engines; ensure
  the code declares it uses the 'pde_solver' engine family.
validation: Discovered during build (attempt 3)
