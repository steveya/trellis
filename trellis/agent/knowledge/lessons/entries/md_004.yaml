symptom: The pricing model failed because the required 'credit' market data (credit
  curve) was not provided.
root_cause: The pricer expected a credit curve containing survival probabilities and
  hazard rates, but the market data was missing, likely due to a missing data contract
  or unit/convention mismatch for the 'copula' method.
fix: Supply the necessary credit market data by using a proper credit curve input
  such as Session(credit_curve=CreditCurve.flat(0.02)) to ensure correct data is available
  for pricing.
