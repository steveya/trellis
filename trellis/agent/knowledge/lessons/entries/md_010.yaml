symptom: Pricing model build fails due to missing market data capabilities.
root_cause: The pricing model attempted to use capabilities such as 'black_vol_surface'
  and 'discount_curve' but they were not provided, and the Monte Carlo engine does
  not support the LSM method.
fix: Provide the necessary market data inputs (black vol surface and discount curve)
  and use the dedicated LSM module instead of MonteCarloEngine for LSM-based pricing.
