symptom: The rate tree implementation imported `lattice_step_from_time` from `trellis.core.date_utils`,
  but that symbol is not part of the public API.
root_cause: 'This is a dependency/interface mismatch: the code assumed an internal
  helper existed and stayed stable, instead of relying on exported functions. In lattice
  methods, even a small import error blocks the entire backward-induction pipeline
  before pricing can run.'
fix: Replace the non-exported helper with the correct exported lattice/date utility
  or implement the step calculation locally.
