symptom: Route admissibility failed before generation with unsupported_control_style:issuer_min
  and unsupported_state_tag:schedule_state.
root_cause: The PDE route was assembled with schedule-dependent callable exercise
  state still in a generic schedule form, so the route checker could not map it to
  a supported early-exercise control/state representation. Callable bonds require
  the exercise timeline and intrinsic/continuation state to be normalized before PDE
  branching.
fix: Convert all schedule inputs into explicit exercise dates and a supported callable
  control style before route selection, and initialize the intrinsic/continuation
  comparison state at each call date. For callable bonds, use a Bermudan/issuer-call
  compatible exercise abstraction and ensure the PDE operator sees only supported
  rate-state variables.
