root_cause: The payoff implementation was written as a standalone routine and did
  not act as a thin adapter around required primitives (date utilities and market-state
  discount access). It also did not follow engine-family expectations for CDS Monte
  Carlo (e.g., GaussianCopula and market_state.discount usage).
fix: Rebuild the payoff as a thin adapter that calls trellis.core.date_utils.generate_schedule
  for schedule creation and uses market_state.discount for discounting; ensure the
  MC CDS route uses the GaussianCopula kernel and matches the Monte Carlo engine-family
  primitives.
