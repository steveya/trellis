symptom: The model pointed to a non-existent Trellis module in the validation setup.
root_cause: This happens when the pricing configuration references an invalid or stale
  module path, so the framework cannot resolve the model definition. The mental model
  failure is assuming the configured component name matches an available implementation
  without verifying it.
fix: Replace the invalid module reference with a valid Trellis module path and rerun
  validation.
