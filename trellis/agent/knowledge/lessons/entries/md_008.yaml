symptom: Pricer build failed because required market data inputs were not provided.
root_cause: The pricing model attempted to build a payoff without the necessary market
  data capabilities (discount_curve, forward_rate_curve, volatility_surface), which
  are required for accurate rate instrument valuation.
fix: Ensure that the configuration includes discount_curve, forward_rate_curve, and
  volatility_surface before initiating the payoff building process.
