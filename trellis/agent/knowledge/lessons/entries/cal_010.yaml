symptom: The payer swaption value was computed with incorrect sign convention or misaligned
  strike relative to the forward swap rate.
root_cause: A payer swaption gives the right to pay fixed, so its intrinsic value
  is max(S-K,0) scaled by annuity; confusing payer/receiver or swapping strike and
  forward inverts the payoff direction and yields nonsensical prices.
fix: Ensure the Black/normal formula uses (forwardRate - strikeRate) for payer swaptions
  and verify the annuity discount factor is applied consistently.
validation: Resolved during build of European payer swaption
