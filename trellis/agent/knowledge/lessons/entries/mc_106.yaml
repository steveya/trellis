symptom: The Monte Carlo implementation contained a syntax error in a try/except path,
  so the module could not load and validation failed before any pricing logic ran.
root_cause: In Python, even a small indentation or block-structure mistake breaks
  the entire file, which is easy to miss when adding defensive fallback code around
  simulation or pricing routines. The mental model failure is treating error-handling
  as isolated, when it must still obey exact parser-level syntax.
fix: Keep try/except blocks minimal and well-indented, and always execute a pre-validation
  compile/import step after editing the Monte Carlo code.
