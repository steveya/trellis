root_cause: The pricer wrapper called a lower-level PDE pricing function with a field
  name that is not in its signature. This usually happens when product-state conversion
  is incomplete and instrument terms are passed through without adapting to the kernel's
  expected arguments.
fix: Map the bond specification into the exact argument names accepted by the pricing
  kernel before calling it. Add an adapter layer that converts schedule, coupon, par/notional,
  call dates, and curve inputs early and validates the callable-bond schema against
  the solver signature.
