  copula constructor, indicating the route assumed a different API contract than the
  implementation exposed. This usually happens when the dependence-model interface
  is underspecified or when the pricer is wired against a non-existent wrapper signature.
fix: Add an explicit constructor contract for copula models and instantiate them with
  the correct argument list, using named parameters for correlation, degrees of freedom,
  and market state where applicable. Also validate the route wiring with a minimal
  instantiation smoke test before payoff assembly.
