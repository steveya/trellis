symptom: 'evaluate() raises AttributeError: ''NoneType'' object has no attribute ''value''
  when the market state or one of its required curve objects is missing.'
root_cause: The payoff builder assumed required market data objects were always populated
  and dereferenced them before validating presence. In smoke tests, a missing discount/forward
  curve or settlement field caused a None access during payoff construction or evaluation.
fix: Add explicit null checks for every required market-state dependency before reading
  fields like .value, and fail fast with a clear ValueError listing the missing inputs.
  Keep the analytical path only after market-state validation succeeds, especially
  when building interpolation-aware KRDs.
