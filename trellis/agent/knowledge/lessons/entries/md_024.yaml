symptom: 'AttributeError: ''ResolvedBasketSemantics'' object has no attribute ''dividends''
  raised during Monte Carlo payoff construction for a multi-asset ranked-observation
  basket.'
root_cause: The resolve_basket_semantics helper returns a ResolvedBasketSemantics
  dataclass that does not expose a 'dividends' field; the payoff code (or semantic_basket
  module) attempted to access .dividends on it, which does not exist in that object's
  interface.
fix: Access dividend yields through the MarketState directly (e.g. market_state.get_dividend_yield(ticker))
  rather than through ResolvedBasketSemantics, or pass dividend yields explicitly
  as a separate dict keyed by underlying name before constructing the payoff.
validation: Discovered during build (attempt 2)
