symptom: Codegen terminated with error containing 'unapproved Trellis module `trellis.models.processes.gbm`'
  and the generated MC payoff omitted calls to market_state.discount and required
  primitives.
root_cause: The generator imported an unapproved simulation module and did not follow
  the MC payoff template rules (must use market_state.discount, required primitives,
  correct shapes and date/float handling). This produced an invalid payoff implementation
  and indentation/shape mismatches.
fix: 'Switch to an approved simulation engine (e.g. trellis.models.monte_carlo.engine)
  and rebuild the MC payoff using the canonical evaluate() pattern: compute schedule
  and accruals, sample paths or default times via the approved state/process primitives,
  compute premium and protection legs using market_state.discount and the spec primitives,
  and ensure correct array shapes and date-to-float conversions. Add smoke tests that
  assert use of market_state.discount and required primitives.'
validation: Discovered during build (attempt 3)
