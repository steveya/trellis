symptom: Build fails with assembly.required_primitive_missing because generated payoff
  code imports black76 or other non-CDS primitives instead of trellis.models.credit_default_swap.price_cds_monte_carlo.
root_cause: The code generator defaults to familiar MC primitives (e.g. black76, generic
  engine) instead of the assembly-route-mandated CDS-specific primitive, violating
  the thin-adapter contract enforced by the harness.
fix: Always import and call trellis.models.credit_default_swap.price_cds_monte_carlo
  as the single pricing kernel inside evaluate(); do not substitute any other module
  even if the signature looks compatible.
