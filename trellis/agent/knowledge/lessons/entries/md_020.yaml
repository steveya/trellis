id: md_020
title: MarketState date fields must be real date objects not strings
severity: critical
category: market_data
status: validated
confidence: 0.6
created: '2026-03-28T08:50:58.774255'
version: ''
source_trace: /Users/steveyang/Projects/steveya/trellis/trellis/agent/knowledge/traces/20260328_085058_basket_option_monte_carlo.yaml
applies_when:
  method:
