symptom: 'Smoke test raises ''Invalid isoformat string: test'' when MarketState is
  constructed with a placeholder string date instead of a real date object.'
root_cause: When building the payoff the agent passed a raw string literal (e.g. 'test')
  as the valuation_date argument to MarketState, which internally calls date.fromisoformat()
  and fails on non-ISO strings or bare test tokens.
fix: Always pass a concrete date object (e.g. date.today() or date(2026,1,1)) to MarketState;
  never pass bare strings, sentinel values, or placeholder tokens as date arguments.
validation: Discovered during build (attempt 2)
