root_cause: This happens when the implementation plan changes between model branches
  and the control-flow structure is not rechecked before emitting code. The mental
  model failure is treating fallback logic as a content decision rather than a syntactic
  one that must preserve valid Python block structure.
fix: Keep fallback returns inside the except block or add an explicit indented pass/body,
  then re-parse the module before testing.
