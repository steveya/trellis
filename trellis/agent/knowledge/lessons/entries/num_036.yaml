root_cause: The generated pricing module contained invalid Python control-flow, typically
  from mis-indented assignments placed between a try and its except. This prevents
  even a correct FFT/COS pricing route from loading and blocks all downstream validation.
fix: Generate the pricing function from a strict template with syntactic guards, and
  run a syntax check before returning code. Keep all statements inside the try block
  indented consistently, or move the calculation outside the try after handling the
  fallback values.
