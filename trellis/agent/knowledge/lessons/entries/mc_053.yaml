symptom: Monte‑Carlo PV magnitude is implausible (|PV| > 10 × notional) or negative
  during smoke tests.
root_cause: The MC payoff implementation used incorrect units/inputs (e.g., passed
  a rate or vol in wrong units) and did not use the supplied MarketState discount
  factors or required primitives; additionally a Date vs float comparison and generated-code
  indentation/syntax errors caused the module to fail compilation.
fix: Use market_state.discount for present value calculations, validate and scale
  all cashflows to notional units, convert date differences to year fractions before
  numerical comparisons, sample default times from the hazard-rate process or convert
  hazard→survival correctly, and fix generator indentation/format to produce syntactically
  valid code.
