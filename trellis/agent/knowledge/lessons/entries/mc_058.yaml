symptom: A quoted running spread in basis points was used directly as a decimal (e.g.,
  100 treated as 100.0), dramatically inflating cashflows and producing an implausible
  negative PV.
root_cause: The implementation assumed spreads were already in decimal form and didn't
  normalize market-quote units, so accrual and premium leg calculations were scaled
  by orders of magnitude—this is a unit-conversion mental model failure.
fix: Normalize spread inputs by converting basis points to decimal (divide bps by
  10,000, e.g., 150 bps -> 0.015) or enforce/validate input units before valuation.
