symptom: The PDE pricer function signature did not accept the coupon_rate argument
  expected by the validation harness.
root_cause: 'This is an interface mismatch rather than a model error: the harness
  calls a standard contract, but the implementation exposed a different parameter
  set. The mental model failure is treating internal function names/arguments as flexible
  instead of enforcing the exact external API.'
fix: Align the function signature with the required API, including coupon_rate, and
  map it into the solver inputs without changing the harness call.
