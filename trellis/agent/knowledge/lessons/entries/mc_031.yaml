symptom: 'Build fails with: RankedObservationBasketSpec.__init__() got an unexpected
  keyword argument ''asset_names'''
root_cause: RankedObservationBasketSpec does not expose an 'asset_names' constructor
  parameter; asset identity is resolved through a different mechanism (likely constituent
  indices or a separate resolution step) rather than being passed directly by name.
fix: Do not pass 'asset_names' to RankedObservationBasketSpec. Parse constituent names
  first, resolve them to the required internal representation, and supply only the
  arguments the spec actually accepts.
