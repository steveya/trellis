symptom: The validation failed because the analytical pricing run depended on an OpenAI
  text request that timed out or failed immediately.
root_cause: The mental model assumed the pricing workflow would always have a reliable
  upstream data/service call, but external requests can fail independently of the
  model logic. When that happens, the valuation never reaches the analytical method
  and the test fails before any pricing can occur.
fix: Add retry, fallback, and explicit error handling for the external request so
  the pricing path can proceed or fail gracefully.
