symptom: A fallback call was placed after an except clause without indentation, causing
  a syntax error.
root_cause: 'The mental model failed to account for Python’s block structure: an except
  must contain an indented suite, even for a simple fallback path. This often happens
  when adding compatibility branches quickly and missing the required nesting.'
fix: Indent the fallback call inside the except block and verify each try/except branch
  has a valid executable suite.
