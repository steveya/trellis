symptom: A fallback branch was started with an except block but the next implementation
  was not indented under it, causing a syntax error.
root_cause: The mental model failure was treating alternate method logic as if it
  could be appended inline without preserving Python block structure. In practice,
  any fallback or try/except path must be fully scoped and syntactically complete
  before adding the next function definition.
fix: Keep try/except fallback implementations fully indented and define helper functions
  outside the exception block only after the block ends.
