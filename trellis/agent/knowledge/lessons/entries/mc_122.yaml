symptom: 'Generated module raises SyntaxError: expected ''except'' or ''finally''
  block at the line immediately after a ''try:'' statement.'
root_cause: The code generator inserted control-flow statements at the wrong indentation
  level, so the body of the 'try' block was not syntactically valid. This typically
  happens when patching or stitching snippets together without re-emitting a full
  indented block.
fix: Always generate complete try/except blocks with consistent indentation and validate
  the module before returning it. For Monte Carlo pricers, keep pricing/evaluation
  logic in a single well-formed function and avoid inserting branch code directly
  under 'try:' without indentation.
