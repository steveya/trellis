symptom: Build failed with missing required primitive and missing credit curve input
  errors during analytical basket construction.
root_cause: The pricer assembly expected a credit-risk contract, but the generated
  payoff was not a thin adapter around the required primitives and did not bind the
  required credit_curve/contract specification. As a result, the route could not validate
  or price the nth-to-default basket consistently.
fix: Add an explicit credit curve input and contract validation before pricing, then
  wrap the analytical payoff as a thin adapter around the required route primitives.
