symptom: Monte Carlo payoff generation raised `local variable 'intrinsic' referenced
  before assignment` during the market state smoke test.
root_cause: The generated payoff branch used `intrinsic` outside the conditional block
  where it was assigned. This typically happens in templated payoff code when indentation
  or branch coverage is wrong.
fix: Define the intrinsic payoff in a single, unconditional expression before any
  branch-specific logic, or ensure every branch assigns it. Add a smoke test that
  evaluates a representative in-the-money and out-of-the-money path to catch uninitialized
  locals.
