symptom: The analytical Black-76 pricer was implemented without sourcing volatility
  from market_state.vol_surface.
root_cause: This happens when the mental model treats the closed-form formula as self-contained
  and overlooks that its inputs must still come from the same market data plumbing
  as the numerical methods. As a result, the pricer may compile but be disconnected
  from the calibrated volatility surface used by validation and cross-checks.
fix: Wire the analytical vanilla route to pull volatility directly from market_state.vol_surface
  and use that value consistently in pricing.
