symptom: Build fails with assembly.required_primitive_missing because generated code
  imports black76_call/black76_put instead of trellis.models.credit_default_swap.price_cds_analytical.
root_cause: The agent selected the analytical method but routed through the IR/Black
  primitive family instead of the credit_default_swap module. The payoff class never
  calls the required primitive price_cds_analytical, so the assembly validation rejects
  it.
fix: Always import and call trellis.models.credit_default_swap.price_cds_analytical
  as the sole pricing kernel in the evaluate() method. The payoff should be a thin
  adapter that maps CDSSpec and MarketState fields to that primitive's arguments.
