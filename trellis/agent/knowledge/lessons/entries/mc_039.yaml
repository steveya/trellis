root_cause: Dataclass fields used bare Python identifiers (e.g. euler, monte_carlo)
  instead of string literals, Enums, or imported constants; those identifiers are
  not defined when the class is created, causing an immediate NameError. Additionally,
  evaluate-time assumptions (e.g. market_state.as_of exists) were not guarded.
fix: 'Use string literals or defined constants/Enum for defaults (e.g. scheme: str
  = ''euler''), or import the intended symbols; validate/guard accesses to market_state
  attributes before using them.'
