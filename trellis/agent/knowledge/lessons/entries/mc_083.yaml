root_cause: The pricing request did not define the payoff contract shape clearly enough
  for the DSL to generate a valid payoff function. For Monte Carlo pricing, the engine
  needs the exact product type, schedule, and payoff assumptions to map paths to scalar
  payoffs.
fix: 'Add an explicit product-shape contract before extending the DSL: specify whether
  the payoff is vanilla, path-dependent, basket, Asian, or other; provide schedule/maturity
  conventions; and define the payoff formula and observation points. Then implement
  the payoff so it returns one scalar per path.'
