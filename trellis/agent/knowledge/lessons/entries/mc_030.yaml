symptom: Build fails with `RankedObservationBasketSpec.__init__() got an unexpected
  keyword argument 'start_date'` during market-state smoke test.
root_cause: The agent passed `start_date` to `RankedObservationBasketSpec` even though
  that dataclass does not declare that field; the constructor only accepts the fields
  it explicitly defines (e.g. observation_dates, num_assets, notional, etc.).
fix: Remove `start_date` from the kwargs passed to `RankedObservationBasketSpec`;
  if a reference date is needed, derive it from the first observation date or pass
  it separately to the pricing function rather than the spec constructor.
validation: Discovered during build (attempt 3)
