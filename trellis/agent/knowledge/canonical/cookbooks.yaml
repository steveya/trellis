analytical:
  description: Closed-form or semi-closed-form pricing under specific modeling assumptions. Each solution contract below is valid only within its stated assumptions and payoff definition. The contracts are not interchangeable.
  applicable_instruments:
    - bond
    - cap
    - floor
    - cds
    - nth_to_default
    - swaption
    - european_option
  version: canonical
  solution_contracts:
    - id: black_scholes_equity
      name: Black-Scholes / Black76 equity European
      assumptions:
        - lognormal spot dynamics (GBM)
        - deterministic interest rates
        - no dividends (or continuous dividend yield absorbed into forward)
        - European exercise only
      payoff: European vanilla call or put on an equity spot
      market_data: [discount_curve, black_vol_surface, spot]
      lattice_equivalence: CRR binomial tree with matching GBM assumptions converges to this contract
      pde_equivalence: Black-Scholes PDE with terminal max(S-K,0) or max(K-S,0) recovers this contract
    - id: black_scholes_digital
      name: Black-Scholes / Black76 cash-or-nothing digital
      assumptions:
        - lognormal spot dynamics (GBM)
        - deterministic interest rates
        - European exercise only
      payoff: Cash-or-nothing digital call or put on an equity spot
      market_data: [discount_curve, black_vol_surface, spot]
      lattice_equivalence: CRR binomial tree with matching GBM assumptions converges to the discounted binary payoff
      pde_equivalence: Black-Scholes PDE with binary terminal condition recovers this contract
    - id: garman_kohlhagen_fx
      name: Garman-Kohlhagen FX European
      assumptions:
        - lognormal FX spot dynamics
        - deterministic domestic and foreign interest rates
        - covered interest parity (F = S * df_foreign / df_domestic)
        - European exercise only
      payoff: European vanilla call or put on an FX spot rate
      market_data: [domestic_discount_curve, foreign_discount_curve, black_vol_surface, fx_spot]
      lattice_equivalence: CRR tree with dual-curve discounting under same assumptions
      pde_equivalence: Garman-Kohlhagen PDE with appropriate boundary conditions
    - id: black76_forward_rate
      name: Black76 forward-rate
      assumptions:
        - lognormal forward rate dynamics
        - deterministic discount factors
        - rate fixing at period start, payment at period end
        - European exercise per period (caplet/floorlet) or single expiry (swaption)
      payoff: European call or put on a forward rate, summed over a schedule of periods
      market_data: [discount_curve, forward_curve, black_vol_surface]
      lattice_equivalence: rate tree with matching short-rate vol and mean reversion converges only when the rate distribution assumptions align
      pde_equivalence: not directly applicable (forward-rate models require HJM or similar framework)
    - id: credit_default_swap
      name: Credit default swap / nth-to-default
      assumptions:
        - deterministic discounting
        - piecewise survival probabilities from a credit curve
        - premium leg paid on a discrete schedule
        - protection leg triggered by default before maturity
      payoff: CDS premium leg minus protection leg under a credit-curve survival model
      market_data: [discount_curve, credit_curve]
      lattice_equivalence: not intended for tree routing; use credit survival inputs directly or a copula/Monte Carlo credit model
      pde_equivalence: not directly applicable
    - id: deterministic_cashflow
      name: Deterministic cashflow discounting
      assumptions:
        - all cashflows are known at pricing time
        - no optionality
        - deterministic discount curve
      payoff: sum of discounted known cashflows (coupons, principal, fixed swap legs)
      market_data: [discount_curve]
      lattice_equivalence: any tree recovers the same PV when no exercise or path dependence exists
      pde_equivalence: trivial (no diffusion term)
  template: |
    ## Cookbook: Analytical
    This family contains distinct solution contracts. Each is valid only under
    its stated assumptions. See the `solution_contracts` block above for the
    assumption sets. Do not mix assumptions across contracts.

    evaluate() returns the PV (float) and discounts each period internally.

    ### Black-Scholes equity European (solution contract: black_scholes_equity)
    Assumptions: lognormal spot (GBM), deterministic rates, European exercise.
    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.black import black76_call, black76_put

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        if T <= 0:
            return 0.0

        df = float(market_state.discount.discount(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))
        forward = spec.spot / max(df, 1e-12)

        if spec.option_type == "put":
            undiscounted = black76_put(forward, spec.strike, sigma, T)
        else:
            undiscounted = black76_call(forward, spec.strike, sigma, T)

        return spec.notional * df * float(undiscounted)
    ```

    ### Black-Scholes cash-or-nothing digital (solution contract: black_scholes_digital)
    Assumptions: lognormal spot (GBM), deterministic rates, European exercise.
    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.black import black76_cash_or_nothing_call, black76_cash_or_nothing_put

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        if T <= 0:
            return 0.0

        df = float(market_state.discount.discount(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))
        F = spec.spot / max(df, 1e-12)

        if spec.option_type == "put":
            undiscounted = black76_cash_or_nothing_put(F, spec.strike, sigma, T)
        else:
            undiscounted = black76_cash_or_nothing_call(F, spec.strike, sigma, T)

        pv = spec.notional * float(undiscounted) * df
        return pv
    ```

    ### Garman-Kohlhagen FX European (explicit basis assembly; solution contract: garman_kohlhagen_fx)
    Assumptions: lognormal FX spot, deterministic domestic/foreign rates,
    covered interest parity.
    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.analytical import terminal_vanilla_from_basis
        from trellis.models.black import (
            black76_asset_or_nothing_call,
            black76_asset_or_nothing_put,
            black76_cash_or_nothing_call,
            black76_cash_or_nothing_put,
        )

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        if T <= 0:
            return 0.0

        fx_quote = market_state.fx_rates[spec.fx_pair]
        foreign_curve = market_state.forecast_curves[spec.foreign_discount_key]

        spot = float(fx_quote.spot)
        df_domestic = float(market_state.discount.discount(T))
        df_foreign = float(foreign_curve.discount(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))
        forward = spot * df_foreign / df_domestic

        if spec.option_type == "put":
            asset = black76_asset_or_nothing_put(
                forward, spec.strike, sigma, T
            )
            cash = black76_cash_or_nothing_put(forward, spec.strike, sigma, T)
        else:
            asset = black76_asset_or_nothing_call(
                forward, spec.strike, sigma, T
            )
            cash = black76_cash_or_nothing_call(forward, spec.strike, sigma, T)

        pv = df_domestic * terminal_vanilla_from_basis(
            spec.option_type,
            asset_value=asset,
            cash_value=cash,
            strike=spec.strike,
        )

        return spec.notional * float(pv)
    ```

    For FX tasks, the selected foreign curve is usually bridged into
    `market_state.forward_curve` for routing and capability checks, while the
    explicit foreign discount factors still come from
    `market_state.forecast_curves[spec.foreign_discount_key]`.

    ### Black76 forward-rate (solution contract: black76_forward_rate)
    Assumptions: lognormal forward rate, deterministic discounting,
    rate fixing at period start. Use for caps, floors, swaptions.
    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import generate_schedule, year_fraction
        from trellis.models.black import black76_call, black76_put

        spec = self._spec
        fwd_curve = market_state.forecast_forward_curve(spec.rate_index)

        schedule = generate_schedule(spec.start_date, spec.end_date, spec.frequency)
        starts = [spec.start_date] + schedule[:-1]

        pv = 0.0
        for p_start, p_end in zip(starts, schedule):
            if p_end <= market_state.settlement:
                continue
            tau = year_fraction(p_start, p_end, spec.day_count)
            t_start = year_fraction(market_state.settlement, p_start, spec.day_count)
            t_end = year_fraction(market_state.settlement, p_end, spec.day_count)
            t_start = max(t_start, 1e-6)

            F = fwd_curve.forward_rate(t_start, t_end)
            sigma = market_state.vol_surface.black_vol(t_start, spec.strike)

            # >>> INSTRUMENT-SPECIFIC: choose black76_call or black76_put <<<
            undiscounted = spec.notional * tau * black76_call(F, spec.strike, sigma, t_start)
            df = market_state.discount.discount(t_end)
            pv += float(undiscounted) * float(df)

        return pv
    ```

    ### Credit default swap / nth-to-default (solution contract: credit_default_swap)
    Assumptions: deterministic discounting, credit survival probabilities from
    a credit curve, premium leg on a schedule, protection leg triggered by
    default before maturity.
    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import generate_schedule, year_fraction

        spec = self._spec
        schedule = generate_schedule(spec.start_date, spec.end_date, spec.frequency)
        if not schedule:
            return 0.0

        premium_leg = 0.0
        protection_leg = 0.0
        prev_t = 0.0
        prev_survival = 1.0

        for payment_date in schedule:
            t = year_fraction(market_state.settlement, payment_date, spec.day_count)
            if t <= 0:
                continue

            survival = float(market_state.credit_curve.survival_probability(t))
            default_prob = max(0.0, prev_survival - survival)
            df = float(market_state.discount.discount(t))
            accrual = max(t - prev_t, 0.0)

            premium_leg += spec.notional * spec.spread * accrual * df * survival
            protection_leg += spec.notional * (1.0 - spec.recovery) * default_prob * df

            prev_t = t
            prev_survival = survival

        return protection_leg - premium_leg
    ```

calibration:
  description: Implied-vol calibration for rates options under explicit multi-curve provenance
  applicable_instruments:
    - cap
    - floor
    - swaption
  version: canonical
  template: |
    ## Cookbook: Rates calibration
    Use this pattern when a cap/floor or swaption quote should be converted
    into a flat Black volatility while preserving the selected curve names in
    the result metadata.

    ```python
    from dataclasses import replace

    from trellis.core.market_state import MarketState
    from trellis.models.calibration import (
        calibrate_cap_floor_black_vol,
        calibrate_swaption_black_vol,
    )
    from trellis.models.vol_surface import FlatVol
    from trellis.instruments.cap import CapFloorSpec, CapPayoff, FloorPayoff
    from trellis.instruments._agent.swaption import SwaptionSpec, SwaptionPayoff

    # >>> INSTRUMENT-SPECIFIC: inject the observed quote and the route-specific
    # >>> calibration target here <<<
    # Cap/floor calibration
    cap_spec = CapFloorSpec(...)
    quote_state = MarketState(...)
    target_state = replace(quote_state, vol_surface=FlatVol(0.20))
    target_price = CapPayoff(cap_spec).evaluate(target_state)
    cap_result = calibrate_cap_floor_black_vol(
        cap_spec,
        quote_state,
        target_price,
        kind="cap",
        vol_surface_name="rates_cap_surface",
    )

    # Swaption calibration
    swaption_spec = SwaptionSpec(...)
    swaption_target_state = replace(quote_state, vol_surface=FlatVol(0.18))
    swaption_target_price = SwaptionPayoff(swaption_spec).evaluate(
        swaption_target_state
    )
    swaption_result = calibrate_swaption_black_vol(
        swaption_spec,
        quote_state,
        swaption_target_price,
        vol_surface_name="rates_swaption_surface",
    )

    assert cap_result.provenance["selected_curve_names"]
    assert swaption_result.provenance["selected_curve_names"]
    return cap_result
    return swaption_result
    ```

rate_tree:
  description: Backward induction on calibrated short-rate lattices for callable, puttable, and Bermudan structures
  applicable_instruments:
    - callable_bond
    - puttable_bond
    - bermudan_swaption
  version: canonical
  template: |
    ## Cookbook: Rate Tree (backward induction)
    Use this pattern for instruments with early exercise on interest rates
    (callable bonds, puttable bonds, Bermudan swaptions).

    IMPORTANT: For rate derivatives, use `build_rate_lattice` which creates a
    mean-reverting SHORT-RATE tree (Hull-White style). Do NOT use `BinomialTree.crr`
    for interest-rate exercise problems.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.trees.lattice import build_rate_lattice, lattice_backward_induction

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.end_date, spec.day_count)
        if T <= 0:
            return 0.0

        r0 = float(market_state.discount.zero_rate(max(T / 2, 1e-6)))
        black_vol = float(market_state.vol_surface.black_vol(max(T / 2, 1e-6), r0))
        sigma_hw = black_vol * max(r0, 1e-6)
        mean_reversion = 0.1

        n_steps = min(200, max(50, int(T * 50)))
        lattice = build_rate_lattice(
            r0, sigma_hw, mean_reversion, T, n_steps,
            discount_curve=market_state.discount,
        )

        # >>> INSTRUMENT-SPECIFIC: map coupon/exercise dates to lattice steps <<<
        exercise_steps = []

        def payoff_at_node(step, node, lattice):
            # >>> INSTRUMENT-SPECIFIC: terminal payoff at maturity <<<
            return spec.notional

        def cashflow(step, node, lattice):
            # >>> INSTRUMENT-SPECIFIC: coupon or interim cashflow at this step <<<
            return 0.0

        def exercise_value(step, node, lattice):
            # >>> INSTRUMENT-SPECIFIC: value received on exercise/call/put <<<
            return spec.notional

        price = lattice_backward_induction(
            lattice,
            payoff_at_node,
            exercise_value,
            exercise_type="bermudan",
            exercise_steps=exercise_steps,
            cashflow_at_node=cashflow,
            exercise_fn=min,  # >>> INSTRUMENT-SPECIFIC: min for callable, max for puttable <<<
        )
        return price
    ```

    For issuer-callable structures, pass `exercise_fn=min`.
    For holder-exercised structures such as puttable bonds or Bermudan
    swaptions, pass `exercise_fn=max`.

monte_carlo:
  description: Path simulation for path-dependent or high-dimensional claims, including LSM-based exercise when needed
  applicable_instruments:
    - barrier_option
    - asian_option
    - american_option
    - autocallable
    - variance_swap
    - cds
    - nth_to_default
    - mbs
    - basket_path_payoff
    - ranked_observation_basket
  version: canonical
  template: |
    ## Cookbook: Monte Carlo (path simulation)
    Use this pattern for path-dependent instruments.
    The MC engine computes a discounted expected payoff estimate and returns a float.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.core.differentiable import get_numpy
        from trellis.models.monte_carlo.engine import MonteCarloEngine
        from trellis.models.processes.gbm import GBM

        np = get_numpy()
        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        r = float(market_state.discount.zero_rate(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))

        process = GBM(mu=r, sigma=sigma)
        engine = MonteCarloEngine(
            process,
            n_paths=50000,
            n_steps=max(200, int(T * 252)),
            seed=42,
            method="exact",
        )

        def payoff_fn(paths):
            """paths: ndarray of shape (n_paths, n_steps + 1)."""
            S_T = paths[:, -1]
            # >>> INSTRUMENT-SPECIFIC: compute payoff from paths <<<
            return np.maximum(S_T - spec.strike, 0.0) * spec.notional

    result = engine.price(spec.spot, T, payoff_fn, discount_rate=r)
    return result["price"]
    ```

    ### Credit default swap / nth-to-default (solution contract: credit_default_swap)
    Use this pattern for credit protection legs and premium-leg accrual under
    a hazard-rate or survival-probability model.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import generate_schedule, year_fraction
        from trellis.core.differentiable import get_numpy

        np = get_numpy()
        spec = self._spec
        payment_dates = generate_schedule(spec.start_date, spec.end_date, spec.frequency)
        if not payment_dates:
            return 0.0

        horizon = year_fraction(market_state.settlement, spec.end_date, spec.day_count)
        if horizon <= 0:
            return 0.0

        # First-pass Monte Carlo: sample a default time from the horizon hazard rate.
        # If the request supplies a term structure, replace this with numerical
        # inversion of the survival curve.
        hazard = max(float(market_state.credit_curve.hazard_rate(horizon)), 1e-12)
        n_paths = 50000
        rng = np.random.default_rng(42)
        default_times = -np.log(rng.uniform(size=n_paths)) / hazard

        pv = 0.0
        prev_t = 0.0
        for payment_date in payment_dates:
            t = year_fraction(market_state.settlement, payment_date, spec.day_count)
            if t <= 0:
                continue

            accrual = max(t - prev_t, 0.0)
            survival = float(np.mean(default_times > t))
            df = float(market_state.discount.discount(t))

            premium_leg = spec.notional * spec.spread * accrual * df * survival
            default_prob = float(np.mean((default_times <= t) & (default_times > prev_t)))
            protection_leg = spec.notional * (1.0 - spec.recovery) * df * default_prob

            pv += protection_leg - premium_leg
            prev_t = t

        return pv
    ```

    If the user request is partial or underspecified, do not guess the missing
    contract fields. First derive a required-input checklist from the semantic
    contract, method requirements, and data contracts. Then either synthesize a
    mock input provider plan or surface the exact remaining fields the user
    must supply.

    ### Ranked-observation basket path payoff (solution contract: ranked_observation_basket)
    Use this pattern for ranked-selection basket payoffs with an ordered
    observation schedule and a shared correlated path substrate.

    Keep the adapter thin: resolve the basket semantics first, then delegate to
    the shared basket Monte Carlo helper. Do not reimplement the ranking or
    state-machine logic inside the adapter.

    ```python
    def evaluate(self, market_state):
        from trellis.models.resolution.basket_semantics import resolve_basket_semantics
        from trellis.models.monte_carlo.semantic_basket import (
            price_ranked_observation_basket_monte_carlo,
        )

        resolved = resolve_basket_semantics(market_state, self.spec)
        return price_ranked_observation_basket_monte_carlo(self.spec, resolved)
    ```

    If you need reduced-state evaluation, use the shared basket state helpers
    in `trellis.models.monte_carlo.basket_state` and the ranked-observation
    payoff helpers in `trellis.models.monte_carlo.ranked_observation_payoffs`.

    The generated payoff must declare the market inputs basket pricing actually
    needs: `discount_curve`, `black_vol_surface`, `spot`, and `model_parameters`
    (plus `forward_curve` when the route uses forward drift). Do not emit a
    requirements set that only names `discount_curve`.

    For multi-asset basket routes, do not reshape or index the raw
    `MarketState` as if it were a simulated path tensor. Resolve the basket
    semantics first, then use `resolved.constituent_spots` as the engine's
    initial multi-asset state and pass the resolved basket object directly to
    the shared Monte Carlo helper.

    ### Exact adapter signature
    Use the following adapter shape exactly when generating the payoff module:

    ```python
    def evaluate(self, market_state):
        from datetime import date
        from trellis.models.resolution.basket_semantics import resolve_basket_semantics
        from trellis.models.monte_carlo.semantic_basket import (
            RankedObservationBasketSpec,
            price_ranked_observation_basket_monte_carlo,
        )

        constituents = [
            name.strip()
            for name in self.spec.underlyings.split(",")
            if name.strip()
        ]
        observation_dates = [
            date.fromisoformat(item.strip())
            for item in self.spec.observation_dates.split(",")
            if item.strip()
        ]
        ranked_spec = RankedObservationBasketSpec(
            notional=self.spec.notional,
            strike=self.spec.strike,
            expiry_date=self.spec.expiry_date,
            constituents=",".join(constituents),
            observation_dates=",".join(item.isoformat() for item in observation_dates),
            option_type="call",
            day_count=self.spec.day_count,
        )
        resolved = resolve_basket_semantics(market_state, ranked_spec)
        return price_ranked_observation_basket_monte_carlo(ranked_spec, resolved)
    ```

    Do NOT pass `basket_assets`, `asset_names`, `underlyings`, or `is_call` into
    `RankedObservationBasketSpec`. Do NOT inline a Monte Carlo loop or construct
    `CorrelatedGBM` in the generated payoff module. That state-process primitive
    belongs inside `trellis.models.monte_carlo.ranked_observation_payoffs.build_ranked_observation_basket_process`,
    which is called by the shared helper above.

    ### Bootstrap contract
    Before the final pricing call, launch the generated module with the
    repo-pinned Python interpreter, an explicit shell invocation, and the repo
    workdir. Run an import/compile smoke test before pricing. If you see
    `ModuleNotFoundError`, `ImportError`, `SyntaxError`, or a shell/interpreter
    mismatch, stop and fix bootstrap first instead of continuing into pricing.

    ### Early exercise via approved control primitives
    For American or Bermudan exercise in Monte Carlo, do NOT invent `method="lsm"`
    or a `lsm_mc` alias on `MonteCarloEngine`, and do NOT treat `engine.price(...)`
    as an early-exercise solver.
    Instead:

    - simulate paths with `MonteCarloEngine(..., method="exact" | "euler" | "milstein")`
    - call an approved early-exercise control primitive
    - Trellis currently implements `longstaff_schwartz(...)`
    - if using continuation regression, choose the estimator or basis explicitly
    - `LaguerreBasis` from `trellis.models.monte_carlo.schemes` is a common basis, not a mandatory route primitive
    - use a payoff callback on spot values at exercise dates, not on the full path matrix

    Current concrete example using the implemented `longstaff_schwartz(...)` primitive:

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.core.differentiable import get_numpy
        from trellis.models.monte_carlo.engine import MonteCarloEngine
        from trellis.models.monte_carlo.lsm import longstaff_schwartz
        from trellis.models.monte_carlo.schemes import LaguerreBasis
        from trellis.models.processes.gbm import GBM

        np = get_numpy()
        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        if T <= 0:
            return 0.0

        r = float(market_state.discount.zero_rate(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))

        process = GBM(mu=r, sigma=sigma)
        engine = MonteCarloEngine(
            process,
            n_paths=50000,
            n_steps=max(50, int(T * 100)),
            seed=42,
            method="exact",
        )
        paths = engine.simulate(spec.spot, T)
        dt = T / engine.n_steps
        exercise_dates = list(range(1, engine.n_steps + 1))
        basis = LaguerreBasis()  # example continuation basis, not mandatory

        def exercise_payoff(spots):
            return np.maximum(spec.strike - spots, 0.0)

        return float(
            longstaff_schwartz(
                paths,
                exercise_dates,
                exercise_payoff,
                discount_rate=r,
                dt=dt,
                basis_fn=basis,
            )
        )
    ```

qmc:
  description: Low-discrepancy Monte Carlo accelerators built on Sobol sampling and optional Brownian-bridge path construction
  applicable_instruments:
    - autocallable
    - asian_option
    - barrier_option
    - variance_swap
  version: canonical
  template: |
    ## Cookbook: QMC (Sobol accelerators)
    Use this pattern when plain Monte Carlo is already appropriate but you want
    lower-variance sampling via low-discrepancy sequences.

    This family currently provides Sobol normal draws and Brownian-bridge
    construction helpers. It does NOT provide a separate generic pricing engine.
    Estimation and payoff logic remain Monte Carlo-style.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.core.differentiable import get_numpy
        from trellis.models.qmc import sobol_normals

        np = get_numpy()
        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        if T <= 0:
            return 0.0

        r = float(market_state.discount.zero_rate(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))

        n_paths = 4096  # Sobol is best behaved for power-of-two sample counts
        n_steps = max(64, int(T * 252))
        dt = T / n_steps

        Z = sobol_normals(n_paths, n_steps)
        log_returns = (r - 0.5 * sigma**2) * dt + sigma * np.sqrt(dt) * Z
        log_paths = np.cumsum(log_returns, axis=1)
        spots = spec.spot * np.exp(
            np.concatenate([np.zeros((n_paths, 1)), log_paths], axis=1)
        )

        # >>> INSTRUMENT-SPECIFIC: compute payoff from full paths <<<
        payoffs = np.maximum(spots[:, -1] - spec.strike, 0.0) * spec.notional
        discounted = np.exp(-r * T) * payoffs
        return float(np.mean(discounted))
    ```

copula:
  description: Correlated-default pricing for basket credit and tranche products
  applicable_instruments:
    - cdo
    - nth_to_default
  version: canonical
  template: |
    ## Cookbook: Copula (correlated defaults)
    Use this pattern for portfolio credit instruments.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.copulas.factor import FactorCopula

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.end_date, spec.day_count)
        marginal_prob = 1.0 - float(market_state.credit_curve.survival_probability(T))

        copula = FactorCopula(n_names=spec.n_names, correlation=spec.correlation)
        losses, probs = copula.loss_distribution(marginal_prob)

        # >>> INSTRUMENT-SPECIFIC: compute tranche or basket loss functional <<<
        tranche_el = 0.0
        for n_defaults, prob in zip(losses, probs):
            portfolio_loss = n_defaults / spec.n_names
            tranche_loss = max(
                0.0,
                min(portfolio_loss - spec.attachment, spec.detachment - spec.attachment),
            )
            tranche_el += prob * tranche_loss

        df = float(market_state.discount.discount(T))
        tranche_pv = spec.notional * tranche_el * df
        return tranche_pv
    ```

waterfall:
  description: Structured-cashflow distribution and discounted tranche valuation for MBS/ABS/CLO-style products
  applicable_instruments:
    - mbs
    - abs
    - clo
  version: canonical
  template: |
    ## Cookbook: Waterfall (structured products)
    Use this pattern for MBS, ABS, CLO, and other structured cashflow products.

    ```python
    def evaluate(self, market_state):
        from trellis.models.cashflow_engine.waterfall import Tranche, Waterfall
        from trellis.models.cashflow_engine.prepayment import PSA
        from trellis.models.cashflow_engine.amortization import level_pay

        spec = self._spec
        monthly_rate = spec.coupon / 12.0
        base_schedule = level_pay(spec.notional, monthly_rate, spec.term_months)

        prepay = PSA(speed=spec.psa_speed)
        adjusted = []
        balance = spec.notional
        for month, (interest, principal) in enumerate(base_schedule, 1):
            smm = prepay.smm(month)
            prepaid = balance * smm
            total_principal = min(principal + prepaid, balance)
            adjusted.append((interest, total_principal))
            balance -= total_principal
            if balance <= 0:
                break

        # >>> INSTRUMENT-SPECIFIC: define tranche stack and target tranche <<<
        tranches = [
            Tranche("A", spec.notional * 0.8, spec.coupon_a, subordination=0),
            Tranche("B", spec.notional * 0.2, spec.coupon_b, subordination=1),
        ]
        waterfall = Waterfall(tranches)
        distributions = waterfall.run(adjusted, period=1 / 12)

        pv = 0.0
        for period_idx, dist in enumerate(distributions, 1):
            if spec.tranche_name not in dist:
                continue
            tranche_cash = dist[spec.tranche_name]["interest"] + dist[spec.tranche_name]["principal"]
            if tranche_cash <= 0:
                continue
            t = period_idx / 12.0
            pv += tranche_cash * float(market_state.discount.discount(t))

        return pv
    ```

pde_solver:
  description: One-dimensional finite-difference theta-method pricing with optional obstacle handling
  applicable_instruments:
    - european_option
    - american_option
    - barrier_option
  version: canonical
  template: |
    ## Cookbook: PDE (finite difference theta-method)
    Use this pattern for low-dimensional Markov claims where a 1D PDE is natural.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.pde.grid import Grid
        from trellis.models.pde.theta_method import theta_method_1d
        from trellis.models.pde.operator import BlackScholesOperator
        import numpy as np

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        r = float(market_state.discount.zero_rate(T))
        sigma = float(market_state.vol_surface.black_vol(T, spec.strike))

        S_max = 4.0 * spec.spot
        n_x = 201
        n_t = max(200, int(round(T * 252)))
        grid = Grid(x_min=0.0, x_max=S_max, n_x=n_x, T=T, n_t=n_t)
        # >>> INSTRUMENT-SPECIFIC: define terminal payoff and boundary conditions <<<
        terminal = np.maximum(grid.x - spec.strike, 0.0)
        op = BlackScholesOperator(lambda s, t: sigma, lambda t: r)

        V = theta_method_1d(
            grid,
            op,
            terminal,
            theta=0.5,
            lower_bc_fn=lambda t: 0.0,
            upper_bc_fn=lambda t: S_max - spec.strike * np.exp(-r * (T - t)),
        )

        # For American puts, pass exercise_values and exercise_fn=max.
        # For barrier or digital payoffs, use rannacher_timesteps to smooth
        # the first backward steps and keep the boundary conditions explicit.

        price = float(np.interp(spec.spot, grid.x, V))
        return price * spec.notional
    ```

fft_pricing:
  description: Characteristic-function pricing for European-style options under models such as Heston
  applicable_instruments:
    - heston_option
    - european_option
  version: canonical
  template: |
    ## Cookbook: FFT/COS Transform Pricing
    Use this pattern for models with a stable characteristic function.

    ```python
    def evaluate(self, market_state):
        from trellis.core.date_utils import year_fraction
        from trellis.models.transforms import cos_price
        from trellis.models.processes.heston import Heston

        spec = self._spec
        T = year_fraction(market_state.settlement, spec.expiry_date, spec.day_count)
        r = float(market_state.discount.zero_rate(T))

        # >>> INSTRUMENT-SPECIFIC: set model parameters honestly and explicitly <<<
        process = Heston(
            mu=r,
            kappa=spec.kappa,
            theta=spec.theta,
            xi=spec.xi,
            rho=spec.rho,
            v0=spec.v0,
        )

        # COS expects the characteristic function of log(S_T / S0).
        def char_fn(u):
            return process.characteristic_function(u, T)

        price = cos_price(
            char_fn=char_fn,
            S0=spec.spot,
            K=spec.strike,
            T=T,
            r=r,
            option_type="call",  # >>> INSTRUMENT-SPECIFIC: choose call or put <<<
        )
        return float(price) * spec.notional
    ```
