# Canonical route registry — seed routes transcribed from codegen_guardrails.py
# Phase 8 deterministic route table.  Each route is a self-contained declaration
# of match conditions, primitives, adapters, notes, and market-data access.
#
# Status values: promoted (live), validated (prompt-eligible), candidate (gap-only), archived
# Confidence: 1.0 for canonical seed routes; discovered routes start at 0.5

routes:

  # -----------------------------------------------------------------------
  # Quanto routes (instrument-specific overrides, highest precedence)
  # -----------------------------------------------------------------------

  - id: quanto_adjustment_analytical
    engine_family: analytical
    route_family: analytical
    status: promoted
    confidence: 1.0
    compatibility_alias_policy: internal_only
    reuse_module_paths: [instruments/_agent/quantooptionanalytical.py]
    match:
      methods: [analytical]
      instruments: [quanto_option]
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.quanto_option
        symbol: price_quanto_option_analytical_from_market_state
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: correlated_gbm_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    reuse_module_paths: [instruments/_agent/quantooptionmontecarlo.py]
    match:
      methods: [monte_carlo, qmc]
      instruments: [quanto_option]
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.quanto_option
        symbol: price_quanto_option_monte_carlo_from_market_state
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  # -----------------------------------------------------------------------
  # Credit routes (instrument-specific overrides)
  # -----------------------------------------------------------------------

  - id: credit_default_swap_analytical
    engine_family: analytical
    route_family: credit_default_swap
    status: promoted
    confidence: 1.0
    match:
      methods: [analytical]
      instruments: [cds]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.credit_default_swap
        symbol: build_cds_schedule
        role: schedule_builder
        required: false
      - module: trellis.models.credit_default_swap
        symbol: price_cds_analytical
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  - id: credit_default_swap_monte_carlo
    engine_family: monte_carlo
    route_family: credit_default_swap
    status: promoted
    confidence: 1.0
    match:
      methods: [monte_carlo, qmc]
      instruments: [cds]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.credit_default_swap
        symbol: build_cds_schedule
        role: schedule_builder
        required: false
      - module: trellis.models.credit_default_swap
        symbol: interval_default_probability
        role: event_probability
      - module: trellis.models.credit_default_swap
        symbol: price_cds_monte_carlo
        role: route_helper
      - module: trellis.core.differentiable
        symbol: get_numpy
        role: array_backend
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  - id: nth_to_default_monte_carlo
    engine_family: monte_carlo
    route_family: nth_to_default
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {nth_to_default: 2.0}
    match:
      methods: [monte_carlo, qmc, copula]
      instruments: [nth_to_default]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, remaining_pool, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.core.date_utils
        symbol: year_fraction
        role: time_measure
      - module: trellis.core.differentiable
        symbol: get_numpy
        role: array_backend
      - module: trellis.models.copulas.gaussian
        symbol: GaussianCopula
        role: default_time_sampler
      - module: trellis.instruments.nth_to_default
        symbol: price_nth_to_default_basket
        role: route_helper
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
        required: false
        excluded: true
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  # -----------------------------------------------------------------------
  # Basket routes (instrument/payoff-specific override)
  # -----------------------------------------------------------------------

  - id: correlated_basket_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {basket_path_payoff: 2.0}
      non_european_penalty: -1.5
    match:
      methods: [monte_carlo, qmc]
      payoff_family: [basket_path_payoff]
      payoff_traits: [ranked_observation]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, remaining_pool, locked_cashflow_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.resolution.basket_semantics
        symbol: resolve_basket_semantics
        role: market_binding
      - module: trellis.models.monte_carlo.semantic_basket
        symbol: price_ranked_observation_basket_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots]

  # -----------------------------------------------------------------------
  # Monte Carlo routes (method-level)
  # -----------------------------------------------------------------------

  - id: exercise_monte_carlo
    engine_family: exercise
    route_family: exercise
    status: promoted
    confidence: 1.0
    score_hints:
      exercise_match_bonus: 2.0
      exercise_match_styles: [american, bermudan]
    match:
      methods: [monte_carlo, qmc]
      exercise: [american, bermudan]
    admissibility:
      control_styles: [holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supports_calibration: false
    # NOTE: _route_components calls early_exercise_policy at import time.
    # The notes below are static captures of the policy summaries.
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.lsm
        symbol: longstaff_schwartz
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.tv_regression
        symbol: tsitsiklis_van_roy
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.primal_dual
        symbol: primal_dual_mc
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.stochastic_mesh
        symbol: stochastic_mesh
        role: exercise_control
        required: false
    adapters:
      - derive_exercise_dates_from_schedule_or_time_grid
      - build_spot_to_exercise_payoff_callback
      - select_continuation_estimator_or_basis
    notes:
      - "Use an approved early-exercise control primitive instead of inventing new engine modes."
      - "The implemented primitive is `longstaff_schwartz`; do not rename it to `lsm_mc` or a `method=\"lsm\"` engine mode."
      - "Regression basis choice is a continuation-estimator detail, not a required route primitive."
    # NOTE: early_exercise_policy summaries are dynamic; render at runtime from
    # trellis.agent.early_exercise_policy if needed in prompt.
    dynamic_notes:
      - source: trellis.agent.early_exercise_policy
        function: render_early_exercise_policy_summary
        template: "Approved policy classes: {result}."
      - source: trellis.agent.early_exercise_policy
        function: render_implemented_early_exercise_policy_summary
        template: "Implemented today: {result}."
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: monte_carlo_paths
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      non_european_penalty: -2.0
      penalize_when_market_data: {local_vol_surface: -3.0}
    match:
      methods: [monte_carlo]
      exclude_instruments: [quanto_option, cds, nth_to_default]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supported_process_families: [gbm_1d, hull_white_1f]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.processes.hull_white
        symbol: HullWhite
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.event_aware
        symbol: price_event_aware_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
        primitives:
          - module: trellis.models.equity_option_monte_carlo
            symbol: price_vanilla_equity_option_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: swaption
          exercise_style: [european]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.rate_style_swaption
            symbol: price_swaption_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: basket_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.basket_option
            symbol: price_basket_option_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives: []
        adapters: []

  - id: monte_carlo_fx_vanilla
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    reuse_module_paths: [instruments/_agent/fxvanillamontecarlo.py]
    score_hints:
      bonus_when_market_data: {fx_rates: 4.0, forward_curve: 4.0}
      payoff_family_bonus: {vanilla_option: 1.0}
      non_european_penalty: -2.0
    match:
      methods: [monte_carlo]
      exclude_instruments: [quanto_option, cds, nth_to_default, basket_option]
      required_market_data: [fx_rates, forward_curve]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supported_process_families: [gbm_1d]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.fx_vanilla
        symbol: price_fx_vanilla_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        forward_curve: [market_state.forward_curve, market_state.forecast_curves]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots, market_state.fx_rates]

  - id: local_vol_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      bonus_when_market_data: {local_vol_surface: 3.0, spot: 1.0}
    match:
      methods: [monte_carlo]
      required_market_data: [local_vol_surface]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, schedule_state]
      supported_process_families: [local_vol_1d]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.processes.local_vol
        symbol: LocalVol
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.local_vol
        symbol: local_vol_european_vanilla_price
        role: pricing_kernel
    adapters:
      - map_market_state_local_vol_surface_spot_and_discount_into_local_vol_mc_inputs
      - derive_option_type_strike_and_expiry_for_vanilla_equity_option
    notes:
      - "For vanilla equity local-vol requests, prefer the reusable local-vol Monte Carlo helper over bespoke path loops."
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        local_vol_surface: [market_state.local_vol_surface, market_state.local_vol_surfaces]
        spot: [market_state.spot, market_state.underlier_spots]

  - id: qmc_sobol_paths
    engine_family: qmc
    route_family: qmc
    status: promoted
    confidence: 1.0
    match:
      methods: [qmc]
      exclude_instruments: [quanto_option, cds, nth_to_default, basket_option]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.qmc
        symbol: sobol_normals
        role: low_discrepancy_sampler
      - module: trellis.models.qmc
        symbol: brownian_bridge
        role: path_construction
        required: false
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
    adapters:
      - assemble_mc_style_estimator_on_sobol_paths
    notes:
      - "QMC in Trellis accelerates MC-style estimators rather than replacing them."
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  # -----------------------------------------------------------------------
  # Rate tree routes
  # -----------------------------------------------------------------------

  - id: exercise_lattice
    engine_family: lattice
    route_family: lattice
    status: promoted
    confidence: 1.0
    score_hints:
      exercise_match_bonus: 2.0
      exercise_match_styles: [american, bermudan, issuer_call, holder_put]
      vanilla_exercise_bonus: 1.5
      vanilla_exercise_payoff: vanilla_option
      vanilla_exercise_styles: [american, bermudan]
      schedule_dependence_bonus: 1.0
    match:
      methods: [rate_tree]
      exercise: [american, bermudan, issuer_call, holder_put]
    admissibility:
      control_styles: [identity, holder_max, issuer_min]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state]
      supports_calibration: true
    conditional_route_family:
      - when:
          payoff_family: vanilla_option
          exercise_style: [american, bermudan]
          model_family: equity_diffusion
        route_family: equity_tree
      - when:
          exercise_style: [issuer_call, holder_put, bermudan]
          model_family: interest_rate
        route_family: rate_lattice
      - when: default
        route_family: lattice
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: [american, bermudan]
        primitives:
          - module: trellis.models.equity_option_tree
            symbol: price_vanilla_equity_option_tree
            role: route_helper
        adapters: []
        notes:
          - "Use `trellis.models.equity_option_tree.price_vanilla_equity_option_tree(...)` directly inside `evaluate()` for vanilla American or Bermudan equity tree routes."
          - "Treat equity-tree generation as a thin adapter over the checked-in helper; do not rebuild CRR step math, intrinsic payoff maps, or backward induction inline unless the shared helper is missing required functionality."
          - "When you need a lower-level lattice entry point, call `build_spot_lattice(..., model=\"crr\"|\"jarrow_rudd\")` and `lattice_backward_induction(...)` from `trellis.models.trees.lattice`."
          - "Do not invent `crr_tree`, `AMERICAN`, or a `method=\"lsm\"` fallback on the tree route."
      - when:
          payoff_family: [bond, callable_bond, callable_fixed_income]
          exercise_style: [issuer_call, holder_put, bermudan]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.callable_bond_tree
            symbol: price_callable_bond_tree
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: swaption
          exercise_style: [bermudan]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.bermudan_swaption_tree
            symbol: price_bermudan_swaption_tree
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.trees.lattice
            symbol: build_rate_lattice
            role: lattice_builder
          - module: trellis.models.trees.lattice
            symbol: build_generic_lattice
            role: generic_lattice_builder
            required: false
          - module: trellis.models.trees.lattice
            symbol: lattice_backward_induction
            role: backward_induction
          - module: trellis.models.trees.models
            symbol: MODEL_REGISTRY
            role: model_registry
            required: false
          - module: trellis.models.trees.control
            symbol: build_payment_timeline
            role: payment_timeline_builder
            required: false
          - module: trellis.models.trees.control
            symbol: build_exercise_timeline_from_dates
            role: exercise_timeline_builder
            required: false
          - module: trellis.models.trees.control
            symbol: resolve_lattice_exercise_policy
            role: control_policy
            required: false
          - module: trellis.models.trees.control
            symbol: lattice_step_from_time
            role: single_step_mapper
            required: false
          - module: trellis.models.trees.control
            symbol: lattice_steps_from_timeline
            role: step_mapper
            required: false
        adapters: []
        notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: rate_tree_backward_induction
    engine_family: lattice
    route_family: rate_lattice
    status: promoted
    confidence: 1.0
    score_hints:
      non_european_penalty: -2.0
    match:
      methods: [rate_tree]
    admissibility:
      control_styles: [identity, holder_max, issuer_min]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.trees.lattice
        symbol: build_rate_lattice
        role: lattice_builder
      - module: trellis.models.trees.lattice
        symbol: lattice_backward_induction
        role: backward_induction
    conditional_primitives:
      - when:
          payoff_family: swaption
          exercise_style: [european]
        primitives:
          - module: trellis.models.rate_style_swaption_tree
            symbol: price_swaption_tree
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.trees.lattice
            symbol: build_rate_lattice
            role: lattice_builder
          - module: trellis.models.trees.lattice
            symbol: lattice_backward_induction
            role: backward_induction
        adapters: []
        notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: zcb_option_rate_tree
    engine_family: lattice
    route_family: rate_lattice
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {zcb_option: 2.0}
    match:
      methods: [rate_tree]
      instruments: [zcb_option]
    admissibility:
      control_styles: [identity]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.zcb_option_tree
        symbol: price_zcb_option_tree
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
