# Canonical route registry — seed routes transcribed from codegen_guardrails.py
# Phase 8 deterministic route table.  Each route is a self-contained declaration
# of match conditions, primitives, adapters, notes, and market-data access.
#
# Status values: promoted (live), validated (prompt-eligible), candidate (gap-only), archived
# Confidence: 1.0 for canonical seed routes; discovered routes start at 0.5

routes:

  # -----------------------------------------------------------------------
  # Quanto routes (instrument-specific overrides, highest precedence)
  # -----------------------------------------------------------------------

  - id: equity_quanto
    engine_family: analytical
    route_family: analytical
    status: promoted
    confidence: 1.0
    compatibility_alias_policy: internal_only
    reuse_module_paths:
      - instruments/_agent/quantooptionanalytical.py
      - instruments/_agent/quantooptionmontecarlo.py
    match:
      methods: [analytical, monte_carlo, qmc]
      required_market_data: [fx_rates]
      payoff_traits: [fx_translation]
    conditional_route_family:
      - when:
          methods: [monte_carlo, qmc]
        route_family: monte_carlo
      - when: default
        route_family: analytical
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.resolution.quanto
        symbol: resolve_quanto_inputs
        role: market_binding
      - module: trellis.models.analytical.support
        symbol: quanto_adjusted_forward
        role: assembly_helper
      - module: trellis.models.analytical.support
        symbol: discounted_value
        role: assembly_helper
      - module: trellis.models.analytical.support
        symbol: normalized_option_type
        role: payoff_primitive
      - module: trellis.models.analytical.support
        symbol: terminal_intrinsic
        role: terminal_payoff
      - module: trellis.models.black
        symbol: black76_call
        role: pricing_kernel
      - module: trellis.models.black
        symbol: black76_put
        role: pricing_kernel
    conditional_primitives:
      - when:
          methods: [monte_carlo]
        primitives:
          - module: trellis.models.resolution.quanto
            symbol: resolve_quanto_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: implied_zero_rate
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: terminal_intrinsic
            role: terminal_payoff
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.processes.correlated_gbm
            symbol: CorrelatedGBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: engine
          - module: trellis.models.monte_carlo.path_state
            symbol: terminal_value_payoff
            role: payoff_adapter
        adapters: []
        notes: []
      - when:
          methods: [qmc]
        primitives:
          - module: trellis.models.resolution.quanto
            symbol: resolve_quanto_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: implied_zero_rate
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: terminal_intrinsic
            role: terminal_payoff
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.processes.correlated_gbm
            symbol: CorrelatedGBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: engine
          - module: trellis.models.monte_carlo.path_state
            symbol: terminal_value_payoff
            role: payoff_adapter
          - module: trellis.models.monte_carlo.variance_reduction
            symbol: sobol_normals
            role: low_discrepancy_sampler
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.resolution.quanto
            symbol: resolve_quanto_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: quanto_adjusted_forward
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: discounted_value
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: normalized_option_type
            role: payoff_primitive
          - module: trellis.models.analytical.support
            symbol: terminal_intrinsic
            role: terminal_payoff
          - module: trellis.models.black
            symbol: black76_call
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_put
            role: pricing_kernel
        adapters: []
        notes: []
    adapters: []
    notes:
      - "Resolve the named hybrid market contract, then compose the requested analytical Black or correlated-diffusion simulation lane explicitly; quanto product wrappers are compatibility/reference APIs, not construction authority."
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        forward_curve: [market_state.forward_curve, market_state.forecast_curves]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots]
        fx_rates: [market_state.fx_rates]

  # -----------------------------------------------------------------------
  # Credit routes (instrument-specific overrides)
  # -----------------------------------------------------------------------

  - id: credit_default_swap
    engine_family: analytical
    route_family: event_triggered_two_legged_contract
    status: promoted
    confidence: 1.0
    match:
      methods: [analytical, monte_carlo, qmc]
      required_market_data: [credit_curve]
      payoff_family: [event_triggered_two_legged_contract]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, pathwise_only, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.credit_default_swap
        symbol: build_cds_schedule
        role: schedule_builder
        required: false
      - module: trellis.models.credit_default_swap
        symbol: price_cds_analytical
        role: route_helper
    conditional_primitives:
      - when:
          methods: [monte_carlo, qmc]
        primitives:
          - module: trellis.models.credit_default_swap
            symbol: build_cds_schedule
            role: schedule_builder
            required: false
          - module: trellis.models.credit_default_swap
            symbol: interval_default_probability
            role: event_probability
          - module: trellis.models.credit_default_swap
            symbol: price_cds_monte_carlo
            role: route_helper
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.credit_default_swap
            symbol: build_cds_schedule
            role: schedule_builder
            required: false
          - module: trellis.models.credit_default_swap
            symbol: price_cds_analytical
            role: route_helper
        adapters: []
        notes: []
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  - id: credit_basket_nth_to_default
    engine_family: analytical
    route_family: nth_to_default
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {nth_to_default: 2.0}
    match:
      methods: [analytical, monte_carlo, qmc, copula]
      required_market_data: [credit_curve]
      payoff_family: [nth_to_default]
      model_family: [credit_copula]
    conditional_primitives:
      - when:
          methods: [analytical]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.instruments.nth_to_default
            symbol: price_nth_to_default_basket
            role: route_helper
        adapters: []
        notes: []
      - when:
          methods: [monte_carlo, qmc, copula]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.copulas.gaussian
            symbol: GaussianCopula
            role: default_time_sampler
          - module: trellis.instruments.nth_to_default
            symbol: price_nth_to_default_basket
            role: route_helper
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
            required: false
            excluded: true
        adapters: []
        notes: []
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, remaining_pool, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.core.date_utils
        symbol: year_fraction
        role: time_measure
      - module: trellis.instruments.nth_to_default
        symbol: price_nth_to_default_basket
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  # -----------------------------------------------------------------------
  # Basket routes (instrument/payoff-specific override)
  # -----------------------------------------------------------------------

  - id: correlated_basket_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {basket_path_payoff: 2.0}
      non_european_penalty: -1.5
    match:
      methods: [monte_carlo, qmc]
      payoff_family: [basket_path_payoff]
      payoff_traits: [ranked_observation]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, remaining_pool, locked_cashflow_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.resolution.basket_semantics
        symbol: resolve_basket_semantics
        role: market_binding
      - module: trellis.models.monte_carlo.semantic_basket
        symbol: price_ranked_observation_basket_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots]

  # -----------------------------------------------------------------------
  # Monte Carlo routes (method-level)
  # -----------------------------------------------------------------------

  - id: exercise_monte_carlo
    engine_family: exercise
    route_family: exercise
    status: promoted
    confidence: 1.0
    score_hints:
      exercise_match_bonus: 2.0
      exercise_match_styles: [american, bermudan]
    match:
      methods: [monte_carlo, qmc]
      exercise: [american, bermudan]
    admissibility:
      control_styles: [holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supports_calibration: false
    # NOTE: _route_components calls early_exercise_policy at import time.
    # The notes below are static captures of the policy summaries.
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.lsm
        symbol: longstaff_schwartz
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.tv_regression
        symbol: tsitsiklis_van_roy
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.primal_dual
        symbol: primal_dual_mc
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.stochastic_mesh
        symbol: stochastic_mesh
        role: exercise_control
        required: false
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: [american, bermudan]
          model_family: [equity, equity_diffusion]
        primitives:
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.monte_carlo.lsm
            symbol: longstaff_schwartz
            role: exercise_control
          - module: trellis.models.monte_carlo.single_state_diffusion
            symbol: resolve_single_state_monte_carlo_inputs
            role: market_binding
          - module: trellis.models.resolution.single_state_diffusion
            symbol: terminal_intrinsic_from_resolved
            role: payoff_primitive
    # QUA-880: adapters, static notes, and dynamic_notes retired onto the
    # lane-obligation surface.  `lane_obligations._control_obligations_for`
    # now emits `approved_exercise_policies` / `implemented_exercise_policies`
    # summaries and the LSM naming invariant as typed obligations, and
    # `_construction_steps_for` emits the three exercise-MC construction
    # steps (date derivation, payoff callback, continuation estimator
    # selection) when the control style is `holder_max` or `issuer_min`.
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: monte_carlo_paths
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      non_european_penalty: -2.0
      penalize_when_market_data: {local_vol_surface: -3.0}
    match:
      methods: [monte_carlo]
      exclude_instruments: [quanto_option, cds, nth_to_default]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supported_process_families: [gbm_1d, hull_white_1f]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.processes.hull_white
        symbol: HullWhite
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.event_aware
        symbol: price_event_aware_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
    conditional_primitives:
      - when:
          contract_pattern:
            payoff:
              kind: cliquet_payoff
            exercise:
              style: european
        primitives:
          - module: trellis.models.observation_returns
            symbol: ObservationReturnContract
            role: payoff_contract
          - module: trellis.models.observation_returns
            symbol: observation_return_payoff
            role: payoff_primitive
          - module: trellis.models.processes.gbm
            symbol: PiecewiseConstantGBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
        adapters: []
        notes:
          - "Resolve the contractual observation grid and local/global bounds explicitly, then pass observation_return_payoff(...) to MonteCarloEngine with return_paths=False."
          - "Bind one drift and Black volatility per reset interval through PiecewiseConstantGBM; do not flatten the term structure to the final maturity."
          - "The payoff and engine must use the same exact uniform grid; let ObservationReturnContract fail closed when contractual dates cannot be represented."
          - "Do not call a product pricing wrapper or hand-roll reset branching in the generated adapter."
      - when:
          payoff_family: variance_swap
          exercise_style: [none]
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_scalar_diffusion_market_inputs
            role: market_binding
          - module: trellis.models.monte_carlo.path_statistics
            symbol: SquaredLogReturnContract
            role: payoff_contract
          - module: trellis.models.monte_carlo.path_statistics
            symbol: annualized_squared_log_return_sum
            role: payoff_primitive
          - module: trellis.models.monte_carlo.path_statistics
            symbol: build_squared_log_return_reducer
            role: payoff_primitive
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.monte_carlo.path_state
            symbol: MonteCarloPathRequirement
            role: payoff_contract
          - module: trellis.models.monte_carlo.path_state
            symbol: StateAwarePayoff
            role: payoff_contract
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: numerical_backend
        adapters: []
        notes:
          - "Bind scalar GBM market inputs once with resolve_scalar_diffusion_market_inputs(...), using spot as the explicitly recorded scalar volatility coordinate for this admitted route."
          - "Require annualization_convention='per_year', declare observation steps 0..n_steps, and set SquaredLogReturnContract.annualization_factor to 1 / maturity."
          - "Compose full-path and reduced-state squared-log-return evidence through one StateAwarePayoff; generated adapter code owns historical realized variance, variance strike, notional, discount factor, and estimator output."
          - "Do not delegate generated Monte Carlo source to a product-specific variance-swap helper. Retained product functions are compatibility/reference evidence only."
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [stochastic_volatility]
        primitives:
          - module: trellis.models.monte_carlo.stochastic_vol
            symbol: price_heston_option_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [jump_diffusion]
        primitives:
          - module: trellis.models.merton_jump_diffusion_option
            symbol: price_merton_jump_diffusion_option_monte_carlo
            role: route_helper
        adapters: []
        notes:
          - "Use the Merton jump-diffusion terminal MC helper with `market_state` and `spec`; do not instantiate generic GBM or hand-code jump aggregation in adapters."
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [sabr]
        primitives:
          - module: trellis.models.sabr_option
            symbol: price_sabr_forward_option_monte_carlo
            role: route_helper
        adapters: []
        notes:
          - "Use the SABR forward-option MC helper with `market_state` and `spec`; it owns SABR parameter binding and correlated forward/vol simulation."
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [variance_gamma]
        primitives:
          - module: trellis.models.levy_option
            symbol: price_variance_gamma_option_monte_carlo
            role: route_helper
        adapters: []
        notes:
          - "Use the Variance Gamma terminal MC helper with `market_state` and `spec`; it owns model-parameter binding and gamma-subordination sampling."
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [cgmy]
        primitives:
          - module: trellis.models.levy_option
            symbol: price_cgmy_option_monte_carlo
            role: route_helper
        adapters: []
        notes:
          - "Use the CGMY terminal-distribution MC helper with `market_state` and `spec`; it owns model-parameter binding and declares the CF-inversion sampler."
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [kou]
        primitives:
          - module: trellis.models.levy_option
            symbol: price_kou_option_monte_carlo
            role: route_helper
        adapters: []
        notes:
          - "Use the Kou terminal MC helper with `market_state` and `spec`; it owns double-exponential jump parameter binding and terminal jump sampling."
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [bates]
        primitives:
          - module: trellis.models.bates_option
            symbol: price_bates_option_monte_carlo
            role: route_helper
        adapters: []
        notes:
          - "Use the Bates MC helper with `market_state` and `spec`; it owns Heston parameter binding, jump-parameter binding, and terminal compound-Poisson jumps."
      - when:
          payoff_family: autocallable
        primitives:
          - module: trellis.models.autocallable
            symbol: price_autocallable_monte_carlo_result
            role: route_helper
          - module: trellis.models.autocallable
            symbol: AutocallableMonteCarloConfig
            role: solver_config
            required: false
          - module: trellis.models.autocallable
            symbol: resolve_autocallable_inputs
            role: market_binding
        adapters: []
        notes:
          - "Prefer `price_autocallable_monte_carlo_result(market_state, spec).price` for autocallable MC targets before writing event branching by hand."
          - "Pseudo-MC targets should not require Sobol primitives; QMC comparison targets select Sobol sampling at the adapter/helper call."
      - when:
          payoff_family: barrier_option
          payoff_traits: [single_barrier]
        primitives:
          - module: trellis.models.single_barrier_option
            symbol: price_single_barrier_option_monte_carlo_result
            role: route_helper
          - module: trellis.models.single_barrier_option
            symbol: SingleBarrierMonteCarloConfig
            role: solver_config
            required: false
          - module: trellis.models.single_barrier_option
            symbol: resolve_single_barrier_inputs
            role: market_binding
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.single_barrier_option
            symbol: single_barrier_state_payoff
            role: payoff_primitive
        adapters: []
        notes:
          - "Prefer `price_single_barrier_option_monte_carlo_result(...)` for zero-rebate single-barrier MC targets; it uses one explicit BarrierMonitor and keeps notional scaling aligned with analytical barrier pricing."
      - when:
          payoff_family: barrier_option
          payoff_traits: [double_barrier]
        primitives:
          - module: trellis.models.double_barrier_option
            symbol: price_double_barrier_option_monte_carlo_result
            role: route_helper
          - module: trellis.models.double_barrier_option
            symbol: DoubleBarrierMonteCarloConfig
            role: solver_config
            required: false
          - module: trellis.models.analytical.support.barriers
            symbol: resolve_double_barrier_inputs
            role: market_binding
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.analytical.support.barriers
            symbol: double_barrier_state_payoff
            role: payoff_primitive
        adapters: []
        notes:
          - "Prefer `price_double_barrier_option_monte_carlo_result(...)` for the checked MC surface; if assembling manually, use two explicit BarrierMonitor objects or `double_barrier_state_payoff(...)`."
      - when:
          payoff_family: asian_option
          payoff_traits: [asian, arithmetic_average]
          exclude_payoff_traits: [geometric_average, floating_strike, multi_asset]
          exercise_style: [european]
          schedule_dependence: true
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_single_state_diffusion_inputs
            role: market_binding
          - module: trellis.models.observation_aggregation
            symbol: WeightedObservationContract
            role: payoff_contract
