    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state]
      supports_calibration: false
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
        primitives:
          - module: trellis.models.black
            symbol: black76_call
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_put
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_asset_or_nothing_call
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_asset_or_nothing_put
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_cash_or_nothing_call
            role: pricing_kernel
            required: false
