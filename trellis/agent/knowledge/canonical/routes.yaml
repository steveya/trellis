          payoff_family: barrier_option
          payoff_traits: [single_barrier]
        primitives:
          - module: trellis.models.single_barrier_option
            symbol: price_single_barrier_option_pde_result
            role: route_helper
          - module: trellis.models.single_barrier_option
            symbol: SingleBarrierPDEConfig
            role: solver_config
            required: false
          - module: trellis.models.single_barrier_option
            symbol: resolve_single_barrier_inputs
            role: market_binding
          - module: trellis.models.pde.grid
            symbol: Grid
            role: grid
          - module: trellis.models.pde.operator
            symbol: BlackScholesOperator
            role: spatial_operator
          - module: trellis.models.pde.theta_method
            symbol: theta_method_1d
            role: time_stepping
        adapters: []
        notes:
          - "Prefer `price_single_barrier_option_pde_result(...)` for zero-rebate single-barrier PDE targets; it uses an absorbing boundary at the barrier and a far vanilla boundary."
          - "Use the analytical Rubinstein route for rebate-bearing barriers; the PDE helper intentionally fails closed for non-zero rebates."
      - when:
          payoff_family: barrier_option
          payoff_traits: [double_barrier]
        primitives:
          - module: trellis.models.double_barrier_option
            symbol: price_double_barrier_option_pde_result
            role: route_helper
          - module: trellis.models.double_barrier_option
            symbol: DoubleBarrierPDEConfig
            role: solver_config
            required: false
          - module: trellis.models.analytical.support.barriers
            symbol: resolve_double_barrier_inputs
            role: market_binding
          - module: trellis.models.pde.grid
            symbol: Grid
            role: grid
          - module: trellis.models.pde.operator
            symbol: BlackScholesOperator
            role: spatial_operator
          - module: trellis.models.pde.theta_method
            symbol: theta_method_1d
            role: time_stepping
          - module: trellis.models.analytical.support.barriers
            symbol: terminal_double_barrier_payoff
            role: terminal_payoff
        adapters: []
        notes:
          - "Prefer `price_double_barrier_option_pde_result(...)` for the checked PDE surface; if assembling manually, use a bounded Black-Scholes grid on `[lower_barrier, upper_barrier]` with absorbing boundaries."
      - when: default
        primitives:
          - module: trellis.models.pde.grid
            symbol: Grid
            role: grid
          - module: trellis.models.pde.operator
            symbol: BlackScholesOperator
            role: spatial_operator
          - module: trellis.models.pde.theta_method
            symbol: theta_method_1d
            role: time_stepping
        adapters:
          - define_operator_boundary_terminal_conditions
        notes:
          - "Construct `Grid(x_min, x_max, n_x, T, n_t, log_spacing=...)` and a terminal-condition ndarray before calling `theta_method_1d(grid, operator, terminal_condition, theta=...)`."
          - "Use `BlackScholesOperator(sigma_fn, r_fn)` with callable inputs; do not invent `log_grid_pde` or `uniform_grid_pde` helper names."
          - "For American puts, pass `exercise_values` and `exercise_fn=max` instead of a bare `AMERICAN` constant or a `psor_pde` alias."
          - "For barrier or digital payoffs, keep `lower_bc_fn` / `upper_bc_fn` callables explicit and use `rannacher_timesteps` to smooth the first backward steps."
          - "Do not pass a callable terminal payoff into `theta_method_1d`; the solver expects an ndarray and will copy it internally."
    primitives:
      - module: trellis.models.pde.grid
        symbol: Grid
        role: grid
      - module: trellis.models.pde.operator
        symbol: BlackScholesOperator
        role: spatial_operator
      - module: trellis.models.pde.theta_method
        symbol: theta_method_1d
        role: time_stepping
    adapters:
