# Canonical route registry — seed routes transcribed from codegen_guardrails.py
# Phase 8 deterministic route table.  Each route is a self-contained declaration
# of match conditions, primitives, adapters, notes, and market-data access.
#
# Status values: promoted (live), validated (prompt-eligible), candidate (gap-only), archived
# Confidence: 1.0 for canonical seed routes; discovered routes start at 0.5

routes:

  # -----------------------------------------------------------------------
  # Quanto routes (instrument-specific overrides, highest precedence)
  # -----------------------------------------------------------------------

  - id: quanto_adjustment_analytical
    engine_family: analytical
    route_family: analytical
    status: promoted
    confidence: 1.0
    compatibility_alias_policy: internal_only
    reuse_module_paths: [instruments/_agent/quantooptionanalytical.py]
    match:
      methods: [analytical]
      instruments: [quanto_option]
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.quanto_option
        symbol: price_quanto_option_analytical_from_market_state
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: correlated_gbm_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    reuse_module_paths: [instruments/_agent/quantooptionmontecarlo.py]
    match:
      methods: [monte_carlo, qmc]
      instruments: [quanto_option]
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.quanto_option
        symbol: price_quanto_option_monte_carlo_from_market_state
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

