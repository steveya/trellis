# Canonical route registry — seed routes transcribed from codegen_guardrails.py
# Phase 8 deterministic route table.  Each route is a self-contained declaration
# of match conditions, primitives, adapters, notes, and market-data access.
#
# Status values: promoted (live), validated (prompt-eligible), candidate (gap-only), archived
# Confidence: 1.0 for canonical seed routes; discovered routes start at 0.5

routes:

  # -----------------------------------------------------------------------
  # Quanto routes (instrument-specific overrides, highest precedence)
  # -----------------------------------------------------------------------

  - id: equity_quanto
    engine_family: analytical
    route_family: analytical
    status: promoted
    confidence: 1.0
    compatibility_alias_policy: internal_only
    reuse_module_paths:
      - instruments/_agent/quantooptionanalytical.py
      - instruments/_agent/quantooptionmontecarlo.py
    match:
      methods: [analytical, monte_carlo, qmc]
      required_market_data: [fx_rates]
      payoff_traits: [fx_translation]
    conditional_route_family:
      - when:
          methods: [monte_carlo, qmc]
        route_family: monte_carlo
      - when: default
        route_family: analytical
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.quanto_option
        symbol: price_quanto_option_analytical_from_market_state
        role: route_helper
    conditional_primitives:
      - when:
          methods: [monte_carlo, qmc]
        primitives:
          - module: trellis.models.quanto_option
            symbol: price_quanto_option_monte_carlo_from_market_state
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.quanto_option
            symbol: price_quanto_option_analytical_from_market_state
            role: route_helper
        adapters: []
        notes: []
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
        fx_rates: [market_state.fx_rates]

  # -----------------------------------------------------------------------
  # Credit routes (instrument-specific overrides)
  # -----------------------------------------------------------------------

  - id: credit_default_swap
    engine_family: analytical
    route_family: event_triggered_two_legged_contract
    status: promoted
    confidence: 1.0
    match:
      methods: [analytical, monte_carlo, qmc]
      required_market_data: [credit_curve]
      payoff_family: [event_triggered_two_legged_contract]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, pathwise_only, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.credit_default_swap
        symbol: build_cds_schedule
        role: schedule_builder
        required: false
      - module: trellis.models.credit_default_swap
        symbol: price_cds_analytical
        role: route_helper
    conditional_primitives:
      - when:
          methods: [monte_carlo, qmc]
        primitives:
          - module: trellis.models.credit_default_swap
            symbol: build_cds_schedule
            role: schedule_builder
            required: false
          - module: trellis.models.credit_default_swap
            symbol: interval_default_probability
            role: event_probability
          - module: trellis.models.credit_default_swap
            symbol: price_cds_monte_carlo
            role: route_helper
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.credit_default_swap
            symbol: build_cds_schedule
            role: schedule_builder
            required: false
          - module: trellis.models.credit_default_swap
            symbol: price_cds_analytical
            role: route_helper
        adapters: []
        notes: []
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  - id: credit_basket_nth_to_default
    engine_family: analytical
    route_family: nth_to_default
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {nth_to_default: 2.0}
    match:
      methods: [analytical, monte_carlo, qmc, copula]
      instruments: [nth_to_default]
      required_market_data: [credit_curve]
      payoff_family: [nth_to_default]
    conditional_primitives:
      - when:
          methods: [analytical]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.instruments.nth_to_default
            symbol: price_nth_to_default_basket
            role: route_helper
        adapters: []
        notes: []
      - when:
          methods: [monte_carlo, qmc, copula]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.copulas.gaussian
            symbol: GaussianCopula
            role: default_time_sampler
          - module: trellis.instruments.nth_to_default
            symbol: price_nth_to_default_basket
            role: route_helper
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
            required: false
            excluded: true
        adapters: []
        notes: []
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, remaining_pool, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.core.date_utils
        symbol: year_fraction
        role: time_measure
      - module: trellis.instruments.nth_to_default
        symbol: price_nth_to_default_basket
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        credit_curve: [market_state.credit_curve]

  # -----------------------------------------------------------------------
  # Basket routes (instrument/payoff-specific override)
  # -----------------------------------------------------------------------

  - id: correlated_basket_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {basket_path_payoff: 2.0}
      non_european_penalty: -1.5
    match:
      methods: [monte_carlo, qmc]
      payoff_family: [basket_path_payoff]
      payoff_traits: [ranked_observation]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, remaining_pool, locked_cashflow_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.resolution.basket_semantics
        symbol: resolve_basket_semantics
        role: market_binding
      - module: trellis.models.monte_carlo.semantic_basket
        symbol: price_ranked_observation_basket_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots]

  # -----------------------------------------------------------------------
  # Monte Carlo routes (method-level)
  # -----------------------------------------------------------------------

  - id: exercise_monte_carlo
    engine_family: exercise
    route_family: exercise
    status: promoted
    confidence: 1.0
    score_hints:
      exercise_match_bonus: 2.0
      exercise_match_styles: [american, bermudan]
    match:
      methods: [monte_carlo, qmc]
      exercise: [american, bermudan]
    admissibility:
      control_styles: [holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supports_calibration: false
    # NOTE: _route_components calls early_exercise_policy at import time.
    # The notes below are static captures of the policy summaries.
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.lsm
        symbol: longstaff_schwartz
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.tv_regression
        symbol: tsitsiklis_van_roy
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.primal_dual
        symbol: primal_dual_mc
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.stochastic_mesh
        symbol: stochastic_mesh
        role: exercise_control
        required: false
    # QUA-880: adapters, static notes, and dynamic_notes retired onto the
    # lane-obligation surface.  `lane_obligations._control_obligations_for`
    # now emits `approved_exercise_policies` / `implemented_exercise_policies`
    # summaries and the LSM naming invariant as typed obligations, and
    # `_construction_steps_for` emits the three exercise-MC construction
    # steps (date derivation, payoff callback, continuation estimator
    # selection) when the control style is `holder_max` or `issuer_min`.
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: monte_carlo_paths
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      non_european_penalty: -2.0
      penalize_when_market_data: {local_vol_surface: -3.0}
    match:
      methods: [monte_carlo]
      exclude_instruments: [quanto_option, cds, nth_to_default]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supported_process_families: [gbm_1d, hull_white_1f]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.processes.hull_white
        symbol: HullWhite
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.event_aware
        symbol: price_event_aware_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
        primitives:
          - module: trellis.models.equity_option_monte_carlo
            symbol: price_vanilla_equity_option_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: swaption
          exercise_style: [european]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.rate_style_swaption
            symbol: price_swaption_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: basket_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.basket_option
            symbol: price_basket_option_monte_carlo
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives: []
        adapters: []

  - id: monte_carlo_fx_vanilla
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    reuse_module_paths: [instruments/_agent/fxvanillamontecarlo.py]
    score_hints:
      bonus_when_market_data: {fx_rates: 4.0, forward_curve: 4.0}
      payoff_family_bonus: {vanilla_option: 1.0}
      non_european_penalty: -2.0
    match:
      methods: [monte_carlo]
      exclude_instruments: [quanto_option, cds, nth_to_default, basket_option]
      required_market_data: [fx_rates, forward_curve]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, recombining_safe, schedule_state]
      supported_process_families: [gbm_1d]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.fx_vanilla
        symbol: price_fx_vanilla_monte_carlo
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        forward_curve: [market_state.forward_curve, market_state.forecast_curves]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots, market_state.fx_rates]

  - id: local_vol_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    status: promoted
    confidence: 1.0
    score_hints:
      bonus_when_market_data: {local_vol_surface: 3.0, spot: 1.0}
    match:
      methods: [monte_carlo]
      required_market_data: [local_vol_surface]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, schedule_state]
      supported_process_families: [local_vol_1d]
      supported_path_requirement_kinds: [terminal_only, full_path, event_snapshots, event_replay, reducer_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.processes.local_vol
        symbol: LocalVol
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.local_vol
        symbol: local_vol_european_vanilla_price
        role: pricing_kernel
    # QUA-816: adapters and notes retired to the lane-obligation surface
    # (`lane_obligations._construction_steps_for`, keyed by `EventAwareMonteCarloIR`
    # for this lane).  The typed `state_process` / `path_simulation` /
    # `pricing_kernel` bindings above are the source of truth.
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        local_vol_surface: [market_state.local_vol_surface, market_state.local_vol_surfaces]
        spot: [market_state.spot, market_state.underlier_spots]

  - id: qmc_sobol_paths
    engine_family: qmc
    route_family: qmc
    status: promoted
    confidence: 1.0
    match:
      methods: [qmc]
      exclude_instruments: [quanto_option, cds, nth_to_default, basket_option]
    admissibility:
      control_styles: [identity]
      event_support: automatic
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [pathwise_only, terminal_markov, schedule_state]
      supports_calibration: false
    primitives:
      - module: trellis.models.qmc
        symbol: sobol_normals
        role: low_discrepancy_sampler
      - module: trellis.models.qmc
        symbol: brownian_bridge
        role: path_construction
        required: false
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
    # QUA-816: adapters and notes retired to the lane-obligation surface.
    # The typed `low_discrepancy_sampler` / `path_construction` / `state_process`
    # bindings above are the source of truth for the QMC estimator scaffold.
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  # -----------------------------------------------------------------------
  # Rate tree routes
  # -----------------------------------------------------------------------

  - id: exercise_lattice
    engine_family: lattice
    route_family: lattice
    status: promoted
    confidence: 1.0
    score_hints:
      exercise_match_bonus: 2.0
      exercise_match_styles: [american, bermudan, issuer_call, holder_put]
      vanilla_exercise_bonus: 1.5
      vanilla_exercise_payoff: vanilla_option
      vanilla_exercise_styles: [american, bermudan]
      schedule_dependence_bonus: 1.0
    match:
      methods: [rate_tree]
      exercise: [american, bermudan, issuer_call, holder_put]
    admissibility:
      control_styles: [identity, holder_max, issuer_min]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state]
      supports_calibration: true
    conditional_route_family:
      - when:
          payoff_family: vanilla_option
          exercise_style: [american, bermudan]
          model_family: equity_diffusion
        route_family: equity_tree
      - when:
          exercise_style: [issuer_call, holder_put, bermudan]
          model_family: interest_rate
        route_family: rate_lattice
      - when: default
        route_family: lattice
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: [american, bermudan]
        primitives:
          - module: trellis.models.equity_option_tree
            symbol: price_vanilla_equity_option_tree
            role: route_helper
        adapters: []
        notes:
          - "Use `trellis.models.equity_option_tree.price_vanilla_equity_option_tree(...)` directly inside `evaluate()` for vanilla American or Bermudan equity tree routes."
          - "Treat equity-tree generation as a thin adapter over the checked-in helper; do not rebuild CRR step math, intrinsic payoff maps, or backward induction inline unless the shared helper is missing required functionality."
          - "When you need a lower-level lattice entry point, call `build_spot_lattice(..., model=\"crr\"|\"jarrow_rudd\")` and `lattice_backward_induction(...)` from `trellis.models.trees.lattice`."
          - "Do not invent `crr_tree`, `AMERICAN`, or a `method=\"lsm\"` fallback on the tree route."
      - when:
          payoff_family: [bond, callable_bond, callable_fixed_income]
          exercise_style: [issuer_call, holder_put, bermudan]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.callable_bond_tree
            symbol: price_callable_bond_tree
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: swaption
          exercise_style: [bermudan]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.bermudan_swaption_tree
            symbol: price_bermudan_swaption_tree
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.trees.lattice
            symbol: build_rate_lattice
            role: lattice_builder
          - module: trellis.models.trees.lattice
            symbol: build_generic_lattice
            role: generic_lattice_builder
            required: false
          - module: trellis.models.trees.lattice
            symbol: lattice_backward_induction
            role: backward_induction
          - module: trellis.models.trees.models
            symbol: MODEL_REGISTRY
            role: model_registry
            required: false
          - module: trellis.models.trees.control
            symbol: build_payment_timeline
            role: payment_timeline_builder
            required: false
          - module: trellis.models.trees.control
            symbol: build_exercise_timeline_from_dates
            role: exercise_timeline_builder
            required: false
          - module: trellis.models.trees.control
            symbol: resolve_lattice_exercise_policy
            role: control_policy
            required: false
          - module: trellis.models.trees.control
            symbol: lattice_step_from_time
            role: single_step_mapper
            required: false
          - module: trellis.models.trees.control
            symbol: lattice_steps_from_timeline
            role: step_mapper
            required: false
        adapters: []
        notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: rate_tree_backward_induction
    engine_family: lattice
    route_family: rate_lattice
    status: promoted
    confidence: 1.0
    score_hints:
      non_european_penalty: -2.0
    match:
      methods: [rate_tree]
    admissibility:
      control_styles: [identity, holder_max, issuer_min]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl, exercise_boundary]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state]
      supports_calibration: true
    primitives:
      - module: trellis.models.trees.lattice
        symbol: build_rate_lattice
        role: lattice_builder
      - module: trellis.models.trees.lattice
        symbol: lattice_backward_induction
        role: backward_induction
    conditional_primitives:
      - when:
          payoff_family: swaption
          exercise_style: [european]
        primitives:
          - module: trellis.models.rate_style_swaption_tree
            symbol: price_swaption_tree
            role: route_helper
        adapters: []
        notes: []
      - when: default
        primitives:
          - module: trellis.models.trees.lattice
            symbol: build_rate_lattice
            role: lattice_builder
          - module: trellis.models.trees.lattice
            symbol: lattice_backward_induction
            role: backward_induction
        adapters: []
        notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  # -----------------------------------------------------------------------
  # Analytical routes (fallback)
  # -----------------------------------------------------------------------

  - id: analytical_black76
    engine_family: analytical
    route_family: analytical
    status: promoted
    confidence: 1.0
    compatibility_alias_policy: internal_only
    score_hints:
      payoff_family_bonus: {swaption: 1.0, vanilla_option: 1.0}
      non_european_penalty: -4.0
    match:
      methods: [analytical]
      # QUA-909 / QUA-910: Black76 now hosts the helper-backed closed-form
      # equity exotics that still live on the same vol-surface-driven
      # analytical lane. ``barrier_option`` and ``variance_swap`` already
      # surface route-local payoff families, while ``digital_option``,
      # ``lookback_option``, and ``cliquet_option`` still decompose to
      # ``payoff_family="composite_option"`` today. Admit those three via an
      # explicit instrument-positive list until the semantic layer emits more
      # specific payoff-family tags; barrier / variance are also listed so
      # ``_augment_ir_with_promoted_route_support`` can project the promoted
      # analytical family into their benchmark IRs. Chooser / compound stay out
      # by omission so QUA-911 can absorb them separately.
      #
      # The ``exercise: [european, bermudan, none]`` positive filter is the
      # principled discriminant against American exercise vanilla options.
      # ``vanilla_option`` is a shared payoff family across European and
      # American styles; without this filter Black76's broad positive
      # payoff-family match would admit American requests, which would then
      # propagate ``analytical`` into the request's
      # ``candidate_engine_families`` via
      # ``_augment_ir_with_promoted_route_support`` and drive the product-
      # IR pricing-method selector to pick ``analytical`` over the true
      # Monte-Carlo / rate-tree / PDE solvers. Black76's ``when`` clauses
      # only handle ``european`` (vanilla, basket, absorbed exotics, swaption),
      # ``bermudan`` (swaption via the lower-bound helper), and ``none``
      # (variance swaps), so restricting the match clause to those exercise
      # styles matches the concrete capability surface.
      #
      # The ``exclude_required_market_data: [fx_rates]`` clause is retained
      # as a market-data-shape discriminant (not instrument-name dispatch)
      # against quanto and FX-vanilla requests. Those contracts currently
      # declare ``payoff_family="vanilla_option"`` in
      # ``trellis/agent/semantic_contracts.py`` and therefore still reach
      # this route under the positive ``payoff_family`` filter; their
      # pricing plans, however, emit ``fx_rates`` to drive
      # ``quanto_adjustment_analytical`` and ``analytical_garman_kohlhagen``
      # respectively. Black76 does not model FX coupling, so excluding
      # plans that require ``fx_rates`` is the principled market-data-shape
      # discriminant here (the Phase 1 pattern we are moving toward, vs.
      # the instrument-name ``exclude_instruments`` pattern we are
      # retiring). Once the decomposer emits a more specific
      # ``payoff_family`` for quanto / FX-vanilla (Phase 2+ work), this
      # exclusion becomes redundant and can be dropped.
      instruments: [barrier_option, digital_option, lookback_option, chooser_option, compound_option, cliquet_option, variance_swap]
      required_market_data: [black_vol_surface]
      payoff_family: [vanilla_option, basket_option, swaption, barrier_option, variance_swap]
      exercise: [european, bermudan, none]
      exclude_required_market_data: [fx_rates]
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe, schedule_state, path_dependent]
      supports_calibration: false
    # QUA-920 / QUA-910 / QUA-911: the first four structural when-clauses
    # below stay in DSL form, while the absorbed equity-exotic helper clauses
    # stay in legacy tag-filter form. The current ProductIR does not yet
    # expose distinct payoff-family tags for digital / lookback / chooser /
    # compound / cliquet; chooser and compound also share the same
    # ``payoff_traits`` tuple as digital. Their helper selection therefore
    # stays instrument-keyed until the semantic layer grows a narrower
    # discriminant than ``composite_option``.
    conditional_primitives:
      - when:
          contract_pattern:
            payoff:
              kind: vanilla_payoff
        primitives:
          - module: trellis.models.black
            symbol: black76_call
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_put
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_asset_or_nothing_call
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_asset_or_nothing_put
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_cash_or_nothing_call
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_cash_or_nothing_put
            role: pricing_kernel
            required: false
          - module: trellis.models.analytical
            symbol: terminal_vanilla_from_basis
            role: assembly_helper
            required: false
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
        adapters:
          - map_spot_discount_and_vol_to_forward_black76
        notes:
          - "For European vanilla equity options, derive the forward from spot and discounting before calling Black-style kernels."
          - "For plain European call/put comparators, prefer direct `black76_call` / `black76_put` on the forward. Only assemble from asset-or-nothing and cash-or-nothing basis claims when the request explicitly needs the decomposition."
          - "For cash-or-nothing digital options, use the Black76 digital helpers directly instead of a vanilla call/put approximation."
      - when:
          contract_pattern:
            payoff:
              kind: basket_payoff
            exercise:
              style: european
            underlying:
              kind: equity_diffusion
        primitives:
          - module: trellis.models.basket_option
            symbol: price_basket_option_analytical
            role: route_helper
        adapters: []
        notes: []
      - when:
          contract_pattern:
            payoff:
              kind: swaption_payoff
            exercise:
              style: bermudan
        primitives:
          - module: trellis.models.rate_style_swaption
            symbol: price_bermudan_swaption_black76_lower_bound
            role: route_helper
        adapters: []
        notes: []
      - when:
          contract_pattern:
            payoff:
              kind: swaption_payoff
            exercise:
              style: european
        primitives:
          - module: trellis.models.rate_style_swaption
            symbol: price_swaption_black76
            role: route_helper
        adapters: []
        notes: []
      - when:
          payoff_family: barrier_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.analytical.barrier
            symbol: barrier_option_price
            role: route_helper
        adapters: []
        notes:
          - "Use `barrier_option_price` directly with scalar spot/strike/barrier/rate/sigma/T inputs instead of instantiating `ResolvedBarrierInputs` in generated adapters."
          - "When the contract carries discrete monitoring or non-zero dividend carry, pass `observations_per_year` and `q` through explicitly."
      - when:
          payoff_family: variance_swap
        primitives:
          - module: trellis.models.analytical.equity_exotics
            symbol: price_equity_variance_swap_analytical
            role: route_helper
          - module: trellis.models.analytical.equity_exotics
            symbol: equity_variance_swap_outputs_analytical
            role: pricing_kernel
            required: false
        adapters: []
        notes:
          - "Use the variance-swap helper with `market_state` and `spec`; keep fair-strike and price output assembly in the shared analytical module."
      - when:
          payoff_family: composite_option
          payoff_traits: [path_dependent]
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.analytical.equity_exotics
            symbol: price_equity_fixed_lookback_option_analytical
            role: route_helper
        adapters: []
        notes:
          - "Use the dedicated lookback helper with `market_state` and `spec`; do not restate the running-extreme formula inside the generated payoff."
      - when:
          instrument: chooser_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.analytical.equity_exotics
            symbol: price_equity_chooser_option_analytical
            role: route_helper
        adapters: []
        notes:
          - "Use the chooser helper with `market_state` and `spec`; keep the critical-spot solve inside the shared helper."
      - when:
          instrument: compound_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.analytical.equity_exotics
            symbol: price_equity_compound_option_analytical
            role: route_helper
        adapters: []
        notes:
          - "Use the compound-option helper with `market_state` and `spec`; keep the critical-spot solve inside the shared helper."
      - when:
          payoff_family: composite_option
          payoff_traits: [vanilla_option]
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.analytical.equity_exotics
            symbol: price_equity_cliquet_option_analytical
            role: route_helper
        adapters: []
        notes:
          - "Use the cliquet helper with `market_state` and `spec`; keep observation-date resets and carry handling in the shared helper."
      - when:
          payoff_family: composite_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.analytical.equity_exotics
            symbol: price_equity_digital_option_analytical
            role: route_helper
        adapters: []
        notes:
          - "Use the exact digital helper with `market_state` and `spec`; do not rebuild the Black digital payoff inline."
      # The ``default`` sentinel intentionally stays in legacy form: it is
      # dispatched by ``resolve_route_primitives`` as the explicit fall-through
      # catch-all, not as a structural ContractPattern match. QUA-920 does not
      # migrate this marker.
      - when: default
        primitives:
          - module: trellis.models.black
            symbol: black76_call
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_put
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_asset_or_nothing_call
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_asset_or_nothing_put
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_cash_or_nothing_call
            role: pricing_kernel
            required: false
          - module: trellis.models.black
            symbol: black76_cash_or_nothing_put
            role: pricing_kernel
            required: false
          - module: trellis.models.analytical
            symbol: terminal_vanilla_from_basis
            role: assembly_helper
            required: false
          - module: trellis.core.date_utils
            symbol: build_payment_timeline
            role: schedule_builder
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
        adapters:
          - extract_forward_and_annuity_from_market_state
        notes:
          - "Prefer thin orchestration around existing analytical kernels."
          - "For schedule-driven analytical products such as caps and floors, prefer `build_payment_timeline(...)` so accrual fractions and model times stay explicit."
          - "Terminal vanilla payoffs should be assembled from asset-or-nothing and cash-or-nothing basis claims when the decomposition is exact."
          - "For cash-or-nothing digital options, use the Black76 digital helpers directly instead of a vanilla call/put approximation."
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  # QUA-915 / Contract IR Phase 1.9: collapsed ZCB-option family.
  # Replaces the instrument-keyed ``zcb_option_analytical`` (Jamshidian's
  # trick closed form) and ``zcb_option_rate_tree`` (Hull-White lattice)
  # pair with one pattern-keyed route. Both methods price a European
  # option on a zero-coupon bond under a mean-reverting short-rate model
  # and share the discount_curve + black_vol_surface market-data shape;
  # ``conditional_primitives`` dispatch picks the kernel per requested
  # pricing method. Admissibility is the intersection of the two legacy
  # routes (see QUA-887 failure-mode note below in the admissibility
  # block). Per-method admissibility widening is tracked as follow-on
  # work once the registry supports method-conditional admissibility.
  - id: short_rate_bond_option
    engine_family: analytical
    route_family: zcb_option
    status: promoted
    confidence: 1.0
    score_hints:
      payoff_family_bonus: {zcb_option: 2.0}
    match:
      methods: [analytical, rate_tree]
      required_market_data: [discount_curve, black_vol_surface]
      payoff_family: [zcb_option]
    conditional_route_family:
      - when:
          methods: [rate_tree]
        route_family: rate_lattice
      - when: default
        route_family: analytical
    admissibility:
      control_styles: [identity]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: single_currency_only
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      # Intersection of the two legacy routes (per QUA-887 "Failure modes
      # to watch": admissibility envelopes must be the intersection, not
      # the union, when collapsing so a collapsed route does not silently
      # widen what the family accepts).
      #   analytical (Jamshidian): [terminal_markov, schedule_state]
      #   rate_tree (Hull-White):  [terminal_markov, recombining_safe, schedule_state]
      #   intersection            : [terminal_markov, schedule_state]
      supported_state_tags: [terminal_markov, schedule_state]
      # analytical: False; rate_tree: True -> intersection keeps the
      # stricter False so the collapsed route does not admit calibration
      # steps the analytical Jamshidian branch cannot honour.
      supports_calibration: false
    conditional_primitives:
      - when:
          methods: [analytical]
        primitives:
          - module: trellis.models.zcb_option
            symbol: price_zcb_option_jamshidian
            role: route_helper
        adapters: []
        notes: []
      - when:
          methods: [rate_tree]
        primitives:
          - module: trellis.models.zcb_option_tree
            symbol: price_zcb_option_tree
            role: route_helper
        adapters: []
        notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        black_vol_surface: [market_state.vol_surface]

  - id: analytical_garman_kohlhagen
    engine_family: analytical
    route_family: analytical
    status: promoted
    confidence: 1.0
    reuse_module_paths: [instruments/_agent/fxvanillaanalytical.py]
    score_hints:
      payoff_family_bonus: {vanilla_option: 1.0}
      non_european_penalty: -4.0
    match:
      methods: [analytical]
      exclude_instruments: [quanto_option, cds, nth_to_default]
      required_market_data: [fx_rates, forward_curve]
    admissibility:
      control_styles: [identity, holder_max]
      event_support: none
      phase_sensitivity: default_phase_order_only
      multicurrency_support: native_payout_with_fx
      supported_outputs: [price, scenario_pnl]
      supports_sensitivity_outputs: true
      supported_state_tags: [terminal_markov, recombining_safe]
      supports_calibration: false
    primitives:
      - module: trellis.models.fx_vanilla
        symbol: price_fx_vanilla_analytical
        role: route_helper
    adapters: []
    notes: []
    market_data_access:
      required:
        discount_curve: [market_state.discount]
        forward_curve: [market_state.forward_curve, market_state.forecast_curves]
        black_vol_surface: [market_state.vol_surface]
        spot: [market_state.spot, market_state.underlier_spots, market_state.fx_rates]

