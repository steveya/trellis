  modeling_requirements:
    - >-
      CONVERGENCE: Use at least 50,000 paths for LSM. Verify standard error <1%.
    - >-
      EXERCISE STRATEGY: Use Longstaff-Schwartz LSM with Laguerre basis for
      high-vol regimes (sigma >= 0.40).
  reasoning: "Early exercise needs LSM Monte Carlo or tree/PDE. MC is most general."
