- instrument: basket_path_payoff
  features:
    - ranked_observation
    - remaining_selection
    - remove_selected
    - locked_returns
    - maturity_settlement
    - multi_asset
    - path_dependent
    - discounting
  method: monte_carlo
  method_modules:
    - trellis.models.resolution.basket_semantics
    - trellis.models.analytical.support
    - trellis.models.processes.correlated_gbm
    - trellis.models.monte_carlo.engine
    - trellis.models.monte_carlo.ranked_observation_payoffs
  required_market_data: [discount_curve, spot, black_vol_surface, correlation]
  modeling_requirements:
    - >-
      OBSERVATION SCHEDULE: ranked-selection payoffs need ordered observation
      dates; do not collapse the state machine into a single terminal payoff.
    - >-
      CORRELATED PATHS: bind the market state once, derive the domestic rate,
      construct CorrelatedGBM, and use the same explicit step grid for both
      MonteCarloEngine and the ranked snapshot-state payoff.
  reasoning: "Ranked selection over a multi-asset path-dependent basket requires explicit correlated-process and reduced-state payoff composition."
  notes: "Canonical family-name-free basket proving case; route by semantic contract, not a mountain-range product name."
  learned: false

