- instrument: variance_swap
  features: [path_dependent, discounting, vol_surface_dependence]
  method: monte_carlo
  method_modules:
    - trellis.models.monte_carlo.engine
    - trellis.models.processes.gbm
  required_market_data: [discount_curve, black_vol_surface]
  modeling_requirements:
    - >-
      CONVERGENCE: Use at least 50,000 paths. Realized variance is sum of
      (log(S_{t+1}/S_t))^2 — needs fine time grid for accuracy.
    - >-
      ANALYTICAL COMPARISON: When an analytical quote-grid target is requested,
      use the bounded FinancePy-compatible smile-slope approximation over
      year_fraction, linear_interp, and discount_factor_from_zero_rate. Validate
      the strike/volatility grid and keep fair-strike plus settlement assembly
      in generated code; do not call a product variance-swap helper or claim a
      full log-contract integral.
  reasoning: "Variance swap payoff depends on realized variance; Monte Carlo is the default pathwise method, while the admitted analytical comparison is a bounded quote-grid approximation."
  learned: false

# QUA-852: anchor intent-based requests for analytical exotic pricers on the
# promoted analytical route. QUA-1183 moves the admitted European digital
# cohort to basis-kernel composition. This table remains one-entry-per-
# instrument, so method-specific fixed-lookback Monte Carlo composition is
# selected from routes.yaml/backend_bindings.yaml and must not overwrite the
# analytical default below.
- instrument: digital_option
  features: [terminal_markov, discounting, vol_surface_dependence]
  method: analytical
  method_modules:
    - trellis.models.resolution.single_state_diffusion
    - trellis.models.analytical.support
    - trellis.models.black
  required_market_data: [discount_curve, black_vol_surface]
  modeling_requirements:
    - "Start with `resolve_single_state_diffusion_inputs(market_state, spec)`, then build the Black forward with `forward_from_dividend_yield`; do not duplicate date, rate, volatility, or option-type binding."
    - "Select `black76_cash_or_nothing_call` / `black76_cash_or_nothing_put` for cash settlement and multiply by cash payoff, or `black76_asset_or_nothing_call` / `black76_asset_or_nothing_put` for asset settlement without cash scaling."
    - "Apply discount and notional exactly once with `discounted_value`, reject unknown payout types, and use `cash_or_nothing_intrinsic` / `asset_or_nothing_intrinsic` for strict expiry semantics."
  reasoning: "European digital claims are a small basis-selection problem over reusable Black-76 cash/asset call/put kernels; no product wrapper is required."
  learned: false

- instrument: lookback_option
  features: [lookback, path_dependent, discounting, vol_surface_dependence]
  method: analytical
  method_modules:
    - trellis.models.resolution.single_state_diffusion
    - trellis.models.analytical.support
    - trellis.models.analytical.support.probability
  required_market_data: [discount_curve, black_vol_surface]
  modeling_requirements:
    - "Admit only European fixed-strike continuous monitoring under constant scalar diffusion inputs; reject floating strike, discrete monitoring, non-European exercise, local/stochastic volatility, and jumps."
    - "Resolve the runtime spot and strike volatility coordinate with `resolve_scalar_diffusion_market_inputs`, normalize call/put semantics, and use `standard_normal_cdf` plus explicit scalar math for the Conze-Viswanathan formula."
    - "Validate the historical running maximum/minimum against contract spot, include runtime spot in the effective extreme, apply the analytic zero-carry limit, and own expiry settlement and one-time notional scaling in generated code."
    - "Do not call a product-specific analytical lookback helper; retained wrappers are compatibility/reference evidence only."
  reasoning: "The admitted fixed-strike continuous lookback formula is a bounded composition over scalar market, time, discounting, option-normalization, and Gaussian primitives."
  learned: false

- instrument: chooser_option
  features: [terminal_markov, discounting, vol_surface_dependence]
  method: analytical
  method_modules:
    - trellis.models.resolution.single_state_diffusion
    - trellis.models.analytical.support
    - trellis.models.analytical.support.probability
    - trellis.models.black
    - trellis.models.calibration.solve_request
  required_market_data: [discount_curve, black_vol_surface]
  modeling_requirements:
    - "Resolve one explicit longest-expiry market coordinate with `resolve_scalar_diffusion_market_inputs(..., volatility_coordinate=call_strike)`; the admitted formula assumes one constant rate, dividend yield, and Black volatility across both expiry legs."
    - "Require the choice date to lie strictly after settlement and strictly before both expiries; use `year_fraction` for every contractual time."
    - "At the choice date, form call and put values from `forward_from_dividend_yield`, `discount_factor_from_zero_rate`, `discounted_value`, `black76_call`, and `black76_put`; define their difference as the critical-state objective."
    - "Solve the positive critical stock state through finite `SolveBounds`, `ObjectiveBundle`, `SolveRequest`, and `execute_solve_request`; do not add a product helper or an adapter-local Newton loop."
    - "Assemble the simple-chooser value from `bivariate_standard_normal_cdf`, explicit carry/discount factors, strikes, and the solved critical state, then apply notional exactly once."
  reasoning: "A simple chooser is a bounded analytical composition: solve where the future call and put values balance, then integrate the two choice regions with bivariate Gaussian probabilities."
  learned: false

- instrument: compound_option
  features: [terminal_markov, discounting, vol_surface_dependence]
