- instrument: basket_path_payoff
  features:
    - ranked_observation
    - remaining_selection
    - remove_selected
    - locked_returns
    - maturity_settlement
    - multi_asset
    - path_dependent
    - discounting
  method: monte_carlo
  method_modules:
    - trellis.models.resolution.basket_semantics
    - trellis.models.monte_carlo.semantic_basket
  required_market_data: [discount_curve, spot, black_vol_surface, correlation]
  modeling_requirements:
    - >-
      OBSERVATION SCHEDULE: ranked-selection payoffs need ordered observation
      dates; do not collapse the state machine into a single terminal payoff.
    - >-
      CORRELATED PATHS: bind the market state once, then delegate to the shared
      semantic basket helper; do not import or assemble a bespoke correlated GBM
      process in the generated adapter.
  reasoning: "Ranked selection over a multi-asset path-dependent basket is best handled by shared semantic basket binding and a thin helper wrapper."
  notes: "Canonical family-name-free basket proving case; route by semantic contract, not a mountain-range product name."
  learned: false

