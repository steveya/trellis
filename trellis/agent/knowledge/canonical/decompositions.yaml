  required_market_data: [discount_curve, black_vol_surface]
  modeling_requirements:
    - >-
      CONVERGENCE: Use at least 50,000 paths. Verify standard error <1%.
    - >-
      DISCRETE OBSERVATIONS: Simulate paths through exact observation dates.
      Barrier and coupon conditions are checked at discrete dates only.
    - >-
      EARLY REDEMPTION: At each observation date, check if spot >= autocall barrier.
      If triggered, pay redemption amount + accrued coupon and terminate.
  reasoning: "Path-dependent with barrier monitoring and early redemption — MC required."
  learned: false

- instrument: variance_swap
  features: [path_dependent, discounting, vol_surface_dependence]
  method: monte_carlo
  method_modules:
