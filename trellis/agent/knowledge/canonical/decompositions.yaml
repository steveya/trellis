# ---------------------------------------------------------------------------
# Copula instruments
# ---------------------------------------------------------------------------

- instrument: cdo
  features: [credit_risk]
  method: copula
  method_modules:
    - trellis.models.copulas.factor
    - trellis.models.copulas.gaussian
  required_market_data: [discount_curve, credit_curve]
  modeling_requirements:
    - >-
      CALIBRATION: Default probabilities must be consistent with the input credit curve.
      For each name: P(default by T) = 1 - S(T) where S(T) = credit_curve.survival_probability(T).
  reasoning: "Portfolio credit tranching uses copula for default correlation."
  learned: false

- instrument: credit_loss_distribution
  features: [credit_risk]
  method: copula
  method_modules:
    - trellis.models.copulas.factor
    - trellis.models.copulas.gaussian
    - trellis.models.credit_basket_copula
  required_market_data: [discount_curve, credit_curve]
  modeling_requirements:
    - >-
      CALIBRATION: Default probabilities must be consistent with the input credit curve.
      For each name: P(default by T) = 1 - S(T) where S(T) = credit_curve.survival_probability(T).
    - >-
      OUTPUT CONTRACT: Loss-distribution comparison tasks should compare the same discounted
      expected portfolio loss amount across recursive, transform, and Monte Carlo lanes.
  reasoning: "Portfolio loss-distribution tasks use typed copula helpers instead of tranche-specific glue."
  learned: false

- instrument: nth_to_default
  features: [credit_risk]
  method: copula
  method_modules:
    - trellis.models.copulas.gaussian
  required_market_data: [discount_curve, credit_curve]
  modeling_requirements:
    - >-
      CALIBRATION: Default probabilities must be consistent with the input credit curve.
      For each name: P(default by T) = 1 - S(T) where S(T) = credit_curve.survival_probability(T).
  reasoning: "Correlated defaults simulated via copula."
  learned: false

- instrument: cds
  features: [credit_risk, fixed_coupons, discounting]
  method: analytical
  method_modules: []
  required_market_data: [discount_curve, credit_curve]
  modeling_requirements:
    - >-
      CREDIT-SURVIVAL: Price premium leg as sum of
      (spread * notional * accrual * survival(t) * df(t)) over payment schedule.
      Protection leg = (1-recovery) * notional * sum of (default_prob(t) * df(t))
      where default_prob(t) = survival(t_prev) - survival(t).
      Use market_state.credit_curve.survival_probability(t) and
      market_state.discount.discount(t) directly.
    - >-
      MC ALTERNATIVE: For Monte Carlo route, sample default times from
      credit_curve hazard rates: tau = -ln(U) / lambda. Per path, if
      tau < maturity, protection pays (1-recovery)*notional discounted to tau,
      premium accrues to tau. Return shape (n_paths,).
  reasoning: "Single-name CDS: both analytical (survival curve) and MC (hazard rate simulation) routes share credit curve primitives."
  learned: false

