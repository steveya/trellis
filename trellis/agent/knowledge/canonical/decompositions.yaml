- instrument: heston_option
  features: [stochastic_vol, discounting]
  method: fft_pricing
  method_modules:
    - trellis.models.transforms.cos_method
    - trellis.models.transforms.fft_pricer
    - trellis.models.processes.heston
  required_market_data: [discount_curve, black_vol_surface]
  modeling_requirements:
    - >-
      CHARACTERISTIC FUNCTION: Heston CF uses log(S_T/S0) for COS, log(S_T) for FFT.
      Do not mix conventions.
    - >-
      COS TRUNCATION: Center on first cumulant, width from second cumulant.
      Default symmetric truncation can overflow for long maturities.
  reasoning: "Heston model — use FFT/COS for efficient pricing via characteristic function."
  learned: false

