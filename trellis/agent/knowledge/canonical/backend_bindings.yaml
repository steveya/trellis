        primitives:
          - module: trellis.models.rate_cap_floor
            symbol: price_rate_cap_floor_strip_monte_carlo
            role: route_helper
      - when:
          payoff_family: swaption
          exercise_style: [european]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.rate_style_swaption
            symbol: price_swaption_monte_carlo
            role: route_helper
      - when:
          payoff_family: basket_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.basket_option
            symbol: price_basket_option_monte_carlo
            role: route_helper
