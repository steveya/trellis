bindings:
  - route_id: equity_quanto
    engine_family: analytical
    route_family: analytical
    compatibility_alias_policy: internal_only
    primitives:
      - module: trellis.models.resolution.quanto
        symbol: resolve_quanto_inputs
        role: market_binding
      - module: trellis.models.analytical.support
        symbol: quanto_adjusted_forward
        role: assembly_helper
      - module: trellis.models.analytical.support
        symbol: discounted_value
        role: assembly_helper
      - module: trellis.models.analytical.support
        symbol: normalized_option_type
        role: payoff_primitive
      - module: trellis.models.analytical.support
        symbol: terminal_intrinsic
        role: terminal_payoff
      - module: trellis.models.black
        symbol: black76_call
        role: pricing_kernel
      - module: trellis.models.black
        symbol: black76_put
        role: pricing_kernel
    conditional_primitives:
      - when:
          methods: [monte_carlo]
        primitives:
          - module: trellis.models.resolution.quanto
            symbol: resolve_quanto_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: implied_zero_rate
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: terminal_intrinsic
            role: terminal_payoff
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.processes.correlated_gbm
            symbol: CorrelatedGBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: engine
          - module: trellis.models.monte_carlo.path_state
            symbol: terminal_value_payoff
            role: payoff_adapter
      - when:
          methods: [qmc]
        primitives:
          - module: trellis.models.resolution.quanto
            symbol: resolve_quanto_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: implied_zero_rate
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: terminal_intrinsic
            role: terminal_payoff
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.processes.correlated_gbm
            symbol: CorrelatedGBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: engine
          - module: trellis.models.monte_carlo.path_state
            symbol: terminal_value_payoff
            role: payoff_adapter
          - module: trellis.models.monte_carlo.variance_reduction
            symbol: sobol_normals
            role: low_discrepancy_sampler
      - when: default
        primitives:
          - module: trellis.models.resolution.quanto
            symbol: resolve_quanto_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: quanto_adjusted_forward
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: discounted_value
            role: assembly_helper
          - module: trellis.models.analytical.support
            symbol: normalized_option_type
            role: payoff_primitive
          - module: trellis.models.analytical.support
            symbol: terminal_intrinsic
            role: terminal_payoff
          - module: trellis.models.black
            symbol: black76_call
            role: pricing_kernel
          - module: trellis.models.black
            symbol: black76_put
            role: pricing_kernel
    conditional_route_family:
      - when:
          methods: [monte_carlo, qmc]
        route_family: monte_carlo
      - when: default
        route_family: analytical

  - route_id: credit_default_swap
    engine_family: analytical
    route_family: event_triggered_two_legged_contract
    primitives:
      - module: trellis.models.credit_default_swap
        symbol: build_cds_schedule
        role: schedule_builder
        required: false
      - module: trellis.models.credit_default_swap
        symbol: price_cds_analytical
        role: route_helper
    conditional_primitives:
      - when:
          methods: [monte_carlo, qmc]
        primitives:
          - module: trellis.models.credit_default_swap
            symbol: build_cds_schedule
            role: schedule_builder
            required: false
          - module: trellis.models.credit_default_swap
            symbol: interval_default_probability
            role: event_probability
          - module: trellis.models.credit_default_swap
            symbol: price_cds_monte_carlo
            role: route_helper
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
      - when: default
        primitives:
          - module: trellis.models.credit_default_swap
            symbol: build_cds_schedule
            role: schedule_builder
            required: false
          - module: trellis.models.credit_default_swap
            symbol: price_cds_analytical
            role: route_helper

  - route_id: credit_basket_nth_to_default
    engine_family: analytical
    route_family: nth_to_default
    conditional_primitives:
      - when:
          methods: [analytical]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.instruments.nth_to_default
            symbol: price_nth_to_default_basket
            role: route_helper
      - when:
          methods: [monte_carlo, qmc, copula]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: array_backend
          - module: trellis.models.copulas.gaussian
            symbol: GaussianCopula
            role: default_time_sampler
          - module: trellis.instruments.nth_to_default
            symbol: price_nth_to_default_basket
            role: route_helper
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
            required: false
            excluded: true

  - route_id: correlated_basket_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    primitives:
      - module: trellis.models.resolution.basket_semantics
        symbol: resolve_basket_semantics
        role: market_binding
      - module: trellis.models.monte_carlo.semantic_basket
        symbol: price_ranked_observation_basket_monte_carlo
        role: route_helper

  - route_id: exercise_monte_carlo
    engine_family: exercise
    route_family: exercise
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.lsm
        symbol: longstaff_schwartz
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.tv_regression
        symbol: tsitsiklis_van_roy
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.primal_dual
        symbol: primal_dual_mc
        role: exercise_control
        required: false
      - module: trellis.models.monte_carlo.stochastic_mesh
        symbol: stochastic_mesh
        role: exercise_control
        required: false
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: [american, bermudan]
          model_family: [equity, equity_diffusion]
        primitives:
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.monte_carlo.lsm
            symbol: longstaff_schwartz
            role: exercise_control
          - module: trellis.models.monte_carlo.single_state_diffusion
            symbol: resolve_single_state_monte_carlo_inputs
            role: market_binding
          - module: trellis.models.resolution.single_state_diffusion
            symbol: terminal_intrinsic_from_resolved
            role: payoff_primitive

  - route_id: monte_carlo_paths
    engine_family: monte_carlo
    route_family: monte_carlo
    primitives:
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.processes.hull_white
        symbol: HullWhite
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.event_aware
        symbol: price_event_aware_monte_carlo
        role: route_helper
    conditional_primitives:
      - when:
          contract_pattern:
            payoff:
              kind: cliquet_payoff
            exercise:
              style: european
        primitives:
          - module: trellis.models.observation_returns
            symbol: ObservationReturnContract
            role: payoff_contract
          - module: trellis.models.observation_returns
            symbol: observation_return_payoff
            role: payoff_primitive
          - module: trellis.models.processes.gbm
            symbol: PiecewiseConstantGBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
      - when:
          payoff_family: variance_swap
          exercise_style: [none]
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_scalar_diffusion_market_inputs
            role: market_binding
          - module: trellis.models.monte_carlo.path_statistics
            symbol: SquaredLogReturnContract
            role: payoff_contract
          - module: trellis.models.monte_carlo.path_statistics
            symbol: annualized_squared_log_return_sum
            role: payoff_primitive
          - module: trellis.models.monte_carlo.path_statistics
            symbol: build_squared_log_return_reducer
            role: payoff_primitive
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.monte_carlo.path_state
            symbol: MonteCarloPathRequirement
            role: payoff_contract
          - module: trellis.models.monte_carlo.path_state
            symbol: StateAwarePayoff
            role: payoff_contract
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: numerical_backend
      - when:
          payoff_family: credit_loss_distribution
          model_family: [credit_copula]
        primitives:
          - module: trellis.models.credit_basket_copula
            symbol: price_credit_portfolio_loss_distribution_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [stochastic_volatility]
        primitives:
          - module: trellis.models.monte_carlo.stochastic_vol
            symbol: price_heston_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [jump_diffusion]
        primitives:
          - module: trellis.models.merton_jump_diffusion_option
            symbol: price_merton_jump_diffusion_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [sabr]
        primitives:
          - module: trellis.models.sabr_option
            symbol: price_sabr_forward_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [variance_gamma]
        primitives:
          - module: trellis.models.levy_option
            symbol: price_variance_gamma_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [cgmy]
        primitives:
          - module: trellis.models.levy_option
            symbol: price_cgmy_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [kou]
        primitives:
          - module: trellis.models.levy_option
            symbol: price_kou_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [bates]
        primitives:
          - module: trellis.models.bates_option
            symbol: price_bates_option_monte_carlo
            role: route_helper
      - when:
          payoff_family: autocallable
        primitives:
          - module: trellis.models.autocallable
            symbol: price_autocallable_monte_carlo_result
            role: route_helper
          - module: trellis.models.autocallable
            symbol: AutocallableMonteCarloConfig
            role: solver_config
            required: false
          - module: trellis.models.autocallable
            symbol: resolve_autocallable_inputs
            role: market_binding
      - when:
          payoff_family: barrier_option
          payoff_traits: [single_barrier]
        primitives:
          - module: trellis.models.single_barrier_option
            symbol: price_single_barrier_option_monte_carlo_result
            role: route_helper
          - module: trellis.models.single_barrier_option
            symbol: SingleBarrierMonteCarloConfig
            role: solver_config
            required: false
          - module: trellis.models.single_barrier_option
            symbol: resolve_single_barrier_inputs
            role: market_binding
          - module: trellis.models.single_barrier_option
            symbol: single_barrier_state_payoff
            role: payoff_primitive
      - when:
          payoff_family: barrier_option
          payoff_traits: [double_barrier]
        primitives:
          - module: trellis.models.double_barrier_option
            symbol: price_double_barrier_option_monte_carlo_result
            role: route_helper
          - module: trellis.models.double_barrier_option
            symbol: DoubleBarrierMonteCarloConfig
            role: solver_config
            required: false
          - module: trellis.models.analytical.support.barriers
            symbol: resolve_double_barrier_inputs
            role: market_binding
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.analytical.support.barriers
            symbol: double_barrier_state_payoff
            role: payoff_primitive
      - when:
          payoff_family: asian_option
          payoff_traits: [asian, arithmetic_average]
          exclude_payoff_traits: [geometric_average, floating_strike, multi_asset]
          exercise_style: [european]
          schedule_dependence: true
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_single_state_diffusion_inputs
            role: market_binding
          - module: trellis.models.observation_aggregation
            symbol: WeightedObservationContract
            role: payoff_contract
          - module: trellis.models.observation_aggregation
            symbol: weighted_observation_payoff
            role: payoff_primitive
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.monte_carlo.path_state
            symbol: StateAwarePayoff
            role: payoff_contract
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: time_measure
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: numerical_backend
      - when:
          payoff_family: lookback_option
          payoff_traits: [lookback, fixed_strike, continuous_monitoring]
          exclude_payoff_traits: [floating_strike, discrete_monitoring]
          exercise_style: [european]
          model_family: [equity, equity_diffusion]
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_scalar_diffusion_market_inputs
            role: market_binding
          - module: trellis.models.analytical.support
            symbol: normalized_option_type
            role: payoff_primitive
          - module: trellis.models.monte_carlo.transition_state
            symbol: ConditionalBridgeExtremumContract
            role: payoff_contract
          - module: trellis.models.monte_carlo.transition_state
            symbol: build_conditional_bridge_extremum_reducer
            role: payoff_primitive
          - module: trellis.models.processes.gbm
            symbol: GBM
            role: state_process
          - module: trellis.models.monte_carlo.engine
            symbol: MonteCarloEngine
            role: path_simulation
          - module: trellis.models.monte_carlo.path_state
            symbol: MonteCarloPathRequirement
            role: payoff_contract
          - module: trellis.models.monte_carlo.path_state
            symbol: StateAwarePayoff
            role: payoff_contract
          - module: trellis.core.differentiable
            symbol: get_numpy
            role: numerical_backend
      - when:
          payoff_family: vanilla_option
          exercise_style: [european]
          model_family: [generic, equity, equity_diffusion]
        primitives:
          - module: trellis.models.monte_carlo.single_state_diffusion
            symbol: price_single_state_terminal_claim_monte_carlo_result
            role: monte_carlo_estimator
          - module: trellis.models.resolution.single_state_diffusion
            symbol: terminal_intrinsic_from_resolved
            role: payoff_primitive
      - when:
          payoff_family: period_rate_option_strip
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.rate_cap_floor
            symbol: price_rate_cap_floor_strip_monte_carlo
            role: route_helper
      - when:
          payoff_family: swaption
          exercise_style: [european]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.models.rate_style_swaption
            symbol: resolve_swaption_black76_inputs
            role: market_binding
          - module: trellis.core.date_utils
            symbol: build_payment_timeline
            role: schedule_builder
          - module: trellis.models.monte_carlo.event_aware
            symbol: resolve_hull_white_monte_carlo_process_inputs
            role: process_binding
          - module: trellis.models.monte_carlo.event_aware
            symbol: build_discounted_swap_pv_payload
            role: settlement_payload
          - module: trellis.models.monte_carlo.event_aware
            symbol: build_short_rate_discount_reducer
            role: path_reducer
          - module: trellis.models.monte_carlo.event_aware
            symbol: EventAwareMonteCarloEvent
            role: event_contract
          - module: trellis.models.monte_carlo.event_aware
            symbol: EventAwareMonteCarloProblemSpec
            role: problem_spec
          - module: trellis.models.monte_carlo.event_aware
            symbol: build_event_aware_monte_carlo_problem
            role: problem_builder
          - module: trellis.models.monte_carlo.event_aware
            symbol: price_event_aware_monte_carlo
            role: monte_carlo_estimator
      - when:
          payoff_family: basket_option
          exercise_style: [european]
          model_family: [equity_diffusion]
        primitives:
          - module: trellis.models.basket_option
            symbol: price_basket_option_monte_carlo
            role: route_helper
      - when: default

  - route_id: monte_carlo_fx_barrier
    engine_family: monte_carlo
    route_family: monte_carlo
    primitives:
      - module: trellis.models.fx_barrier_option
        symbol: resolve_fx_barrier_inputs
        role: market_binding
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: engine
      - module: trellis.models.monte_carlo.path_state
        symbol: BarrierMonitor
        role: event_monitor
      - module: trellis.models.monte_carlo.path_state
        symbol: MonteCarloPathRequirement
        role: path_requirement
      - module: trellis.models.monte_carlo.path_state
        symbol: StateAwarePayoff
        role: payoff_primitive
      - module: trellis.models.analytical
        symbol: terminal_intrinsic
        role: terminal_payoff

  - route_id: monte_carlo_fx_vanilla
    engine_family: monte_carlo
    route_family: monte_carlo
    primitives:
      - module: trellis.models.fx_vanilla
        symbol: resolve_fx_vanilla_inputs
        role: market_binding
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: engine
      - module: trellis.models.monte_carlo.path_state
        symbol: terminal_value_payoff
        role: payoff_adapter
      - module: trellis.models.analytical
        symbol: terminal_intrinsic
        role: terminal_payoff

  - route_id: local_vol_monte_carlo
    engine_family: monte_carlo
    route_family: monte_carlo
    primitives:
      - module: trellis.models.processes.local_vol
        symbol: LocalVol
        role: state_process
      - module: trellis.models.monte_carlo.engine
        symbol: MonteCarloEngine
        role: path_simulation
      - module: trellis.models.monte_carlo.local_vol
        symbol: local_vol_european_vanilla_price
        role: pricing_kernel

  - route_id: local_vol_pde
    engine_family: pde_solver
    route_family: pde_solver
    primitives:
      - module: trellis.models.local_vol_option
        symbol: price_local_vol_option_pde
        role: route_helper

  - route_id: qmc_sobol_paths
    engine_family: qmc
    route_family: qmc
    primitives:
      - module: trellis.models.qmc
        symbol: sobol_normals
        role: low_discrepancy_sampler
      - module: trellis.models.qmc
        symbol: brownian_bridge
        role: path_construction
        required: false
      - module: trellis.models.processes.gbm
        symbol: GBM
        role: state_process

  - route_id: exercise_lattice
    engine_family: lattice
    route_family: lattice
    conditional_primitives:
      - when:
          payoff_family: vanilla_option
          exercise_style: american
          model_family: equity_diffusion
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_single_state_diffusion_inputs
            role: market_binding
          - module: trellis.models.resolution.single_state_diffusion
            symbol: terminal_intrinsic_from_resolved
            role: payoff_primitive
          - module: trellis.models.trees.algebra
            symbol: equity_tree
            role: contract_recipe
          - module: trellis.models.trees.algebra
            symbol: with_control
            role: exercise_control
          - module: trellis.models.trees.algebra
            symbol: compile_lattice_recipe
            role: contract_compiler
          - module: trellis.models.trees.algebra
            symbol: build_lattice
            role: lattice_builder
          - module: trellis.models.trees.algebra
            symbol: price_on_lattice
            role: backward_induction
      - when:
          payoff_family: vanilla_option
          exercise_style: bermudan
          model_family: equity_diffusion
        primitives:
          - module: trellis.models.resolution.single_state_diffusion
            symbol: resolve_single_state_diffusion_inputs
            role: market_binding
          - module: trellis.models.resolution.single_state_diffusion
            symbol: terminal_intrinsic_from_resolved
            role: payoff_primitive
          - module: trellis.models.trees.algebra
            symbol: equity_tree
            role: contract_recipe
          - module: trellis.models.trees.algebra
            symbol: with_control
            role: exercise_control
          - module: trellis.models.trees.algebra
            symbol: compile_lattice_recipe
            role: contract_compiler
          - module: trellis.models.trees.algebra
            symbol: build_lattice
            role: lattice_builder
          - module: trellis.models.trees.algebra
            symbol: price_on_lattice
            role: backward_induction
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: timeline_mapping
          - module: trellis.models.monte_carlo.event_state
            symbol: event_step_indices
            role: schedule_mapping
      - when:
          payoff_family: [bond, callable_bond, callable_fixed_income, puttable_fixed_income]
          exercise_style: [issuer_call, holder_put, bermudan]
          model_family: [interest_rate, short_rate]
        primitives:
          - module: trellis.core.date_utils
            symbol: year_fraction
            role: timeline_mapping
          - module: trellis.models.short_rate_lattice
