- name: volatility
  method: rate_tree
  source: market_state.vol_surface.black_vol(T, K)
  convention: Black lognormal implied volatility (annualized)
  typical_range: 0.10 to 0.60 (10% to 60%)
  model_expects: Hull-White absolute rate volatility (sigma_HW)
  conversion: 'sigma_HW = sigma_Black * forward_rate. Example: 0.20 * 0.05 = 0.01'
  model_range: 0.003 to 0.030 (0.3% to 3%)
  warning: NEVER pass Black vol directly to a rate tree. A Black vol of 0.20 means
    the RATE moves ~20% in RELATIVE terms. For a 5% rate, the absolute move is 0.20
    * 0.05 = 1% (0.01). Passing 0.20 directly makes rates range from -200% to +200%,
    producing nonsensical prices.
- name: volatility
  method: analytical
  source: market_state.vol_surface.black_vol(T, K)
  convention: Black lognormal implied volatility (annualized)
  typical_range: 0.10 to 0.60
  model_expects: Black lognormal vol (same convention — no conversion needed)
  conversion: None — use directly in black76_call(F, K, sigma, T)
  model_range: 0.10 to 0.60
  warning: ''
- name: TERMINAL_BASKET_MARKET_BINDING
  method: analytical
  source: resolve_terminal_basket_inputs(market_state, spec)
  convention: Named two-underlier spots, Black volatilities, continuous carries,
    a 2x2 correlation matrix, expiry domestic discount factor, weights, strike,
    option type, and terminal basket style
  typical_range: positive spots and volatilities; correlation in [-1, 1]; positive
    discount factor
  model_expects: one coherent ResolvedTerminalBasketInputs contract shared by
    Stulz, Kirk, and Gauss-Hermite kernels
  conversion: derive continuous domestic rate from the expiry discount factor only
    when a raw kernel requires it; do not apply discounting or notional inside more
    than one layer
  model_range: exactly two underliers for Stulz, Kirk, and the bounded reference kernel
  warning: Best/worst-of, spread, and weighted-basket methods are payoff-specific;
    never select a kernel merely because all are two-asset formulas.
- name: FX_DOMESTIC_FOREIGN_DISCOUNTING
  method: analytical
  source: market_state.discount.discount(T) for domestic discounting and market_state.forecast_curves[foreign_discount_key].discount(T)
    for the selected foreign curve; market_state.forward_curve is the bridged foreign-carry
    view of the same input
  convention: Domestic and foreign expiry discount factors under covered interest
    parity
  typical_range: df_domestic and df_foreign usually between 0.80 and 1.00
  model_expects: spot FX plus df_domestic and df_foreign resolved into the
    checked Garman-Kohlhagen helper surface
  conversion: forward = spot * df_foreign / df_domestic; then prefer the checked
    FX helper path (for example garman_kohlhagen_price_raw over resolved inputs),
    using explicit Black76 basis claims only when the decomposition itself is the
    object being validated
  model_range: discount factors remain positive and typically <= 1.00
  warning: NEVER reuse the domestic curve for both currencies or infer the foreign
    discount factor from spot alone; the foreign curve must be selected explicitly.
- name: volatility
  method: monte_carlo
  source: market_state.vol_surface.black_vol(T, K)
  convention: Black lognormal implied volatility (annualized)
  typical_range: 0.10 to 0.60
  model_expects: GBM diffusion coefficient (sigma in dS/S = mu*dt + sigma*dW)
  conversion: Use directly as sigma in GBM(mu=r, sigma=sigma_Black)
  model_range: 0.10 to 0.60
  warning: ''
- name: TERMINAL_BASKET_MARKET_BINDING
  method: monte_carlo
  source: resolve_terminal_basket_inputs(market_state, spec)
  convention: Named two-underlier spots, Black volatilities, continuous carries,
    a 2x2 correlation matrix, expiry domestic discount factor, weights, strike,
    option type, and terminal basket style
  typical_range: positive spots and volatilities; correlation in [-1, 1]; positive
    discount factor
  model_expects: CorrelatedGBM drift vector equal to domestic rate minus each carry,
    plus terminal states consumed by terminal_basket_option_payoff
  conversion: infer the continuous domestic zero rate from the expiry discount factor;
    let the engine return an undiscounted terminal expectation, then apply the resolved
    discount factor and notional once
  model_range: exactly two underliers for the current bounded terminal-basket route
  warning: A terminal-only basket is not a ranked-observation payoff; do not add an
    observation schedule, removal state, or locked-return state.
- name: volatility
  method: qmc
  source: market_state.vol_surface.black_vol(T, K)
  convention: Black lognormal implied volatility (annualized)
  typical_range: 0.10 to 0.60
  model_expects: GBM diffusion coefficient (sigma in dS/S = mu*dt + sigma*dW)
  conversion: Use directly as sigma in Sobol-driven GBM path construction
  model_range: 0.10 to 0.60
  warning: ''
- name: discount_rate
  method: any
  source: market_state.discount.zero_rate(T)
  convention: Continuously compounded zero rate
  typical_range: 0.01 to 0.10 (1% to 10%)
  model_expects: Continuously compounded rate
  conversion: None — zero_rate() already returns CC rate
  model_range: 0.01 to 0.10
  warning: ''
- name: VOL_BLACK_FOR_PDE
  method: pde_solver
  source: market_state.vol_surface.black_vol(T, K)
  convention: Black lognormal implied vol (annualized)
  typical_range: 0.10 to 0.60
  model_expects: Black lognormal vol (same units — no conversion needed)
  conversion: none — use directly as sigma in BlackScholesOperator or GBM diffusion
  model_range: 0.10 to 0.60
  warning: ''
- name: VOL_FOR_FFT_HESTON
  method: fft_pricing
  source: Heston model parameters (v0, kappa, theta, sigma_v, rho)
  convention: v0 is VARIANCE (not vol). v0=0.04 means 20% vol.
  typical_range: 'v0: 0.01 to 0.16 (vol: 10% to 40%)'
  model_expects: Heston variance v0, NOT Black implied vol
  conversion: 'v0 = sigma_Black^2. Example: 20% vol → v0 = 0.04'
  model_range: 'v0: 0.01 to 0.16'
  warning: NEVER pass Black vol directly as v0. A Black vol of 0.20 is v0=0.04, NOT
    v0=0.20.
- name: TERMINAL_BASKET_TRANSFORM_CONVENTION
  method: fft_pricing
  source: resolve_terminal_basket_inputs(market_state, spec) plus correlated_gbm_log_return_characteristic_function
  convention: Joint characteristic function of the two correlated GBM log returns
    log(S_i(T) / S_i(0))
  typical_range: two positive spots, two non-negative volatilities, correlation in
    [-1, 1], positive maturity and strike
  model_expects: a vectorized two-dimensional characteristic function and the Hurd-Zhou
    spread-payoff transform
  conversion: pass the joint log-return characteristic function to
    hurd_zhou_spread_option_2d_fft with explicit spots, strike, maturity, and discount
    factor
  model_range: European two-asset spread claims only
  warning: Do not reuse a one-dimensional Carr-Madan log-price characteristic function
    or treat a generic basket proxy as Hurd-Zhou.
- name: MODEL_PARAMETERS_FOR_HESTON_MC
  method: monte_carlo
  source: Heston model parameters (v0, kappa, theta, sigma_v/xi, rho)
  convention: v0 and theta are variances; xi/sigma_v is volatility of variance.
  typical_range: 'v0/theta: 0.01 to 0.16; xi: 0.05 to 1.00; rho: -0.95 to 0.50'
  model_expects: Explicit Heston parameters plus spot and discount curve, not a Black vol surface.
  conversion: A Black vol surface requires an explicit calibration problem before MC pricing can consume Heston parameters.
  model_range: 'v0/theta: 0.01 to 0.16'
  warning: Use scheme="heston_qe" for Andersen QE targets and scheme="euler" for Euler targets; do not silently fall back between them.
- name: RATE_OPTION_TARGET_PRICE
  method: calibration
  source: quoted cap/floor or swaption price under the selected multi-curve environment
  convention: Present value or quoted price in the same convention used by the pricing
    route
  typical_range: positive price, instrument-dependent
  model_expects: exact instrument spec plus discount/forecast curve provenance and
    a flat Black volatility solve
  conversion: use the quote directly as target_price; the calibrator solves for the
    flat Black volatility implied by that quote
  model_range: non-negative
  warning: keep the discount curve, forecast curve, and rate_index roles explicit;
    do not mix swaption and caplet conventions.
