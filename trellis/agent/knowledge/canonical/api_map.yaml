# API Map — quick reference for the Trellis library surface.
#
# This is the "hot start pack": small enough to always fit in context,
# giving the agent immediate knowledge of key types, imports, and patterns.

# ---------------------------------------------------------------------------
# MarketState
# ---------------------------------------------------------------------------
market_state:
  module: trellis.core.market_state
  class: MarketState
  frozen: true
  fields:
    as_of: "date — observation date for market data"
    settlement: "date — cash settlement date"
    discount: "DiscountCurve | None — OIS curve for discounting"
    forward_curve: "ForwardCurve | None — auto-constructed from discount if not provided; FX tasks may bridge this from the selected foreign curve for carry/forward access"
    vol_surface: "VolSurface | None — volatility surface for option pricing"
    state_space: "StateSpace | None — discrete states with probabilities"
    credit_curve: "CreditCurve | None — survival probability curve"
    forecast_curves: "dict[str, DiscountCurve] | None — keyed by rate index or foreign discount key (e.g. 'USD-SOFR-3M', 'EUR-DISC')"
    fx_rates: "dict[str, FXRate] | None — keyed by pair (e.g. 'EURUSD')"
  accessors:
    discount_factor: "market_state.discount.discount(T)"
    zero_rate: "market_state.discount.zero_rate(T)"
    forward_rate: "market_state.forward_curve.forward_rate(T1, T2)"
    forecast_forward: "market_state.forecast_forward_curve(rate_index).forward_rate(T1, T2)"
    black_vol: "market_state.vol_surface.black_vol(T, K)"
    survival_prob: "market_state.credit_curve.survival_probability(T)"
    hazard_rate: "market_state.credit_curve.hazard_rate(T)"
    risky_discount: "market_state.credit_curve.risky_discount(T, market_state.discount)"
  capabilities:
    - "discount_curve → discount is not None"
    - "forward_curve → forward_curve is not None (auto from discount)"
    - "black_vol_surface → vol_surface is not None"
    - "state_space → state_space is not None"
    - "credit_curve → credit_curve is not None"
    - "fx_rates → fx_rates is not None"

# ---------------------------------------------------------------------------
# Payoff protocol
# ---------------------------------------------------------------------------
payoff:
  module: trellis.core.payoff
  protocol: Payoff
  runtime_checkable: true
  required_properties:
    requirements: "set[str] — capability names needed from MarketState"
  required_methods:
    evaluate: "(market_state: MarketState) -> float — returns present value"
  notes:
    - "Each payoff handles its own discounting internally"
    - "The returned float is the final PV"
    - "DeterministicCashflowPayoff wraps any Instrument into Payoff"

# ---------------------------------------------------------------------------
# Analytical Gaussian and scalar-root composition
# ---------------------------------------------------------------------------
analytical_gaussian_composition:
  module: trellis.models.analytical.support.probability
  methods: [analytical]
  navigation:
    aliases: [gaussian_probability, bivariate_gaussian, critical_state, scalar_root]
  modules:
    probability: trellis.models.analytical.support.probability
    scalar_root: trellis.models.calibration.solve_request
  key_imports:
    - "from trellis.models.analytical.support.probability import standard_normal_cdf, bivariate_standard_normal_cdf"
    - "from trellis.models.calibration.solve_request import ObjectiveBundle, SolveBounds, SolveRequest, execute_solve_request"
  notes:
    - "Use standard_normal_cdf(...) and bivariate_standard_normal_cdf(...) as product-neutral scalar probability kernels; they are SciPy-backed and are not automatic-differentiation primitives"
    - "For an implicit critical state, define the derivative-specific scalar objective in adapter code and solve it through a bounded root_scalar SolveRequest; do not introduce route-local Newton loops or product helpers"
    - "The generated adapter owns the contractual formula, critical-state equation, discounting, and notional application; this card supplies navigation and reusable numerical pieces only"
    - "The bivariate kernel admits finite thresholds and correlations in the closed interval [-1, 1], handles exact singular boundaries explicitly, and fails closed outside that domain"

# ---------------------------------------------------------------------------
# Fixed-strike continuous lookback analytical composition
# ---------------------------------------------------------------------------
fixed_lookback_analytical_composition:
  module: trellis.models.resolution.single_state_diffusion
  methods: [analytical]
  navigation:
    aliases: [lookback_option, fixed_lookback_option, fixed_strike_lookback, continuous_lookback, conze_viswanathan]
  modules:
    market_binding: trellis.models.resolution.single_state_diffusion
    time_measure: trellis.core.date_utils
    analytical_support: trellis.models.analytical.support
    probability: trellis.models.analytical.support.probability
  key_imports:
    - "from trellis.models.resolution.single_state_diffusion import resolve_scalar_diffusion_market_inputs"
    - "from trellis.core.date_utils import year_fraction"
    - "from trellis.models.analytical.support import discount_factor_from_zero_rate, normalized_option_type"
    - "from trellis.models.analytical.support.probability import standard_normal_cdf"
  notes:
    - "Admitted scope is a European fixed-strike continuously monitored call or put under one constant rate, dividend yield, and Black volatility resolved at the expiry and strike coordinate"
    - "Validate positive finite spot, strike, volatility, and running extreme; a call running maximum must be at least contract spot and a put running minimum must be at most contract spot"
    - "Use runtime MarketState.spot when present and include it in the effective maximum or minimum so generic spot-bump Delta follows the same payoff contract"
    - "Generated code owns the Conze-Viswanathan call/put branch, discounting, expiry intrinsic settlement, and one-time notional scaling; use the analytic carry-to-zero limit instead of perturbing dividend yield"
    - "Reject floating strike, discrete monitoring, non-European exercise, non-scalar or non-constant diffusion dynamics, and non-finite formula outputs; do not call a product lookback helper"

# ---------------------------------------------------------------------------
# FinancePy-compatible analytical variance-swap approximation
# ---------------------------------------------------------------------------
variance_swap_smile_slope_composition:
  module: trellis.curves.interpolation
  methods: [analytical]
  navigation:
    aliases: [variance_swap, variance_payoff, quote_grid, smile_slope, fair_strike_variance]
  modules:
    time_measure: trellis.core.date_utils
    interpolation: trellis.curves.interpolation
    analytical_support: trellis.models.analytical.support
  key_imports:
    - "from trellis.core.date_utils import year_fraction"
    - "from trellis.curves.interpolation import linear_interp"
    - "from trellis.models.analytical.support import discount_factor_from_zero_rate"
  notes:
    - "Admitted scope is the FinancePy-compatible smile-slope approximation K_var_fair = sigma_ATM^2 * sqrt(1 + 3 * T * s^2), where s = spot * (sigma_high - sigma_low) / (strike_high - strike_low)"
    - "Parse finite positive volatility quotes on at least two finite positive strictly increasing strikes; reject duplicate, descending, non-finite, nonpositive, or misaligned grids"
    - "After strict monotonicity validation, treat an endpoint strike span with absolute value at most 1e-12 as a flat-smile edge case with s = 0 instead of dividing by the near-zero span"
    - "Use linear_interp for sigma_ATM at runtime MarketState.spot when present, otherwise contract spot; when volatility quotes are absent, sample the Black surface at every admitted strike"
    - "Generated code owns quote-grid defaults, fair_strike_variance output, zero-maturity behavior, discounting, and one-time notional scaling"
    - "This is not full model-free log-contract or static option-strip replication; do not call a product variance-swap helper and do not infer quadrature, truncation, or arbitrary surface-integration support"

# ---------------------------------------------------------------------------
# Simple chooser option raw composition
# ---------------------------------------------------------------------------
chooser_option_composition:
  module: trellis.models.resolution.single_state_diffusion
  methods: [analytical]
  navigation:
    aliases: [chooser_option, chooser_payoff, simple_chooser, critical_state_option]
  modules:
    market_binding: trellis.models.resolution.single_state_diffusion
    time_measure: trellis.core.date_utils
    analytical_support: trellis.models.analytical.support
    probability: trellis.models.analytical.support.probability
    black_kernel: trellis.models.black
    scalar_root: trellis.models.calibration.solve_request
  key_imports:
    - "from trellis.models.resolution.single_state_diffusion import resolve_scalar_diffusion_market_inputs"
    - "from trellis.core.date_utils import year_fraction"
    - "from trellis.models.analytical.support import discount_factor_from_zero_rate, discounted_value, forward_from_dividend_yield"
    - "from trellis.models.black import black76_call, black76_put"
    - "from trellis.models.analytical.support.probability import bivariate_standard_normal_cdf"
    - "from trellis.models.calibration.solve_request import ObjectiveBundle, SolveBounds, SolveRequest, execute_solve_request"
  notes:
    - "Admitted scope is a simple European chooser under one constant rate, dividend yield, and Black volatility projected at the longest expiry and the call-strike volatility coordinate"
    - "Represent the longest-expiry market coordinate with a local frozen value satisfying ScalarDiffusionMarketSpecLike; do not add a chooser resolver or pass the multi-date chooser spec as if it had one expiry_date"
    - "Require settlement < choose_date < call_expiry_date and put_expiry_date, with positive spot, strikes, and volatility"
    - "At the choice date, build call and put present values with forward_from_dividend_yield, discount_factor_from_zero_rate, discounted_value, black76_call, and black76_put; their difference is the scalar root objective"
    - "Use finite positive SolveBounds with a verified sign change, then execute one root_scalar SolveRequest; do not use an unbounded Newton loop"
    - "The adapter owns the critical-state equation, bivariate-Gaussian chooser formula, contractual date coordinates, and one-time notional scaling; the retained chooser wrapper is reference evidence only"

