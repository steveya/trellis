    - "from trellis.models.equity_option_tree import price_cev_option_tree"
  notes:
    - "American/Bermudan vanilla equity adapters should compose the neutral market resolver with the declarative lattice recipe, control, compiler, builder, and pricing primitives"
    - "Bermudan adapters map contractual exercise dates to lattice steps before attaching control"
    - "CEV tree comparison targets should prefer the checked-in spot-lattice helper `price_cev_option_tree(...)`"

rate_lattice:
  module: trellis.models.trees.lattice
  navigation:
    aliases: [rate_tree, callable_bond, puttable_bond, bermudan_swaption]
  key_imports:
    - "from trellis.models.trees.lattice import build_rate_lattice, lattice_backward_induction"
    - "from trellis.models.zcb_option_tree import price_zcb_option_tree"
  notes:
    - "Callable bonds, puttable bonds, and Bermudan swaptions use a calibrated rate lattice from a TreeModel specification such as Hull-White or Black-Derman-Toy"
    - "lattice_backward_induction handles cashflow_at_node and exercise_fn"
    - "Zero-coupon bond option tree routes should prefer `price_zcb_option_tree(...)` instead of rebuilding nested backward induction inline"

# ---------------------------------------------------------------------------
# Model imports — Monte Carlo
# ---------------------------------------------------------------------------
monte_carlo:
  module: trellis.models.monte_carlo
  key_imports:
    - "from trellis.models.monte_carlo.engine import MonteCarloEngine"
    - "from trellis.models.monte_carlo.lsm import longstaff_schwartz, longstaff_schwartz_result"
    - "from trellis.models.monte_carlo.single_state_diffusion import resolve_single_state_monte_carlo_inputs, price_single_state_terminal_claim_monte_carlo_result"
    - "from trellis.models.resolution.single_state_diffusion import terminal_intrinsic_from_resolved"
    - "from trellis.models.monte_carlo.early_exercise import EarlyExercisePolicyResult, LeastSquaresContinuationEstimator"
    - "from trellis.models.monte_carlo.schemes import HestonQuadraticExponential, LaguerreBasis"
    - "from trellis.models.monte_carlo.stochastic_vol import price_heston_option_monte_carlo, price_heston_option_monte_carlo_result"
    - "from trellis.models.monte_carlo.path_state import BarrierMonitor, MonteCarloPathRequirement, StateAwarePayoff, terminal_value_payoff"
    - "from trellis.models.fx_vanilla import resolve_fx_vanilla_inputs"
    - "from trellis.models.fx_barrier_option import resolve_fx_barrier_inputs"
    - "from trellis.models.analytical import terminal_intrinsic"
    - "from trellis.models.autocallable import AutocallableMonteCarloConfig, price_autocallable_monte_carlo_result, resolve_autocallable_inputs"
    - "from trellis.models.single_barrier_option import SingleBarrierMonteCarloConfig, price_single_barrier_option_monte_carlo_result, resolve_single_barrier_inputs"
    - "from trellis.models.analytical.support.barriers import DoubleBarrierSpec, double_barrier_state_payoff, resolve_double_barrier_inputs"
    - "from trellis.models.double_barrier_option import DoubleBarrierMonteCarloConfig, price_double_barrier_option_monte_carlo_result"
    - "from trellis.models.lookback_option import price_equity_fixed_lookback_option_monte_carlo"
    - "from trellis.models.variance_swap import price_equity_variance_swap_monte_carlo, price_equity_variance_swap_monte_carlo_result, equity_variance_swap_outputs_monte_carlo"
    - "from trellis.models.monte_carlo import euler_maruyama, milstein, brownian_bridge"
    - "from trellis.models.monte_carlo import antithetic, control_variate, sobol_normals"
    - "from trellis.models.processes.gbm import GBM, PiecewiseConstantGBM"
  notes:
    - "For European single-state terminal claims, supply an explicit payoff callback to `price_single_state_terminal_claim_monte_carlo_result(...)` and bind scheme/variance-reduction controls at the adapter boundary"
    - "For American/Bermudan vanilla equity Monte Carlo, resolve the market contract with `resolve_single_state_monte_carlo_inputs(...)`, then compose `GBM`, `MonteCarloEngine`, `terminal_intrinsic_from_resolved(...)`, and `longstaff_schwartz(...)` explicitly"
    - "For FX vanilla Monte Carlo, compose `resolve_fx_vanilla_inputs(...)`, `GBM`, `MonteCarloEngine`, `terminal_value_payoff(...)`, and `terminal_intrinsic(...)`; derive drift from domestic minus foreign rates and discount domestically"
    - "For FX single-barrier Monte Carlo, compose `resolve_fx_barrier_inputs(...)`, `GBM`, `MonteCarloEngine`, `BarrierMonitor`, `MonteCarloPathRequirement`, `StateAwarePayoff`, and `terminal_intrinsic(...)`; use reduced barrier-hit state and domestic discounting"
    - "For quanto Monte Carlo or QMC, follow `quanto_option_composition`: bind exact hybrid inputs, build `CorrelatedGBM`, and pass a terminal-only payoff to `MonteCarloEngine`"
    - "Autocallable MC routes should prefer `price_autocallable_monte_carlo_result(...)`; use `sampling='sobol'` only for QMC comparison targets"
    - "Double-barrier MC routes should use two barrier monitors or `double_barrier_state_payoff(...)` instead of adapting a one-barrier analytical formula"
    - "If the control primitive uses continuation regression, choose the estimator or basis explicitly; LaguerreBasis is optional, not mandatory"
    - "Do not invent method='lsm' on MonteCarloEngine"

scheduled_observation_composition:
  module: trellis.models.observation_aggregation
  navigation:
    aliases: [scheduled_observation, weighted_observation, arithmetic_asian_option]
  key_imports:
    - "from trellis.models.observation_aggregation import WeightedObservationContract, build_weighted_observation_reducer, weighted_observation_payoff, weighted_observation_sum"
    - "from trellis.models.monte_carlo.engine import MonteCarloEngine"
    - "from trellis.models.processes.gbm import GBM, PiecewiseConstantGBM"
  notes:
    - "Declare every observation time and weight explicitly with WeightedObservationContract; weights are not normalized implicitly, so an average uses one weight of 1 / n per observation."
    - "The observation grid may include time zero, but every time must map exactly and distinctly onto the MonteCarloEngine grid or the contract fails closed."
    - "Call contract.resolve_uniform_grid_steps(...) to validate an explicit n_steps value against the declared min_steps and max_steps bounds and exact alignment, or to select the smallest exact grid within those bounds; do not copy a route-local search loop."
    - "Use weighted_observation_sum(...) for direct path-array checks and weighted_observation_payoff(...) with return_paths=False for reduced-state execution."
    - "Pass derivative-specific settlement logic through settlement_fn; strike, direction, notional, and payoff branching belong in generated adapter code rather than this product-neutral aggregate."

weighted_lognormal_sum_composition:
  module: trellis.models.analytical.support.lognormal_moments
  navigation:
    aliases: [weighted_lognormal_sum, arithmetic_asian_option, lognormal_moment_matching]
  key_imports:
    - "from trellis.models.analytical.support.lognormal_moments import WeightedLognormalSumContract, match_lognormal_moments, single_factor_lognormal_sum_contract, weighted_lognormal_sum_moments"
    - "from trellis.models.black import black76_call, black76_put"
  notes:
    - "Use an explicit log-return covariance matrix for general correlated lognormal observations; single_factor_lognormal_sum_contract(...) supplies sigma squared times min(t_i, t_j) for one constant-parameter GBM."
    - "weighted_lognormal_sum_moments(...) returns exact first and second moments under the declared covariance; match_lognormal_moments(...) is a moment-matching approximation, not an exact distributional identity."
    - "Signed weights may be used for moment calculation, but lognormal matching fails closed unless all weights are non-negative and the fitted mean is strictly positive."
    - "Pass the matched mean, effective_volatility(maturity=...), strike, and maturity to black76_call or black76_put, then apply the contractual discount factor and notional explicitly because Black-76 kernels are undiscounted."

arithmetic_asian_composition:
  module: trellis.models.observation_aggregation
  navigation:
    aliases: [arithmetic_asian, arithmetic_asian_option, asian_option]
  key_imports:
    - "from trellis.models.resolution.single_state_diffusion import resolve_single_state_diffusion_inputs"
    - "from trellis.models.observation_aggregation import WeightedObservationContract, weighted_observation_payoff"
    - "from trellis.models.analytical.support.lognormal_moments import single_factor_lognormal_sum_contract, weighted_lognormal_sum_moments, match_lognormal_moments"
    - "from trellis.models.black import black76_call, black76_put"
    - "from trellis.models.monte_carlo.path_state import StateAwarePayoff"
    - "from trellis.models.processes.gbm import GBM"
    - "from trellis.models.monte_carlo.engine import MonteCarloEngine"
  notes:
    - "For a bounded European fixed-strike arithmetic-average option, resolve the scalar market inputs first and derive every observation time and equal averaging weight explicitly from the contract."
    - "Analytical lane: compose the single-factor lognormal-sum contract, exact first two moments, lognormal moment match, and Black-76 call or put kernel; apply discounting and notional outside the kernel."
    - "Monte Carlo lane: use the same observation times in WeightedObservationContract, resolve an exact bounded grid with contract.resolve_uniform_grid_steps(...), compose weighted_observation_payoff with derivative-specific call or put settlement, and run GBM through MonteCarloEngine with return_paths=False."
    - "geometric averaging, floating-strike averaging, multi-asset averages, non-European exercise, nonpositive post-settlement observation times, and observation dates that cannot map exactly to the bounded uniform grid must fail closed rather than inherit this lane."

observation_return_composition:
  module: trellis.models.observation_returns
  navigation:
    aliases: [observation_return, cliquet, ratchet_option]
  key_imports:
    - "from trellis.models.observation_returns import ObservationReturnContract, bounded_observation_return_sum, build_observation_return_reducer, observation_return_payoff, simple_observation_returns"
    - "from trellis.models.analytical.support.expectations import gauss_hermite_product_expectation"
    - "from trellis.models.monte_carlo.engine import MonteCarloEngine"
    - "from trellis.models.processes.gbm import GBM, PiecewiseConstantGBM"
  notes:
    - "Start with ObservationReturnContract: declare ordered positive observation times, up/down return direction, local bounds, global bounds, and payoff scale; its observation_steps(...) method fails closed when the uniform simulation grid aliases or cannot exactly represent contractual observations"
    - "Analytical lane: map independent standard normals to interval gross returns, evaluate bounded_observation_return_sum(...) inside gauss_hermite_product_expectation(...), then apply the declared settlement discount outside the expectation"
    - "Monte Carlo lane: pass observation_return_payoff(...) to MonteCarloEngine with return_paths=False; use PiecewiseConstantGBM when interval drift or volatility differs so reset returns preserve the declared term structure; the payoff declares a PathReducer that stores only previous level and accumulated locally bounded return"
    - "The analytical expectation assumes independent normal interval drivers; the Monte Carlo reducer accepts any scalar positive-level process on an exact uniform observation grid; vector state and nonpositive levels require a different admitted substrate"

rate_monte_carlo_composition:
  module: trellis.models.monte_carlo.simulation_substrate
  navigation:
    aliases: [rate_monte_carlo, bermudan_swaption, callable_rate_product]
  key_imports:
    - "from trellis.models.monte_carlo.event_aware import build_event_aware_monte_carlo_process, resolve_hull_white_monte_carlo_process_inputs"
    - "from trellis.models.monte_carlo.simulation_substrate import FactorStateSimulationResult, HullWhiteRateProjection, HullWhiteSwapFutureValueModel, SwapFloatResetProgram"
    - "from trellis.models.monte_carlo.simulation_substrate import evaluate_conditional_valuation_paths, simulate_factor_state_observations"
    - "from trellis.models.monte_carlo.lsm import longstaff_schwartz_result"
  notes:
    - "Use this section to inspect reusable Hull-White factor simulation, projected rate-market views, pathwise swap values, and continuation regression before considering any product helper"
    - "The current generic composition surface does not yet map an arbitrary exercise schedule onto the simulation grid, pass pathwise numeraire discounts into Longstaff-Schwartz, or bind swap-value paths into the early-exercise controller"
    - "Until those three capabilities are admitted, Bermudan swaption Monte Carlo must block as a semantic_method_composition_gap instead of falling back to the European swaption helper"
    - "A task-shaped pricing helper is not a substitute for a missing reusable composition capability"

qmc:
  module: trellis.models.qmc
  key_imports:
    - "from trellis.models.qmc import sobol_normals, brownian_bridge"
    - "from trellis.models.processes.gbm import GBM"
  notes:
    - "QMC is an accelerator family layered on Monte Carlo-style estimators"
    - "Current support is Sobol-based normal draws and Brownian-bridge construction"

# ---------------------------------------------------------------------------
# Model imports — PDE / finite differences
# ---------------------------------------------------------------------------
pde:
  module: trellis.models.pde
  navigation:
    aliases: [pde_solver, finite_difference, theta_method]
  key_imports:
    - "from trellis.models.equity_option_pde import price_cev_option_pde"
    - "from trellis.models.equity_option_pde import price_equity_digital_option_pde"
    - "from trellis.models.resolution.single_state_diffusion import resolve_single_state_diffusion_inputs, terminal_intrinsic_from_resolved"
    - "from trellis.models.pde.event_aware import EventAwarePDEGridSpec, EventAwarePDEOperatorSpec, EventAwarePDEBoundarySpec, EventAwarePDEProblemSpec, build_event_aware_pde_problem, solve_event_aware_pde, interpolate_pde_values"
    - "from trellis.models.pde.heston_adi import HestonAdiPDEConfig, resolve_heston_adi_pde_inputs, price_heston_option_adi_pde_result"
    - "from trellis.models.single_barrier_option import SingleBarrierPDEConfig, price_single_barrier_option_pde_result, resolve_single_barrier_inputs"
    - "from trellis.models.analytical.support.barriers import terminal_double_barrier_payoff, resolve_double_barrier_inputs"
    - "from trellis.models.double_barrier_option import DoubleBarrierPDEConfig, price_double_barrier_option_pde_result"
    - "from trellis.models.pde.grid import Grid"
    - "from trellis.models.pde.theta_method import theta_method_1d"
    - "from trellis.models.pde.operator import BlackScholesOperator"
    - "from trellis.models.pde import psor_1d  # American options"
    - "from trellis.models.pde import HullWhitePDEOperator"
  notes:
    - "Vanilla European equity PDE routes should resolve single-state market inputs, declare terminal intrinsic and boundaries, build an EventAwarePDEProblemSpec, call solve_event_aware_pde(...), and interpolate the solved surface back to spot"
    - "CEV PDE comparison targets should prefer the checked-in helper `price_cev_option_pde(...)`"
    - "Digital equity PDE comparison targets should prefer `price_equity_digital_option_pde(...)`; use Rannacher timesteps for discontinuous terminal payoffs"
    - "European Heston PDE routes should bind explicit Heston parameters and may use the Heston ADI result object as numerical evidence; a Black vol surface is not a live Heston parameter source"
    - "Single-barrier PDE routes should prefer `price_single_barrier_option_pde_result(...)` for zero-rebate absorbing-boundary comparisons"
    - "Double-barrier PDE routes should build a bounded `[lower_barrier, upper_barrier]` grid with absorbing boundary functions and a terminal payoff from `terminal_double_barrier_payoff(...)`"
    - "Use theta_method_1d, NOT legacy crank_nicolson_1d or implicit_fd_1d"
    - "theta=0.5 for Crank-Nicolson, theta=1.0 for fully implicit"
    - "Grid constructor: Grid(x_min, x_max, n_x, T, n_t, log_spacing=False); never omit x_min or n_t"
    - "BlackScholesOperator constructor: BlackScholesOperator(sigma_fn, r_fn); pass callables, not scalar r/sigma keywords"

