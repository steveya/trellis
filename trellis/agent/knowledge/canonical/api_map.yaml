    - "For FX single-barrier analytics, resolve FX spot, domestic/foreign rates, volatility, monitoring, and payoff terms, then call `barrier_option_price(...)` with foreign rate as `q` and apply notional"
    - "For European digitals, use the Black-76 cash-or-nothing or asset-or-nothing call/put basis kernel selected by contract semantics; bind the carry-adjusted forward and apply discount, notional, and cash amount explicitly"

# ---------------------------------------------------------------------------
# Model imports — calibration
# ---------------------------------------------------------------------------
calibration:
  module: trellis.models.calibration
  key_imports:
    - "from trellis.models.calibration import implied_vol, implied_vol_jaeckel"
    - "from trellis.models.calibration import RatesCalibrationResult, calibrate_cap_floor_black_vol, calibrate_swaption_black_vol, swaption_terms"
    - "from trellis.models.calibration import calibrate_sabr"
    - "from trellis.models.calibration import dupire_local_vol"

# ---------------------------------------------------------------------------
# Common utilities
# ---------------------------------------------------------------------------
utilities:
  black76:
    module: trellis.models.black
    imports:
      - "from trellis.models.black import black76_call, black76_put, black76_asset_or_nothing_call, black76_asset_or_nothing_put, black76_cash_or_nothing_call, black76_cash_or_nothing_put"
    notes:
      - "All Black-76 kernels return undiscounted values on the forward basis; callers own market binding, discounting, notional, and payout scaling"
  garman_kohlhagen:
    module: trellis.models.analytical.fx
    imports:
      - "from trellis.models.analytical.fx import ResolvedGarmanKohlhagenInputs, garman_kohlhagen_price_raw"
      - "from trellis.models.black import garman_kohlhagen_call, garman_kohlhagen_put"
  rate_style_swaption:
    module: trellis.models.rate_style_swaption
    imports:
      - "from trellis.models.rate_style_swaption import ResolvedSwaptionBlack76Inputs, resolve_swaption_black76_inputs, price_swaption_black76_raw"
    notes:
      - "For European Black76 construction, bind with resolve_swaption_black76_inputs(...) and price only the typed result with price_swaption_black76_raw(...); the product wrapper is reference-only"
      - "For the Bermudan final-exercise lower-bound comparator, normalize/filter the exercise schedule first and pass only the final valid date to the same resolver/raw-kernel composition"
  jamshidian_zcb_option:
    module: trellis.models.zcb_option
    imports:
      - "from trellis.models.zcb_option import ResolvedZCBOptionInputs, resolve_zcb_option_hw_inputs, price_zcb_option_jamshidian"
      - "from trellis.models.analytical.jamshidian import ResolvedJamshidianInputs, zcb_option_hw_raw"
  schedule:
    module: trellis.core.date_utils
    imports:
      - "from trellis.core.date_utils import generate_schedule"
  day_count:
    module: trellis.core.date_utils
    imports:
      - "from trellis.core.date_utils import year_fraction"
  vol_surface:
    module: trellis.models.vol_surface
    imports:
      - "from trellis.models.vol_surface import VolSurface, FlatVol"
  cashflow_engine:
    module: trellis.models.cashflow_engine
    imports:
      - "from trellis.models.cashflow_engine import Waterfall, Tranche"
      - "from trellis.models.cashflow_engine import PSA, CPR, RateDependent"
      - "from trellis.models.cashflow_engine import level_pay, scheduled, custom"
  credit_curve:
    module: trellis.curves.credit_curve
    imports:
      - "from trellis.curves.credit_curve import CreditCurve"
    notes:
      - "CreditCurve.flat(hazard_rate) is the simplest starting point for CDS or nth-to-default tasks"
      - "CreditCurve.from_spreads(cds_spreads, recovery) bootstraps a hazard-rate term structure from CDS quotes"
