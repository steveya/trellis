  notes:
    - "Resolve the named constituents, spots, volatilities, carries, correlation, discount factor, and observation times before constructing the process"
    - "Use implied_zero_rate on resolved.domestic_df and resolved.T, then construct CorrelatedGBM with per-name drift equal to domestic rate minus resolved carry"
    - "Choose n_steps once, pass the same value to build_ranked_observation_basket_state_payoff(..., n_steps=n_steps) and MonteCarloEngine, and use payoff.path_requirement as the storage policy"
    - "The generated adapter owns the zero-expiry branch, initial state, deterministic engine controls, domestic discounting, and notional scaling"
    - "Ranked selection and reduced-state replay stay in the payoff-state primitives; product pricing wrappers and process builders are compatibility/reference APIs, not generated construction authority"

# ---------------------------------------------------------------------------
# Model imports — trees
# ---------------------------------------------------------------------------
equity_tree:
  module: trellis.models.trees.algebra
  navigation:
    aliases: [equity_tree, american_option, bermudan_option]
  key_imports:
    - "from trellis.models.resolution.single_state_diffusion import resolve_single_state_diffusion_inputs, terminal_intrinsic_from_resolved"
    - "from trellis.models.trees.algebra import equity_tree, with_control, compile_lattice_recipe, build_lattice, price_on_lattice, value_on_lattice"
    - "from trellis.models.equity_option_tree import price_cev_option_tree"
  notes:
    - "American/Bermudan vanilla equity adapters should compose the neutral market resolver with the declarative lattice recipe, control, compiler, builder, and pricing primitives"
    - "Bermudan adapters map contractual exercise dates to lattice steps before attaching control"
    - "Use value_on_lattice(..., observation_steps=...) only when node-level continuation, post-cashflow, or post-control evidence is required; price_on_lattice(...) remains the scalar entry point"
    - "CEV tree comparison targets should prefer the checked-in spot-lattice helper `price_cev_option_tree(...)`"

rate_lattice:
  module: trellis.models.trees.lattice
  methods: [rate_tree]
  navigation:
    aliases: [rate_tree, callable_bond, puttable_bond]
  key_imports:
    - "from trellis.models.short_rate_lattice import ResolvedShortRateLatticeInputs, resolve_short_rate_lattice_inputs"
    - "from trellis.models.short_rate_fixed_income import build_embedded_fixed_income_event_timeline, compile_embedded_fixed_income_lattice_contract_spec, present_value_fixed_coupon_bond, settlement_date_for_fixed_income_claim"
    - "from trellis.models.trees.models import MODEL_REGISTRY"
    - "from trellis.models.trees.algebra import BINOMIAL_1F_TOPOLOGY, UNIFORM_ADDITIVE_MESH, TERM_STRUCTURE_TARGET, build_lattice, price_on_lattice, value_on_lattice"
    - "from trellis.models.trees.lattice import LatticeRollbackObservation, LatticeRollbackResult, lattice_backward_induction, lattice_backward_induction_result"
    - "from trellis.models.zcb_option_tree import price_zcb_option_tree"
  notes:
    - "Callable bonds, puttable bonds, and Bermudan swaptions use a calibrated rate lattice from a TreeModel specification such as Hull-White or Black-Derman-Toy"
    - "Resolve product-neutral market inputs with resolve_short_rate_lattice_inputs(...), then select the returned model_name from MODEL_REGISTRY and build against TERM_STRUCTURE_TARGET(discount_curve)"
    - "Normal models receive absolute rate volatility; when only a Black-style surface quote exists the resolver multiplies it by abs(r0). Lognormal models retain the Black-style quote"
    - "Explicit sigma or a calibrated model-parameter payload matched to the selected lattice model takes precedence; missing discount or volatility evidence fails closed"
    - "For callable and puttable fixed income, resolve settlement, build one embedded event timeline, and compile that same object with expected_control_style='issuer_min' or 'holder_max' before price_on_lattice(...)"
    - "Check the straight-bond reference after rollback: callable holder value is upper-bounded with min(tree_price, straight_price), while puttable holder value is lower-bounded with max(tree_price, straight_price)"
    - "price_callable_bond_tree is a compatibility reference, not an admitted generated-route target"
    - "lattice_backward_induction handles cashflow_at_node and exercise_fn"
    - "lattice_backward_induction_result(..., observation_steps=...) and value_on_lattice(..., observation_steps=...) capture only requested steps as immutable LatticeRollbackObservation values"
    - "Each nonterminal observation separates discounted continuation, post-cashflow, and post-control node vectors; terminal observations use the terminal payoff vector for all three phases"
    - "Use the bounded observation result to compose schedule and exercise state; do not open-code rollback or introduce a product-specific observation helper"
    - "Zero-coupon bond option tree routes should prefer `price_zcb_option_tree(...)` instead of rebuilding nested backward induction inline"

