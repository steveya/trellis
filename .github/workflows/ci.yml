name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    name: repo-checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Build package
        run: python -m build

      - name: Check changed files for whitespace errors
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "${empty_tree}" "${head_sha}" --
          else
            git diff --check "${base_sha}" "${head_sha}" --
          fi

      - name: Run hygiene gate
        run: make gate-hygiene PYTHON=python

  pr-gate-shard:
    if: github.event_name == 'pull_request'
    name: pr-gate-shard-${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Run PR gate shard
        run: make gate-pr-shard PYTHON=python PR_GATE_SHARD_COUNT=4 PR_GATE_SHARD_INDEX=${{ matrix.shard }}

  pr-gate-tier2-contracts:
    if: github.event_name == 'pull_request'
    name: pr-gate-tier2-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Run tier2 contract gate
        run: make gate-tier2-contracts PYTHON=python

  release-gate:
    if: github.event_name == 'push'
    name: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Run release gate
        run: make gate-release PYTHON=python

  build-and-test:
    if: ${{ always() && github.event_name == 'pull_request' }}
    name: build-and-test
    runs-on: ubuntu-latest
    needs:
      - repo-checks
      - pr-gate-shard
      - pr-gate-tier2-contracts
    steps:
      - name: Assert PR shard jobs passed
        run: |
          test "${{ needs.repo-checks.result }}" = "success"
          test "${{ needs.pr-gate-shard.result }}" = "success"
          test "${{ needs.pr-gate-tier2-contracts.result }}" = "success"

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Run scoped mypy pass
        run: python -m mypy
