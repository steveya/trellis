name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Build package
        run: python -m build

      - name: Check changed files for whitespace errors
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          head_sha="${{ github.sha }}"
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "${empty_tree}" "${head_sha}" --
          else
            git diff --check "${base_sha}" "${head_sha}" --
          fi

      - name: Run PR gate
        if: github.event_name == 'pull_request'
        run: make gate-pr PYTHON=python

      - name: Run release gate
        if: github.event_name == 'push'
        run: make gate-release PYTHON=python

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,agent,mcp,pipeline]"

      - name: Run scoped mypy pass
        run: python -m mypy
