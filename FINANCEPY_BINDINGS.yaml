version: 1
bindings:
  financepy.equity.vanilla.black_scholes:
    instrument_family: equity_vanilla
    method_family: analytical
    financepy_class: EquityVanillaOption
    financepy_model: BlackScholes
    overlapping_outputs:
    - price
    - delta
    - gamma
    - vega
    - theta
    comparison_modes:
    - price_parity
    - warm_runtime
  financepy.fx.vanilla.garman_kohlhagen:
    instrument_family: fx_vanilla
    method_family: analytical
    financepy_class: FXVanillaOption
    financepy_model: BlackScholes
    overlapping_outputs:
    - price
    - delta
    comparison_modes:
    - price_parity
    - warm_runtime
    normalization:
      price:
        source: financepy
        scale_by_contract_field: notional
  financepy.rates.cap_floor.black:
    instrument_family: cap_floor
    method_family: analytical
    financepy_class: IborCapFloor
    financepy_model: IborCapFloorModelTypes.BLACK
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
    market_alignment:
      curve_regime: single_curve_forecast
  financepy.rates.cap_floor.shifted_black:
    instrument_family: cap_floor
    method_family: analytical
    financepy_class: IborCapFloor
    financepy_model: IborCapFloorModelTypes.SHIFTED_BLACK
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
    market_alignment:
      curve_regime: single_curve_forecast
  financepy.rates.cap_floor.sabr:
    instrument_family: cap_floor
    method_family: analytical
    financepy_class: IborCapFloor
    financepy_model: IborCapFloorModelTypes.SABR
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
    market_alignment:
      curve_regime: single_curve_forecast
  financepy.rates.swaption.black:
    instrument_family: swaption
    method_family: analytical
    financepy_class: IborSwaption
    financepy_model: Black76
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
    market_alignment:
      curve_regime: single_curve_discount
  financepy.rates.bermudan_swaption.hw_tree:
    instrument_family: swaption
    method_family: lattice
    financepy_class: IborBermudanSwaption
    financepy_model: HWTree
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
  financepy.credit.cds.analytical:
    instrument_family: cds
    method_family: analytical
    financepy_class: CDS
    financepy_model: survival_curve
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
  financepy.credit.tranche.base_correlation:
    instrument_family: credit_tranche
    method_family: copula
    financepy_class: CDSTranche
    financepy_model: BaseCorrelation
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
  financepy.equity.rainbow.stulz:
    instrument_family: rainbow_option
    method_family: analytical
    financepy_class: EquityRainbowOption
    financepy_model: Stulz
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
  financepy.equity.barrier.black_scholes:
    instrument_family: barrier_option
    method_family: analytical
    financepy_class: EquityBarrierOption
    financepy_model: BlackScholes
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
  financepy.equity.digital.black_scholes:
