  financepy.equity.cliquet.black_scholes:
    instrument_family: cliquet_option
    method_family: analytical
    financepy_class: EquityCliquetOption
    financepy_model: BlackScholes
    overlapping_outputs:
    - price
    comparison_modes:
    - price_parity
    - warm_runtime
