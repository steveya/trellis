    - warm_runtime
  financepy.equity.compound.black_scholes:
    instrument_family: compound_option
    method_family: analytical
    financepy_class: EquityCompoundOption
    financepy_model: BlackScholes
    overlapping_outputs:
    - price
    comparison_modes:
