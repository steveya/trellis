version: 1
tasks:
- id: F001
  title: 'FinancePy parity: European equity vanilla Black-Scholes'
  status: pending
  instrument_type: european_option
  construct: analytical
  task_kind: pricing
  description: Price a 1Y at-the-money European call on a non-dividend-paying stock
    under Black-Scholes. Return price, delta, gamma, vega, and theta. Use the same
    market data and method as FinancePy BlackScholes.
  market_scenario_id: flat_usd_equity_vanilla
  financepy_binding_id: financepy.equity.vanilla.black_scholes
  greek_targets:
  - delta
  - gamma
  - vega
  - theta
  cross_validate:
    external:
    - financepy
    analytical: black_scholes
    tolerance_pct: 0.25
  benchmark_contract:
    product: equity_vanilla
    option_type: call
    strike: 100.0
    spot: 100.0
    expiry_years: 1.0
    domestic_rate: 0.05
    dividend_rate: 0.0
    volatility: 0.2
    notional: 1.0
